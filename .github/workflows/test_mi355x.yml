name: MI355X Read Trace Breakdown
on:
  workflow_dispatch:
jobs:
  read-breakdown:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 10
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
    steps:
      - name: Git pull repo
        run: |
          git -C $REPO reset HEAD -- . 2>/dev/null || true
          git -C $REPO checkout -- . 2>/dev/null || true
          git -C $REPO pull

      - name: Read decode_breakdown.xlsx
        run: |
          podman exec $CONTAINER python3 -c "
          import openpyxl, sys
          for fname in ['decode_breakdown.xlsx', 'prefill_breakdown.xlsx']:
              path = '$REPO/results_mi355x_mxfp4_mtp0_ep8_tp8_trace/' + fname
              try:
                  wb = openpyxl.load_workbook(path)
              except Exception as e:
                  print(f'=== {fname}: FAILED ({e}) ===')
                  continue
              for sheet_name in wb.sheetnames:
                  ws = wb[sheet_name]
                  print(f'=== {fname} / {sheet_name} ({ws.max_row} rows x {ws.max_column} cols) ===')
                  for row in ws.iter_rows(values_only=True):
                      print('\t'.join(str(c) if c is not None else '' for c in row))
                  print()
          "

      - name: Read decode walltime CSV (full)
        run: |
          podman exec $CONTAINER cat $REPO/results_mi355x_mxfp4_mtp0_ep8_tp8_trace/decode_walltime_*.csv 2>/dev/null || echo "No CSV"

      - name: Read trace script log
        run: |
          podman exec $CONTAINER cat $REPO/results_mi355x_mxfp4_mtp0_ep8_tp8_trace/trace_*.log 2>/dev/null | tail -80 || echo "No log"

      - name: Check EP in server log
        run: |
          podman exec $CONTAINER head -100 $REPO/results_mi355x_mxfp4_mtp0_ep8_tp8_trace/server_*.log 2>/dev/null | grep -iE "(enable.expert|expert.parallel|ep_size|parallel_config|tensor_parallel|TP|EP)" | head -20 || echo "No EP info found"
          echo "---"
          podman exec $CONTAINER head -50 $REPO/results_mi355x_mxfp4_mtp0_ep8_tp8_trace/server_*.log 2>/dev/null || echo "No server log"
