name: MI355X MXFP4 TP8+EP Trace
on:
  workflow_dispatch:
jobs:
  mxfp4-tp8-ep-trace:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 120
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
      MODEL: /shared/data/amd_int/models/DeepSeek-R1-0528-MTP-MoE-MXFP4-Attn-PTPC-FP8
    steps:
      - name: Git pull repo
        run: |
          git -C $REPO reset HEAD -- . 2>/dev/null || true
          git -C $REPO checkout -- . 2>/dev/null || true
          git -C $REPO clean -fd 2>/dev/null || true
          git -C $REPO pull
          echo "=== Latest commit ==="
          git -C $REPO log --oneline -3

      - name: Check environment
        run: |
          echo "=== Podman container ==="
          podman ps --format "{{.Names}} {{.Status}}" | grep zufa_atom
          echo "=== GPUs ==="
          podman exec $CONTAINER rocm-smi --showproductname 2>/dev/null | head -10 || podman exec $CONTAINER rocm-smi | head -10
          echo "=== Model ==="
          podman exec $CONTAINER ls $MODEL/config.json && echo "Model found"
          echo "=== ATOM parse_trace ==="
          podman exec $CONTAINER ls /app/ATOM/tools/parse_trace.py && echo "parse_trace.py found"

      - name: Collect trace (chat, c=64, TP=8+EP, profile-prompts=128)
        timeout-minutes: 90
        run: |
          podman exec $CONTAINER bash -c "cd $REPO && bash scripts/collect_atom_trace.sh --model $MODEL --scenario chat --concurrency 64 --tp 8 --ep --profile-prompts 128 --result-dir ./results_mi355x_mxfp4_mtp0_ep8_tp8_trace"

      - name: Show trace results
        if: always()
        run: |
          TDIR=$REPO/results_mi355x_mxfp4_mtp0_ep8_tp8_trace
          echo "=== Result files ==="
          podman exec $CONTAINER ls -lh $TDIR/ 2>/dev/null || echo "No results dir"
          echo ""
          echo "=== Decode walltime CSV ==="
          podman exec $CONTAINER cat $TDIR/decode_walltime_*.csv 2>/dev/null | head -30 || echo "No decode CSV"
          echo ""
          echo "=== Kernel breakdown ==="
          podman exec $CONTAINER cat $TDIR/decode_breakdown.xlsx 2>/dev/null && echo "(binary xlsx)" || echo "No breakdown xlsx"
          podman exec $CONTAINER ls -lh $TDIR/*breakdown* 2>/dev/null || echo "No breakdown files"
          echo ""
          echo "=== Trace script log ==="
          podman exec $CONTAINER cat $TDIR/trace_*.log 2>/dev/null | tail -60 || echo "No trace log"
          echo ""
          echo "=== Server log tail ==="
          podman exec $CONTAINER tail -30 $TDIR/server_*.log 2>/dev/null || echo "No server log"
