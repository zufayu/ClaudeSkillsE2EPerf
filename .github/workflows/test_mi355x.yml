name: MI355X MXFP4 TP8+EP Benchmark
on:
  workflow_dispatch:
jobs:
  mxfp4-tp8-ep-bench:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 120
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
      MODEL: /shared/data/amd_int/models/DeepSeek-R1-0528-MTP-MoE-MXFP4-Attn-PTPC-FP8
    steps:
      - name: Git pull repo
        run: |
          git -C $REPO reset HEAD -- . 2>/dev/null || true
          git -C $REPO checkout -- . 2>/dev/null || true
          git -C $REPO clean -fd 2>/dev/null || true
          git -C $REPO pull
          echo "=== Latest commit ==="
          git -C $REPO log --oneline -3

      - name: Check environment
        run: |
          echo "=== Podman container ==="
          podman ps --format "{{.Names}} {{.Status}}" | grep zufa_atom
          echo "=== GPUs ==="
          podman exec $CONTAINER rocm-smi --showproductname 2>/dev/null | head -20 || podman exec $CONTAINER rocm-smi | head -20
          echo "=== ATOM ==="
          podman exec $CONTAINER pip show atom 2>/dev/null | grep -E "^(Name|Version)" || echo "ATOM installed (no pip metadata)"
          echo "=== Model ==="
          podman exec $CONTAINER ls $MODEL/config.json && echo "Model found"

      - name: Run MXFP4 TP=8+EP benchmark (chat, c=64)
        timeout-minutes: 90
        run: |
          podman exec $CONTAINER bash -c "cd $REPO && bash scripts/sa_bench_mi355x.sh --model-mxfp4 $MODEL --configs mxfp4-throughput --scenario chat --concurrency 64 --tp 8 --ep --result-dir ./results_mi355x_mxfp4_mtp0_ep8_tp8"

      - name: Show results
        if: always()
        run: |
          echo "=== Result files ==="
          podman exec $CONTAINER ls -la $REPO/results_mi355x_mxfp4_mtp0_ep8_tp8/ 2>/dev/null || echo "No results dir"
          echo ""
          echo "=== JSON results ==="
          for f in $REPO/results_mi355x_mxfp4_mtp0_ep8_tp8/*.json; do
            [ -f "$f" ] || continue
            echo "--- $(basename $f) ---"
            python3 -c "import json; d=json.load(open('$f')); print(f'  duration={d.get(\"duration\",\"?\")}s completed={d.get(\"completed\",\"?\")} mean_tpot={d.get(\"mean_tpot_ms\",\"?\")}ms mean_ttft={d.get(\"mean_ttft_ms\",\"?\")}ms output_tput={d.get(\"output_throughput\",\"?\")} tok/s')"
          done
          echo ""
          echo "=== Server log tail ==="
          tail -50 $REPO/results_mi355x_mxfp4_mtp0_ep8_tp8/server*.log 2>/dev/null | head -80 || echo "No server log"
