name: "B200 TRT Profiling"
on:
  workflow_dispatch:
    inputs:
      node:
        description: "GPU node (run check_nodes first)"
        type: string
        default: "hungry-hippo-fin-03-2"
      container:
        type: string
        default: "zufa_trt"
      configs:
        type: choice
        options: [fp4-throughput, fp4-latency, fp8-throughput, fp8-latency]
        default: fp4-throughput
      ep:
        type: string
        default: "8"
      tp:
        type: string
        default: "8"
      scenario:
        type: choice
        options: [chat, reasoning, summarize]
        default: chat
      concurrency:
        type: string
        default: "64"
      dp:
        description: "DP Attention (auto = script decides)"
        type: choice
        options: [auto, "true", "false"]
        default: auto

jobs:
  profiling:
    runs-on: [self-hosted, b200]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          source scripts/ci_lib.sh && ci_load_platform b200
          export NODE="${{ inputs.node }}" CONTAINER="${{ inputs.container }}"
          ci_parse_configs "${{ inputs.configs }}"
          case "$QUANT" in fp4) MODEL=$MODEL_FP4 ;; fp8) MODEL=$MODEL_FP8 ;; esac
          ci_get_image
          ENV_TAG=$(ci_detect_env_tag trt)
          RESULT_DIR=$(ci_result_dir "$PLATFORM" "$QUANT" "$MTP" "${{ inputs.ep }}" "${{ inputs.tp }}" "$ENV_TAG" "_profiling")
          for var in NODE CONTAINER MODEL QUANT MTP IMAGE ENV_TAG RESULT_DIR REPO EXEC_MODE CI_USER_NAME CI_USER_EMAIL; do
            echo "$var=${!var}" >> $GITHUB_ENV
          done
          echo "NODE=$NODE CONTAINER=$CONTAINER"
          echo "${{ inputs.configs }} → QUANT=$QUANT MTP=$MTP ENV_TAG=$ENV_TAG"
          echo "RESULT_DIR=$RESULT_DIR"

      - name: Sync repo
        run: source scripts/ci_lib.sh && ci_load_platform b200 && ci_sync

      - name: Verify GPU
        run: source scripts/ci_lib.sh && ci_load_platform b200 && ci_verify_gpu

      - name: Clean old results
        run: |
          source scripts/ci_lib.sh && ci_load_platform b200
          ci_exec "rm -rf $REPO/$RESULT_DIR/* 2>/dev/null; true"

      - name: Run nsys profiling
        run: |
          source scripts/ci_lib.sh && ci_load_platform b200
          # collect_nsys_trace.sh --config expects "throughput" or "latency", not "fp4-throughput"
          ci_parse_configs "${{ inputs.configs }}"
          ARGS="--model $MODEL --mode serve --scenario ${{ inputs.scenario }} --concurrency ${{ inputs.concurrency }} --quant $QUANT --config $MODE --tp ${{ inputs.tp }} --ep ${{ inputs.ep }} --env $ENV_TAG --trace-dir ./$RESULT_DIR --skip-export"
          [[ "${{ inputs.dp }}" != "auto" ]] && ARGS="$ARGS --dp ${{ inputs.dp }}"
          ci_exec "cd $REPO && bash scripts/collect_nsys_trace.sh $ARGS"

      - name: Show results
        if: always()
        run: |
          source scripts/ci_lib.sh && ci_load_platform b200
          ci_exec_host "cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo 'No summary'"
          ci_exec_host "ls -la $REPO/$RESULT_DIR/ 2>/dev/null || echo 'No result dir'"

      - name: Commit results
        if: always()
        run: |
          source scripts/ci_lib.sh && ci_load_platform b200
          ci_commit_results "$RESULT_DIR" \
            "data: B200 TRT ${{ inputs.configs }} EP=${{ inputs.ep }} TP=${{ inputs.tp }} profiling (${{ inputs.scenario }} c=${{ inputs.concurrency }}, $ENV_TAG)"

      - name: Show final state
        if: always()
        run: source scripts/ci_lib.sh && ci_load_platform b200 && ci_exec_host "cd $REPO && git log --oneline -3"
