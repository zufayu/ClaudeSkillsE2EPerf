name: B200 Nsys SQLite Analysis
on:
  workflow_dispatch:
    inputs:
      timerange:
        description: 'SQLite export time range in seconds (e.g. 60,120 for middle minute of 3min trace). Leave blank to use existing .sqlite'
        type: string
        default: ''
      skip_first:
        description: 'Skip first N decode steps'
        type: string
        default: '10'
      max_steps:
        description: 'Max decode steps to analyze'
        type: string
        default: '20'

jobs:
  nsys-analysis:
    runs-on: [self-hosted, b200]
    timeout-minutes: 60
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_sglang
      REPO: /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf
      RESULT_DIR: results/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep4_tp4_sglang059_nsys
    steps:
      - name: Sync repo
        run: ssh $NODE "cd $REPO && git fetch origin && git reset --hard origin/main"

      - name: Delete large CSV (cuda_gpu_trace, tens of GB, useless)
        run: |
          echo "=== Before cleanup ==="
          ssh $NODE "ls -lh $REPO/$RESULT_DIR/*csv* $REPO/$RESULT_DIR/*kernels* 2>/dev/null || echo 'No CSV files'"
          ssh $NODE "rm -f $REPO/$RESULT_DIR/*cuda_gpu_trace*.csv $REPO/$RESULT_DIR/*_kernels_cuda_gpu_trace.csv 2>/dev/null; true"
          echo "=== After cleanup ==="
          ssh $NODE "du -sh $REPO/$RESULT_DIR/ 2>/dev/null || echo 'No dir'"

      - name: List nsys files
        run: |
          echo "=== .nsys-rep files ==="
          ssh $NODE "ls -lh $REPO/$RESULT_DIR/*.nsys-rep 2>/dev/null || echo 'None'"
          echo "=== .sqlite files ==="
          ssh $NODE "ls -lh $REPO/$RESULT_DIR/*.sqlite 2>/dev/null || echo 'None'"

      - name: Find nsys-rep and ensure full SQLite exists
        run: |
          NSYS_REP=$(ssh $NODE "ls -t $REPO/$RESULT_DIR/*.nsys-rep 2>/dev/null | head -1")
          if [ -z "$NSYS_REP" ]; then
            echo "ERROR: No .nsys-rep file found"
            exit 1
          fi
          echo "Full trace: $NSYS_REP"
          ssh $NODE "ls -lh $NSYS_REP"
          echo "NSYS_REP=$NSYS_REP" >> $GITHUB_ENV
          FULL_SQLITE="${NSYS_REP%.nsys-rep}.sqlite"
          if ! ssh $NODE "test -f $FULL_SQLITE" 2>/dev/null; then
            echo "Full SQLite not found, exporting..."
            ssh $NODE "docker exec $CONTAINER nsys export --type sqlite -f true -o $FULL_SQLITE $NSYS_REP 2>&1"
          fi
          echo "FULL_SQLITE=$FULL_SQLITE" >> $GITHUB_ENV
          ssh $NODE "ls -lh $FULL_SQLITE"

      - name: Debug NVTX tables and content
        run: |
          ssh $NODE "docker exec $CONTAINER python3 -c \"
          import sqlite3
          conn = sqlite3.connect('$FULL_SQLITE')
          cur = conn.cursor()
          print('=== Tables ===')
          for r in cur.execute(\\\"SELECT name FROM sqlite_master WHERE type='table' ORDER BY name\\\"):
              print(f'  {r[0]}')
          print()
          print('=== NVTX_EVENTS eventType distribution ===')
          for r in cur.execute('SELECT eventType, COUNT(*) FROM NVTX_EVENTS GROUP BY eventType'):
              print(f'  type={r[0]}: {r[1]} events')
          print()
          print('=== Sample NVTX texts (20 distinct) ===')
          for r in cur.execute('SELECT DISTINCT SUBSTR(s.value,1,120) FROM NVTX_EVENTS n JOIN StringIds s ON n.textId=s.id LIMIT 20'):
              print(f'  {r[0]}')
          print()
          print('=== NVTX containing model/Module ===')
          for r in cur.execute(\\\"SELECT COUNT(*), SUBSTR(s.value,1,120) FROM NVTX_EVENTS n JOIN StringIds s ON n.textId=s.id WHERE s.value LIKE '%model%' OR s.value LIKE '%Module%' GROUP BY SUBSTR(s.value,1,120) LIMIT 20\\\"):
              print(f'  {r[0]}x {r[1]}')
          print()
          print('=== NVTX_EVENTS with JSON payload (check jsonTextId) ===')
          cols = [d[0] for d in cur.execute('PRAGMA table_info(NVTX_EVENTS)').fetchall()]
          print(f'  Columns: {[c[1] for c in cur.execute(\\\"PRAGMA table_info(NVTX_EVENTS)\\\")]}')
          conn.close()
          \" 2>&1"

      - name: Auto-detect benchmark time window from NVTX
        run: |
          TIMERANGE="${{ inputs.timerange }}"
          if [ -n "$TIMERANGE" ]; then
            echo "User-specified timerange: $TIMERANGE"
          else
            echo "Auto-detecting benchmark window from full SQLite NVTX markers..."
            TIMERANGE=$(ssh $NODE "docker exec $CONTAINER python3 -c \"
          import sqlite3, re
          conn = sqlite3.connect('$FULL_SQLITE')
          # Try SGLang module markers in jsonText first
          rows = conn.execute(\\\"SELECT COALESCE(n.jsonText,''), n.start, n.end FROM NVTX_EVENTS n WHERE n.jsonText LIKE '%model.model%' AND n.jsonText NOT LIKE '%layers%' AND n.end > n.start ORDER BY n.start\\\").fetchall()
          if not rows:
              # Try textId for TRT-LLM style
              rows = conn.execute(\\\"SELECT s.value, n.start, n.end FROM NVTX_EVENTS n JOIN StringIds s ON n.textId=s.id WHERE s.value LIKE '%forward_step%' AND n.end > n.start ORDER BY n.start\\\").fetchall()
          if rows:
              from collections import Counter
              bs_counter = Counter()
              for text, start, end in rows:
                  m = re.search(r'Inputs.*?\[\[(\d+)\]', text)
                  if not m: m = re.search(r'Inputs.*?\[\[(\d+)\]', text)
                  if m: bs_counter[int(m.group(1))] += 1
                  else: bs_counter[-1] += 1
              decode_bs = bs_counter.most_common(1)[0][0]
              decode_rows = [(t,s,e) for t,s,e in rows if str(decode_bs) in t or decode_bs == -1]
              if decode_rows:
                  n = len(decode_rows)
                  start_idx = n * 2 // 5
                  start_s = int(decode_rows[start_idx][1] / 1e9) - 5
                  end_s = int(decode_rows[-1][2] / 1e9) + 5
                  if end_s - start_s > 120: end_s = start_s + 120
                  print(f'{start_s},{end_s}')
              else:
                  print('')
          else:
              print('')
          conn.close()
          \" 2>&1" | tail -1)
            if [ -z "$TIMERANGE" ]; then
              echo "WARN: Could not auto-detect, using full SQLite"
              echo "SQLITE=$FULL_SQLITE" >> $GITHUB_ENV
              echo "TIMERANGE=full" >> $GITHUB_ENV
              exit 0
            fi
            echo "Auto-detected timerange: $TIMERANGE"
          fi
          START_S=$(echo "$TIMERANGE" | cut -d, -f1)
          END_S=$(echo "$TIMERANGE" | cut -d, -f2)
          echo "TIMES_ARG=${START_S}s/${END_S}s" >> $GITHUB_ENV
          echo "TIMERANGE=$TIMERANGE" >> $GITHUB_ENV

      - name: Export trimmed SQLite
        if: env.TIMERANGE != 'full'
        run: |
          SQLITE_OUT="$REPO/$RESULT_DIR/trace_t${TIMERANGE//,/-}.sqlite"
          echo "Exporting SQLite with --times=$TIMES_ARG"
          ssh $NODE "docker exec $CONTAINER nsys export --type sqlite --times='$TIMES_ARG' -f true -o $SQLITE_OUT $NSYS_REP 2>&1" || echo "WARN: SQLite export failed"
          if ssh $NODE "test -f $SQLITE_OUT" 2>/dev/null; then
            echo "SQLITE=$SQLITE_OUT" >> $GITHUB_ENV
            ssh $NODE "ls -lh $SQLITE_OUT"
          else
            echo "Falling back to full SQLite"
            echo "SQLITE=$FULL_SQLITE" >> $GITHUB_ENV
          fi

      - name: Show trace time range (for trim reference)
        run: |
          ssh $NODE "docker exec $CONTAINER python3 -c \"
          import sqlite3, re
          conn = sqlite3.connect('$SQLITE')
          row = conn.execute('SELECT MIN(start), MAX(end) FROM CUPTI_ACTIVITY_KIND_KERNEL').fetchone()
          if row and row[0]:
              print(f'Kernel time range: {row[0]/1e9:.1f}s ~ {row[1]/1e9:.1f}s (duration: {(row[1]-row[0])/1e9:.1f}s)')
          else:
              print('No kernels found in this SQLite')
          # Check NVTX markers
          for label, query in [
              ('TRT-LLM forward_step', \\\"s.value LIKE '%forward_step%'\\\"),
              ('SGLang decode', \\\"s.value LIKE 'decode%'\\\"),
              ('SGLang module', \\\"s.value LIKE '%model.model%Inputs%' AND s.value NOT LIKE '%layers%'\\\"),
          ]:
              rows = conn.execute(f'SELECT s.value, n.start, n.end FROM NVTX_EVENTS n JOIN StringIds s ON n.textId=s.id WHERE {query} AND n.end>n.start ORDER BY n.start').fetchall()
              if rows:
                  print(f'{label}: {len(rows)} events, {rows[0][1]/1e9:.1f}s ~ {rows[-1][2]/1e9:.1f}s (span {(rows[-1][2]-rows[0][1])/1e9:.1f}s)')
          conn.close()
          \" 2>&1"

      - name: Run analyze_nsys_sqlite.py
        run: |
          echo "SQLite: $SQLITE"
          ssh $NODE "docker exec $CONTAINER python3 $REPO/scripts/analyze_nsys_sqlite.py $SQLITE --gpu 0 --skip-first ${{ inputs.skip_first }} --max-steps ${{ inputs.max_steps }} --top-kernels 30 --per-layer --csv $REPO/$RESULT_DIR/nsys_kernel_breakdown.csv 2>&1" | tee /tmp/nsys_analysis.log

      - name: Show CSV
        if: always()
        run: ssh $NODE "head -40 $REPO/$RESULT_DIR/nsys_kernel_breakdown.csv 2>/dev/null || echo 'No CSV'"

      - name: Commit results
        if: always()
        run: |
          ssh $NODE "cd $REPO && git config user.email 'ci@github.com' && git config user.name 'B200 CI'"
          ssh $NODE "cd $REPO && git add -f $RESULT_DIR/nsys_kernel_breakdown.csv $RESULT_DIR/*.log $RESULT_DIR/*.md 2>/dev/null; git diff --cached --name-only"
          ssh $NODE "cd $REPO && if ! git diff --cached --quiet; then git commit -m 'data: B200 SGLang FP4 nsys kernel breakdown (SQLite analysis)

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>' && git push; else echo 'Nothing to commit'; fi"
