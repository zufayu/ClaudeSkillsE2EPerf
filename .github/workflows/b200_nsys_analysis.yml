name: B200 Nsys SQLite Analysis
on:
  workflow_dispatch:
    inputs:
      timerange:
        description: 'SQLite export time range in seconds (e.g. 60,120 for middle minute of 3min trace). Leave blank to use existing .sqlite'
        type: string
        default: ''
      skip_first:
        description: 'Skip first N decode steps'
        type: string
        default: '10'
      max_steps:
        description: 'Max decode steps to analyze'
        type: string
        default: '20'

jobs:
  nsys-analysis:
    runs-on: [self-hosted, b200]
    timeout-minutes: 60
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_sglang
      REPO: /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf
      RESULT_DIR: results/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep4_tp4_sglang059_nsys
    steps:
      - name: Sync repo
        run: ssh $NODE "cd $REPO && git fetch origin && git reset --hard origin/main"

      - name: Delete large CSV (cuda_gpu_trace, tens of GB, useless)
        run: |
          echo "=== Before cleanup ==="
          ssh $NODE "ls -lh $REPO/$RESULT_DIR/*csv* $REPO/$RESULT_DIR/*kernels* 2>/dev/null || echo 'No CSV files'"
          ssh $NODE "rm -f $REPO/$RESULT_DIR/*cuda_gpu_trace*.csv $REPO/$RESULT_DIR/*_kernels_cuda_gpu_trace.csv 2>/dev/null; true"
          echo "=== After cleanup ==="
          ssh $NODE "du -sh $REPO/$RESULT_DIR/ 2>/dev/null || echo 'No dir'"

      - name: List nsys files
        run: |
          echo "=== .nsys-rep files ==="
          ssh $NODE "ls -lh $REPO/$RESULT_DIR/*.nsys-rep 2>/dev/null || echo 'None'"
          echo "=== .sqlite files ==="
          ssh $NODE "ls -lh $REPO/$RESULT_DIR/*.sqlite 2>/dev/null || echo 'None'"

      - name: Trim nsys-rep to steady-state window
        run: |
          NSYS_REP=$(ssh $NODE "ls -t $REPO/$RESULT_DIR/*.nsys-rep 2>/dev/null | head -1")
          if [ -z "$NSYS_REP" ]; then
            echo "ERROR: No .nsys-rep file found"
            exit 1
          fi
          echo "Full trace: $NSYS_REP"
          ssh $NODE "ls -lh $NSYS_REP"
          TIMERANGE="${{ inputs.timerange }}"
          if [ -z "$TIMERANGE" ]; then
            echo "No timerange specified, auto-detecting middle 60s..."
            TOTAL_S=$(ssh $NODE "docker exec $CONTAINER nsys stats --report nvtx_sum --format csv $NSYS_REP 2>&1 | tail -1 | cut -d, -f1" 2>/dev/null || echo "")
            if [ -z "$TOTAL_S" ] || [ "$TOTAL_S" = "" ]; then
              echo "Cannot auto-detect duration, defaulting to 270,330 (middle of ~590s trace)"
              TIMERANGE="270,330"
            else
              MID=$((TOTAL_S / 2))
              TIMERANGE="$((MID - 30)),$((MID + 30))"
            fi
          fi
          echo "Using timerange: $TIMERANGE seconds"
          echo "TIMERANGE=$TIMERANGE" >> $GITHUB_ENV
          echo "NSYS_REP=$NSYS_REP" >> $GITHUB_ENV
          TRIMMED="$REPO/$RESULT_DIR/trace_trimmed_t${TIMERANGE//,/-}.nsys-rep"
          echo "Trimming to: $TRIMMED"
          ssh $NODE "docker exec $CONTAINER nsys filter -i $NSYS_REP -o $TRIMMED --time-range=$TIMERANGE --timeunit sec 2>&1" && echo "TRIMMED=$TRIMMED" >> $GITHUB_ENV || echo "WARN: nsys filter failed, trying export approach"
          if [ -z "$(grep TRIMMED $GITHUB_ENV 2>/dev/null)" ]; then
            echo "nsys filter not available, falling back to nsys export with timerange"
          fi
          ssh $NODE "ls -lh $TRIMMED 2>/dev/null || echo 'No trimmed file'"

      - name: Export SQLite (with timerange)
        run: |
          TIMERANGE="${{ inputs.timerange }}"
          if [ -z "$TIMERANGE" ]; then
            TIMERANGE="${TIMERANGE:-270,330}"
          fi
          SQLITE_OUT="$REPO/$RESULT_DIR/trace_t${TIMERANGE//,/-}.sqlite"
          echo "Exporting SQLite with --timerange $TIMERANGE"
          ssh $NODE "docker exec $CONTAINER nsys export --type sqlite --timeunit sec --timerange $TIMERANGE -o $SQLITE_OUT $NSYS_REP 2>&1" || echo "WARN: SQLite export failed"
          if ssh $NODE "test -f $SQLITE_OUT" 2>/dev/null; then
            echo "SQLITE=$SQLITE_OUT" >> $GITHUB_ENV
            ssh $NODE "ls -lh $SQLITE_OUT"
          else
            EXISTING=$(ssh $NODE "ls -t $REPO/$RESULT_DIR/*.sqlite 2>/dev/null | head -1")
            echo "Falling back to existing: $EXISTING"
            echo "SQLITE=$EXISTING" >> $GITHUB_ENV
          fi

      - name: Show trace time range (for trim reference)
        run: |
          ssh $NODE "docker exec $CONTAINER python3 -c \"
          import sqlite3, sys
          conn = sqlite3.connect('$SQLITE')
          # Overall kernel time range
          row = conn.execute('SELECT MIN(start), MAX(end) FROM CUPTI_ACTIVITY_KIND_KERNEL').fetchone()
          if row and row[0]:
              print(f'Kernel time range: {row[0]} ~ {row[1]} (duration: {(row[1]-row[0])/1e9:.1f}s)')
          # Decode NVTX markers time range
          rows = conn.execute(\\\"SELECT s.value, n.start, n.end FROM NVTX_EVENTS n JOIN StringIds s ON n.textId = s.id WHERE s.value LIKE 'decode%' AND n.end > n.start ORDER BY n.start\\\").fetchall()
          if rows:
              print(f'Decode events: {len(rows)} total')
              print(f'  First: ts={rows[0][1]} ({rows[0][2]-rows[0][1]:.0f}ns) — {rows[0][0][:60]}')
              print(f'  Last:  ts={rows[-1][1]} ({rows[-1][2]-rows[-1][1]:.0f}ns) — {rows[-1][0][:60]}')
              print(f'  Decode span: {rows[0][1]} ~ {rows[-1][2]} ({(rows[-1][2]-rows[0][1])/1e9:.1f}s)')
              # Steady-state window (skip first N)
              skip = ${{ inputs.skip_first }}
              steady = rows[skip:skip+${{ inputs.max_steps }}]
              if steady:
                  print(f'  Analyzed window (skip {skip}, max ${{ inputs.max_steps }}):')
                  print(f'    Start ts={steady[0][1]} ({steady[0][0][:60]})')
                  print(f'    End   ts={steady[-1][2]} ({steady[-1][0][:60]})')
                  print(f'    Window: {(steady[-1][2]-steady[0][1])/1e6:.1f}ms')
          conn.close()
          \" 2>&1"

      - name: Run analyze_nsys_sqlite.py
        run: |
          echo "SQLite: $SQLITE"
          ssh $NODE "docker exec $CONTAINER python3 $REPO/scripts/analyze_nsys_sqlite.py $SQLITE --gpu 0 --skip-first ${{ inputs.skip_first }} --max-steps ${{ inputs.max_steps }} --top-kernels 30 --per-layer --csv $REPO/$RESULT_DIR/nsys_kernel_breakdown.csv 2>&1" | tee /tmp/nsys_analysis.log

      - name: Show CSV
        if: always()
        run: ssh $NODE "head -40 $REPO/$RESULT_DIR/nsys_kernel_breakdown.csv 2>/dev/null || echo 'No CSV'"

      - name: Commit results
        if: always()
        run: |
          ssh $NODE "cd $REPO && git config user.email 'ci@github.com' && git config user.name 'B200 CI'"
          ssh $NODE "cd $REPO && git add -f $RESULT_DIR/nsys_kernel_breakdown.csv $RESULT_DIR/*.log $RESULT_DIR/*.md 2>/dev/null; git diff --cached --name-only"
          ssh $NODE "cd $REPO && if ! git diff --cached --quiet; then git commit -m 'data: B200 SGLang FP4 nsys kernel breakdown (SQLite analysis)

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>' && git push; else echo 'Nothing to commit'; fi"
