name: B200 SGLang FP4 EP1 TP4 Bench
on:
  workflow_dispatch:

jobs:
  sglang-fp4-ep1-tp4:
    runs-on: [self-hosted, b200]
    timeout-minutes: 60
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_sglang
      SFS: /SFS-aGqda6ct
      REPO: /home/ubuntu/zufa/ClaudeSkillsE2EPerf
      MODEL_FP4: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      RESULT_DIR: results/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep1_tp4_sglang059
    steps:
      - name: Sync repo
        run: |
          ssh $NODE "cd $REPO && git rebase --abort 2>/dev/null; rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null; git reset --hard 2>/dev/null; git checkout -B main origin/main --force 2>/dev/null; git pull --rebase origin main 2>/dev/null; true"
          ssh $NODE "cd $REPO && git log --oneline -3"

      - name: Verify container and GPU
        run: |
          ssh $NODE "docker exec $CONTAINER nvidia-smi --query-gpu=name,memory.total --format=csv,noheader | head -4"
          ssh $NODE "docker exec $CONTAINER python3 -c 'import sglang; print(f\"SGLang {sglang.__version__}\")'"

      - name: Get container image name
        run: echo "IMAGE=$(ssh $NODE "docker inspect $CONTAINER --format '{{.Config.Image}}'" 2>/dev/null || echo unknown)" >> $GITHUB_ENV

      - name: Run SGLang FP4 EP1 TP4 bench (chat c=64)
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'cd $REPO && bash scripts/sa_bench_sglang.sh --model $MODEL_FP4 --tp 4 --ep 1 --scenario chat --concurrency 64 --container-image ${{ env.IMAGE }} --result-dir ./$RESULT_DIR'"

      - name: Show results
        if: always()
        run: |
          ssh $NODE "ls -la $REPO/$RESULT_DIR/ 2>/dev/null || echo 'No result dir'"
          ssh $NODE "cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo 'No summary'"
