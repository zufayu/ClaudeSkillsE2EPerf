name: "MI355X Compare runtime env between zufa_atom and zufa_atom_ex"
on:
  workflow_dispatch:
jobs:
  diff:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 10
    env:
      A: zufa_atom
      B: zufa_atom_ex
    steps:
      - name: Compare full env vars
        shell: bash {0}
        run: |
          for C in $A $B; do
            echo "===== $C — env (sorted) ====="
            podman exec $C bash -c 'env | sort' > /tmp/env_$C.txt
            wc -l /tmp/env_$C.txt
          done
          echo "===== diff env (A vs B) ====="
          diff /tmp/env_$A.txt /tmp/env_$B.txt | head -80

      - name: Compare /dev visibility
        shell: bash {0}
        run: |
          for C in $A $B; do
            echo "===== $C — /dev/kfd /dev/dri ====="
            podman exec $C ls -la /dev/kfd /dev/dri 2>&1
            echo
          done

      - name: Compare rocminfo behavior
        shell: bash {0}
        run: |
          for C in $A $B; do
            echo "===== $C — which rocminfo ====="
            podman exec $C bash -c 'which rocminfo; ls -l /opt/rocm-7.2.2/bin/rocminfo 2>&1; /opt/rocm-7.2.2/bin/rocminfo 2>&1 | head -10; echo "exit: $?"'
            echo
          done

      - name: Compare aiter QuantType source
        shell: bash {0}
        run: |
          for C in $A $B; do
            echo "===== $C — find QuantType ====="
            podman exec $C grep -rn "QuantType" /app/aiter-test/aiter/ 2>/dev/null | head -10
            echo "--- python __dir__ ---"
            podman exec $C python3 -c "
            import sys
            sys.stderr = sys.stdout
            try:
                import aiter
                print('aiter dir:', [x for x in dir(aiter) if 'Quant' in x])
                print('aiter file:', aiter.__file__)
            except Exception as e:
                print('aiter import ERROR:', e)
            " 2>&1
            echo
          done

      - name: Inspect runtime config diff
        shell: bash {0}
        run: |
          for C in $A $B; do
            echo "===== $C ====="
            podman inspect $C --format '
Image: {{.ImageName}}
Created: {{.Created}}
SecurityOpt: {{.HostConfig.SecurityOpt}}
Privileged: {{.HostConfig.Privileged}}
IPC: {{.HostConfig.IpcMode}}
Network: {{.HostConfig.NetworkMode}}
PID: {{.HostConfig.PidMode}}
UTS: {{.HostConfig.UTSMode}}
Devices: {{.HostConfig.Devices}}
GroupAdd: {{.HostConfig.GroupAdd}}
CapAdd: {{.HostConfig.CapAdd}}
CapDrop: {{.HostConfig.CapDrop}}
Annotations:'
            podman inspect $C --format '{{json .Config.Annotations}}' 2>/dev/null | python3 -m json.tool 2>/dev/null | head -10
            echo
          done
