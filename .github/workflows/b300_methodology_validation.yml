name: "B300 Methodology Validation (R8d STEADY vs WARMUP self-check)"
# Regression sanity check for the R8d wide-sample profiling methodology.
# Runs trace_layer_detail.py twice on the same trace:
#   - STEADY: skip 5 warmup decodes, take 20 steady-state (~600 samples/op)
#             — this is the production methodology per PROFILING_METHODOLOGY.md
#   - WARMUP: skip 0, take first 5 — to verify the warmup-exclusion convention
#             actually matters (or doesn't, given collect-side warmup buffer)
# Phase 4 prints both side by side; STEADY is the canonical artifact.
#
# Earlier name: b300_test_profiling.yml (renamed in R8d cleanup; original
# pilot for R8c NEW vs LEGACY comparison — LEGACY now deprecated).
#
# No "Commit results" step — validation-only, no main pollution.
on:
  push:
    branches: [test/b300-validation]
    paths: ['.github/workflows/b300_methodology_validation.yml']
  workflow_dispatch:
    inputs:
      configs:
        type: choice
        options: [fp4-throughput, fp4-latency]
        default: fp4-throughput
      ep:
        type: string
        default: "8"
      tp:
        type: string
        default: "8"
      scenario:
        type: choice
        options: [chat, reasoning, summarize]
        default: chat
      concurrency:
        type: string
        default: "4"

jobs:
  profiling:
    runs-on: [self-hosted, b300]
    timeout-minutes: 60
    steps:
      - name: Pre-clean container-owned leftover (refactor bug workaround)
        run: |
          RUNNER_UID=$(id -u); RUNNER_GID=$(id -g)
          WS_PARENT=/home/zufa/actions-runner/_work/ClaudeSkillsE2EPerf
          # Try in-container chown first (cheap, works if zufa_sglang is up)
          docker exec zufa_sglang chown -R $RUNNER_UID:$RUNNER_GID "$WS_PARENT/ClaudeSkillsE2EPerf" 2>/dev/null || true
          # Robust fallback: throwaway root container chowns workspace from outside,
          # so checkout's clean step can rmdir container-owned leftovers.
          if [ -d "$WS_PARENT" ]; then
            docker run --rm -u 0 -v "$WS_PARENT:/ws" alpine sh -c "chown -R $RUNNER_UID:$RUNNER_GID /ws" 2>/dev/null \
              || docker run --rm -u 0 -v "$WS_PARENT:/ws" busybox sh -c "chown -R $RUNNER_UID:$RUNNER_GID /ws" 2>/dev/null \
              || true
          fi

      - uses: actions/checkout@v4

      - name: Ensure zufa_sglang container is running
        run: |
          if docker ps --format '{{.Names}}' | grep -qx 'zufa_sglang'; then
            echo "zufa_sglang already running"
          elif docker start zufa_sglang 2>/dev/null; then
            echo "started existing zufa_sglang container"
          else
            echo "container missing — recreating from b300_env_setup spec"
            docker rm -f zufa_sglang 2>/dev/null || true
            docker run -d --name zufa_sglang \
              --gpus all --ipc=host --net=host \
              --cap-add=SYS_PTRACE --security-opt seccomp=unconfined \
              -v /home/zufa:/home/zufa \
              -v /SFS-aGqda6ct:/SFS-aGqda6ct \
              -v /home:/home \
              -w /home/zufa \
              lmsysorg/sglang:v0.5.9-cu130 \
              sleep infinity
          fi
          docker ps --filter name=zufa_sglang --format 'name={{.Names}} status={{.Status}}'

      - name: Setup
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          export REPO="$GITHUB_WORKSPACE"
          export CONTAINER="zufa_sglang"
          ci_parse_configs "${{ inputs.configs }}"
          MODEL="$MODEL_FP4"
          ci_get_image
          ENV_TAG=$(ci_detect_env_tag sglang)
          RESULT_DIR=$(ci_result_dir "$PLATFORM" "$QUANT" "$MTP" "${{ inputs.ep }}" "${{ inputs.tp }}" "$ENV_TAG" "_profiling")
          for var in CONTAINER MODEL QUANT MTP MODE IMAGE ENV_TAG RESULT_DIR REPO EXEC_MODE PLATFORM CI_USER_NAME CI_USER_EMAIL; do
            echo "$var=${!var}" >> $GITHUB_ENV
          done
          echo "REPO=$REPO  RESULT_DIR=$RESULT_DIR"

      - name: Verify container
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          export REPO="$GITHUB_WORKSPACE"
          ci_verify_gpu
          ci_exec "python3 -c 'import sglang; print(f\"SGLang {sglang.__version__}\")'"

      - name: Clean old results
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          export REPO="$GITHUB_WORKSPACE"
          ci_exec "rm -rf $REPO/$RESULT_DIR/* 2>/dev/null; true"

      - name: "Phase 1: Torch trace capture"
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          export REPO="$GITHUB_WORKSPACE"
          ARGS="--model $MODEL --tp ${{ inputs.tp }} --ep ${{ inputs.ep }} --scenario ${{ inputs.scenario }} --concurrency ${{ inputs.concurrency }} --quant $QUANT --env $ENV_TAG --platform $PLATFORM --container-image $IMAGE --result-dir ./$RESULT_DIR"
          ci_exec "cd $REPO && bash scripts/collect_sglang_trace.sh $ARGS"

      - name: "Phase 2: Fix overlapping kernels"
        continue-on-error: true
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          export REPO="$GITHUB_WORKSPACE"
          TRACE=$(ls $REPO/$RESULT_DIR/*TP-0-EP-0*.trace.json.gz 2>/dev/null | grep -v serialized | grep -v '.fix.' | head -1)
          if [ -n "$TRACE" ]; then
            ci_exec "cd $REPO && python3 scripts/fix_torch_trace_pro.py $TRACE"
          fi

      - name: "Phase 3a: STEADY (skip 5 warmup, 20 steady-state steps)"
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          export REPO="$GITHUB_WORKSPACE"
          TRACE=$(ls $REPO/$RESULT_DIR/*TP-0-EP-0*.fix.json.gz 2>/dev/null | head -1)
          if [ -n "$TRACE" ]; then
            ci_exec "cd $REPO && mkdir -p ./$RESULT_DIR/STEADY && python3 scripts/trace_layer_detail.py $TRACE --output-dir ./$RESULT_DIR/STEADY --layer-range 10-40 --skip-warmup-steps 5 --max-steps 20"
          fi

      - name: "Phase 3b: WARMUP (no skip, first 5 steps) — sanity check"
        continue-on-error: true
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          export REPO="$GITHUB_WORKSPACE"
          TRACE=$(ls $REPO/$RESULT_DIR/*TP-0-EP-0*.fix.json.gz 2>/dev/null | head -1)
          if [ -n "$TRACE" ]; then
            ci_exec "cd $REPO && mkdir -p ./$RESULT_DIR/WARMUP && python3 scripts/trace_layer_detail.py $TRACE --output-dir ./$RESULT_DIR/WARMUP --layer-range 10-40 --skip-warmup-steps 0 --max-steps 5"
          fi

      - name: "Phase 4: STEADY vs WARMUP comparison + STEADY summary"
        if: always()
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          export REPO="$GITHUB_WORKSPACE"
          STEADY_CSV=$(ci_exec_host "ls $REPO/$RESULT_DIR/STEADY/decode_breakdown_*.csv 2>/dev/null | head -1")
          WARMUP_CSV=$(ci_exec_host "ls $REPO/$RESULT_DIR/WARMUP/decode_breakdown_*.csv 2>/dev/null | head -1")
          echo "STEADY_CSV=$STEADY_CSV"
          echo "WARMUP_CSV=$WARMUP_CSV"
          if [ -n "$STEADY_CSV" ] && [ -n "$WARMUP_CSV" ]; then
            ci_exec_host "python3 - <<'PYEOF'
          import csv
          def load(p):
              rows = {}
              with open(p) as f:
                  for r in csv.DictReader(f):
                      op = r.get('B200_Operator','').strip()
                      if not op or op.startswith('B200 ') or op.startswith('PASS'): continue
                      try:
                          rows[op] = (
                              float(r['B200_Avg_us']),
                              float(r.get('B200_Median_us', r['B200_Avg_us'])),
                              float(r.get('B200_P95_us', r['B200_Avg_us'])),
                              float(r.get('B200_CV_pct', 0) or 0),
                              int(r.get('B200_N_samples', 0) or 0),
                          )
                      except: pass
              return rows
          steady = load('$STEADY_CSV')
          warmup = load('$WARMUP_CSV')
          common = sorted(set(steady) & set(warmup))
          if not common:
              print('no common ops'); raise SystemExit(0)
          steady_n = list(steady.values())[0][4]
          warmup_n = list(warmup.values())[0][4]
          print(f'{\"Operator\":35s} | {\"STEADY μs\":>10s} {\"med\":>6s} {\"p95\":>6s} {\"CV%\":>5s} N={steady_n:>4d} | {\"WARM μs\":>8s} {\"CV%\":>5s} N={warmup_n:>3d} | warmup Δ%')
          print('-' * 130)
          for op in common:
              sm, smed, sp95, scv, sn = steady[op]
              wm, wmed, wp95, wcv, wn = warmup[op]
              dpct = (wm - sm) / sm * 100 if sm > 0 else 0
              print(f'{op[:35]:35s} | {sm:>10.2f} {smed:>6.1f} {sp95:>6.1f} {scv:>5.1f}% {sn:>4d} | {wm:>8.2f} {wcv:>5.1f}% {wn:>3d} | {dpct:+5.1f}%')
          mean_shift = sum(abs((warmup[o][0]-steady[o][0])/steady[o][0]*100) for o in common if steady[o][0]>0)/len(common)
          print(f'\\nSummary (STEADY = production estimate, will be compared with MI355X):')
          print(f'  common ops:        {len(common)}')
          print(f'  STEADY avg CV:     {sum(steady[o][3] for o in common)/len(common):.1f}%   (lower = tighter mean estimate)')
          print(f'  WARMUP avg CV:     {sum(warmup[o][3] for o in common)/len(common):.1f}%   (higher = warmup polluted, expected)')
          print(f'  warmup-vs-steady mean shift: {mean_shift:.1f}%')
          # Methodology stability assertions (R8d guard rails):
          #   1. STEADY must have full sample budget (>= 600 = 20 step × 30 layer).
          #      Falling below means trace was too short or analyzer regressed.
          #   2. warmup-vs-steady mean shift must be < 5%. Larger shift means
          #      either collect-side warmup buffer broke, or analyzer-side
          #      skip-warmup is being undercut.
          #   3. STEADY avg CV must be sane (< 30%). Larger means new noise
          #      source (DVFS thrash, container contention, ...) — investigate.
          assertions = []
          if steady_n < 600: assertions.append(f'STEADY_N={steady_n} < 600 (under-sampled)')
          if mean_shift >= 5.0: assertions.append(f'mean shift {mean_shift:.1f}% >= 5% (warmup convention broken)')
          steady_cv = sum(steady[o][3] for o in common)/len(common)
          if steady_cv >= 30.0: assertions.append(f'STEADY avg CV {steady_cv:.1f}% >= 30% (new noise source)')
          if assertions:
              print('\\n=== METHODOLOGY ASSERTION FAILURES ===')
              for a in assertions: print(f'  FAIL: {a}')
              raise SystemExit(3)
          print('\\n=== methodology assertions: all pass ===')
          PYEOF
          "
          else
            echo "ERROR: missing STEADY or WARMUP CSV"
            ci_exec_host "ls -la $REPO/$RESULT_DIR/STEADY/ 2>/dev/null; ls -la $REPO/$RESULT_DIR/WARMUP/ 2>/dev/null"
          fi

      - name: Fix file ownership (always)
        if: always()
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          export REPO="$GITHUB_WORKSPACE"
          ci_fix_ownership "$RESULT_DIR" || true
