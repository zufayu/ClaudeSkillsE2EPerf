name: Setup B300 SGLang
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: [self-hosted, b300]
    env:
      CONTAINER: zufa_sglang
      IMAGE: lmsysorg/sglang:v0.5.9-cu130
      REPO: /home/zufayu/ClaudeSkillsE2EPerf
    steps:
      - name: Remove old container, start zufa_sglang
        run: |
          docker rm -f $CONTAINER 2>/dev/null || true
          docker run -d --name $CONTAINER --gpus all --ipc host --ulimit memlock=-1 --ulimit stack=67108864 -v /home:/home -v /models:/models --shm-size=64g -p 8888:8888 --cap-add=SYS_PTRACE $IMAGE sleep infinity
          echo "Container $CONTAINER started"

      - name: Verify GPU + SGLang
        run: |
          echo "=== GPU ==="
          docker exec $CONTAINER nvidia-smi --query-gpu=index,name,memory.total --format=csv,noheader
          echo "=== SGLang version ==="
          docker exec $CONTAINER python3 -c 'import sglang; print(f"SGLang {sglang.__version__}")'
          echo "=== CUDA ==="
          docker exec $CONTAINER python3 -c 'import torch; print(f"CUDA {torch.version.cuda}, PyTorch {torch.__version__}")'

      - name: Check disk and find models
        run: |
          echo "=== Disk ==="
          df -h / | tail -1
          echo "=== Home ==="
          ls /home/zufayu/
          echo "=== Looking for DeepSeek models ==="
          find /home /data /mnt /models 2>/dev/null -maxdepth 3 -name "config.json" -path "*DeepSeek*" | head -10 || echo "No DeepSeek models found in common paths"
          echo "=== Looking for FP4 models ==="
          find /home /data /mnt /models 2>/dev/null -maxdepth 3 -name "config.json" -path "*FP4*" | head -10 || echo "No FP4 models found"

      - name: Verify repo
        run: |
          echo "=== Repo ==="
          cd $REPO && git log --oneline -3 && git status --short
