  # ============================================================
  # Commit all results
  # ============================================================
  commit-results:
    runs-on: [self-hosted, mi355x]
    needs: rocm711-ep4-tp4
    if: always()
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
    steps:
      - name: Sync repo
        run: cd $REPO && git stash 2>/dev/null || true && git pull --rebase && git stash pop 2>/dev/null || true

      - name: Commit and push all results
        run: |
          cd $REPO
          git config user.email "ci@github.com"
          git config user.name "MI355X CI"
          git add -f results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_*_rocm7*/ 2>/dev/null || true
          echo "=== Staged files ==="
          git diff --cached --name-only
          if ! git diff --cached --quiet; then
            git commit -m "data: MI355X MXFP4 bench — EP1/EP4/EP8 × TP4/TP8 × ROCm 7.1.1/7.2.1 (chat c=64)

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
            git push
          else
            echo "Nothing to commit"
          fi

      - name: Show summary
        if: always()
        run: |
          cd $REPO
          for d in results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_*_rocm7*/; do
            echo "=== $d ==="
            cat "$d/summary.md" 2>/dev/null || echo "No summary"
            echo ""
          done
