name: MI355X MXFP4 Bench
on:
  push:
    paths:
      - '.github/workflows/mi355x_mxfp4_bench.yml'
jobs:
  # ============================================================
  # zufa_atom2 (ROCm 7.2.1) — 4 configs
  # ============================================================
  rocm721-ep1-tp8:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 60
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom2
      MODEL: /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4
    steps:
      - name: Sync repo
        run: cd $REPO && git stash 2>/dev/null || true && git pull --rebase && git stash pop 2>/dev/null || true

      - name: Get container image name
        run: echo "IMAGE=$(podman inspect $CONTAINER --format '{{.Config.Image}}' 2>/dev/null || echo unknown)" >> $GITHUB_ENV

      - name: Run MXFP4 EP1 TP8 bench (chat c=64)
        run: podman exec $CONTAINER bash -c "cd $REPO && bash scripts/sa_bench_mi355x.sh --model-mxfp4 $MODEL --configs mxfp4-throughput --scenario chat --concurrency 64 --tp 8 --container-image '${{ env.IMAGE }}' --result-dir ./results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_ep1_tp8_rocm721"

      - name: Show results
        if: always()
        run: cat $REPO/results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_ep1_tp8_rocm721/summary.md 2>/dev/null || echo "No summary"

  rocm721-ep8-tp8:
    runs-on: [self-hosted, mi355x]
    needs: rocm721-ep1-tp8
    timeout-minutes: 60
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom2
      MODEL: /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4
    steps:
