name: B200 FP4 Profiling
on:
  workflow_dispatch:
jobs:
  fp4-ep8-profiling:
    runs-on: [self-hosted, b200]
    timeout-minutes: 120
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_trt
      SFS: /SFS-aGqda6ct
      REPO: /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf
      MODEL_FP4: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      RESULT_DIR: results/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep8_tp8_post2_profiling
    steps:
      - name: Sync repo
        run: |
          ssh $NODE "cd $REPO && git rebase --abort 2>/dev/null; rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null; git reset --hard 2>/dev/null; git checkout -B main origin/main --force 2>/dev/null; git pull --rebase origin main 2>/dev/null; true"
          ssh $NODE "cd $REPO && git log --oneline -3"

      - name: Verify container and GPU
        run: |
          ssh $NODE "docker exec $CONTAINER nvidia-smi --query-gpu=name,memory.total --format=csv,noheader | head -2"

      - name: Clean old results
        run: ssh $NODE "docker exec $CONTAINER bash -c 'rm -rf $REPO/$RESULT_DIR/* 2>/dev/null; true' && rm -rf $REPO/$RESULT_DIR/* 2>/dev/null; true"

      - name: Run FP4 EP8 profiling (serve mode, chat c=64, DP=false)
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'cd $REPO && bash scripts/collect_nsys_trace.sh --model $MODEL_FP4 --mode serve --scenario chat --concurrency 64 --quant fp4 --config throughput --tp 8 --ep 8 --dp false --trace-dir ./$RESULT_DIR --skip-export'"

      - name: Show profiling results
        if: always()
        run: |
          ssh $NODE "ls -la $REPO/$RESULT_DIR/ 2>/dev/null || echo 'No result dir'"
          ssh $NODE "cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo 'No summary'"

      - name: Git commit and push results
        if: always()
        run: |
          ssh $NODE "cd $REPO && git config user.email 'ci@github.com' && git config user.name 'B200 CI'"
          ssh $NODE "cd $REPO && git reset HEAD 2>/dev/null; for ext in log yml jsonl json md csv xlsx; do git add -f $RESULT_DIR/*.\$ext 2>/dev/null; done; git diff --cached --name-only"
          ssh $NODE "cd $REPO && if ! git diff --cached --quiet; then git commit -m 'data: B200 FP4 EP=8 TP=8 profiling serve mode (chat c=64, post2)

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>' && git pull --rebase origin main && git push; else echo 'Nothing to commit'; fi"

      - name: Show final state
        if: always()
        run: ssh $NODE "cd $REPO && git log --oneline -3"
