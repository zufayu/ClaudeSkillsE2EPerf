name: "B200 Shell"
on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run'
        type: string
        default: 'echo hello'
      node:
        description: 'Node (empty=local, or hostname like hungry-hippo-fin-03-3)'
        type: string
        default: ''
permissions:
  contents: write
jobs:
  shell:
    runs-on: [self-hosted, b200]
    timeout-minutes: 120
    steps:
      - name: Run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.node }}" ]; then
            ssh ${{ inputs.node }} 'export GH_TOKEN='"$GH_TOKEN"'; ${{ inputs.command }}'
          else
            bash -c '${{ inputs.command }}'
          fi
