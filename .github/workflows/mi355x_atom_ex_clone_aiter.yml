name: "MI355X Clone aiter from zufa_atom to zufa_atom_ex"
on:
  workflow_dispatch:
jobs:
  clone:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 20
    env:
      WORKING: zufa_atom
      NEW: zufa_atom_ex
    steps:
      - name: Compare aiter installs
        shell: bash {0}
        run: |
          for C in $WORKING $NEW; do
            echo "===== $C ====="
            podman exec $C bash -c '
              echo "--- python aiter location ---"
              python3 -c "import aiter; print(aiter.__file__)"
              echo "--- pip show aiter ---"
              pip show aiter 2>&1 | head -10
              echo "--- /app/aiter-test/aiter contents ---"
              ls /app/aiter-test/aiter/__init__.py 2>&1 && head -20 /app/aiter-test/aiter/__init__.py
              echo "--- has QuantType? ---"
              grep -n "QuantType" /app/aiter-test/aiter/__init__.py 2>&1 | head -5
              echo "--- aiter dir size ---"
              du -sh /app/aiter-test 2>&1
              echo "--- git in /app/aiter-test? ---"
              cd /app/aiter-test && git rev-parse HEAD 2>&1 && git log -1 --pretty=oneline 2>&1
            '
            echo
          done

      - name: Copy aiter from working to new
        shell: bash {0}
        run: |
          echo "=== Tar aiter-test from $WORKING and untar into $NEW ==="
          podman exec $WORKING tar -C /app -cf - aiter-test | podman exec -i $NEW bash -c 'mv /app/aiter-test /app/aiter-test.bak && tar -C /app -xf -'
          echo "=== Verify ==="
          podman exec $NEW bash -c 'grep -n "QuantType" /app/aiter-test/aiter/__init__.py 2>&1 | head -3'
          podman exec $NEW python3 -c "from aiter import QuantType; print('QuantType import OK:', QuantType)" 2>&1

      - name: Smoke test ATOM import after aiter swap
        shell: bash {0}
        run: |
          podman exec $NEW python3 -c "
          import atom
          import atom.entrypoints.openai_server as srv
          print('ATOM import OK')
          " 2>&1

      - name: Compare GPU/HIP environment
        shell: bash {0}
        run: |
          for C in $WORKING $NEW; do
            echo "===== $C ====="
            echo "--- env (HIP/ROCM/HSA/PATH/LD_LIBRARY_PATH) ---"
            podman exec $C bash -c 'env | grep -E "^(HIP|ROCM|HSA|ROCR|PYTORCH|TORCH|PATH|LD_LIBRARY_PATH)=" | sort'
            echo "--- torch cuda available ---"
            podman exec $C python3 -c "import torch; print(torch.cuda.is_available(), torch.cuda.device_count())" 2>&1
            echo "--- rocminfo path ---"
            podman exec $C which rocminfo 2>&1
            podman exec $C bash -c '/opt/rocm-7.2.2/bin/rocminfo 2>&1 | head -3' || true
            echo
          done
