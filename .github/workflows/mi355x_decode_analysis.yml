name: MI355X ATOM Decode Analysis
on:
  workflow_dispatch:

jobs:
  decode-analysis:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 30
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
      TRACE_DIR: results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_ep4_tp4_rocm711_profiling
    steps:
      - name: Sync repo
        run: cd $REPO && git fetch origin && git reset --hard origin/main

      - name: Find trace files
        run: |
          echo "=== .json.gz trace files ==="
          ls -lh $REPO/$TRACE_DIR/*.json.gz 2>/dev/null || echo "No traces in result dir"
          echo "=== Container traces ==="
          podman exec $CONTAINER bash -c "find $REPO/$TRACE_DIR /tmp/trace -name '*.json.gz' 2>/dev/null | head -20" || echo "None"
          echo "=== Result JSONs ==="
          ls -lh $REPO/$TRACE_DIR/result_*.json 2>/dev/null || echo "No result JSONs"

      - name: Check TPOT from benchmark results
        run: |
          echo "=== Result JSONs on host ==="
          ls -lh $REPO/$TRACE_DIR/result_*.json 2>/dev/null || echo "None on host"
          echo "=== Result JSONs in container ==="
          podman exec $CONTAINER bash -c "ls -lh $REPO/$TRACE_DIR/result_*.json 2>/dev/null || echo 'None in container'"
          echo "=== All result JSONs under mi355x_dsr_mxfp4 ==="
          ls -lh $REPO/results/mi355x_dsr_mxfp4/*/result_*.json 2>/dev/null | head -10 || echo "None"
          echo "=== TPOT values ==="
          podman exec $CONTAINER python3 << PYEOF
          import json, glob, os
          base = '$REPO/results/mi355x_dsr_mxfp4'
          files = glob.glob(f'{base}/mi355x_dsr_mxfp4_mtp0_ep4_tp4_rocm711_profiling/result_*.json')
          if not files:
              files = glob.glob(f'{base}/*/result_*.json')
          print(f'Found {len(files)} result files')
          for f in sorted(files):
              with open(f) as fh:
                  d = json.load(fh)
              name = f.split('/')[-1]
              tpot = d.get('tpot_p50', d.get('median_tpot_ms', 'N/A'))
              ttft = d.get('ttft_p50', d.get('median_ttft_ms', 'N/A'))
              out_tps = d.get('output_throughput', 'N/A')
              conc = d.get('max_concurrency', d.get('concurrency', 'N/A'))
              print(f'{name}: TPOT_p50={tpot}ms TTFT_p50={ttft}ms out_tps={out_tps} conc={conc}')
          PYEOF

      - name: Analyze ATOM trace decode steps
        timeout-minutes: 20
        run: |
          # Find a trace file
          TRACE=$(ls -t $REPO/$TRACE_DIR/*.json.gz 2>/dev/null | grep -v capture | head -1)
          if [ -z "$TRACE" ]; then
            TRACE=$(podman exec $CONTAINER bash -c "find $REPO/$TRACE_DIR /tmp/trace/rank_0 -name '*.json.gz' ! -name '*capture*' -type f 2>/dev/null | head -1")
          fi
          if [ -z "$TRACE" ]; then
            echo "No trace file found"
            exit 0
          fi
          echo "Trace: $TRACE"
          ls -lh "$TRACE" 2>/dev/null || podman exec $CONTAINER ls -lh "$TRACE"

          podman exec $CONTAINER python3 << PYEOF
          import gzip, json, re, sys
          from collections import Counter

          trace_path = "$TRACE"
          print(f"Loading {trace_path} (streaming, only keeping decode/prefill events)...")

          # Stream-parse: read line by line from the gzipped JSON array
          # Chrome trace format: {"traceEvents": [{...}, {...}, ...]}
          # We only keep user_annotation events to avoid OOM on 550MB+ traces
          decode_events = []
          prefill_events = []
          ann_names = Counter()
          total_events = 0
          cats = Counter()

          with gzip.open(trace_path, 'rt') as f:
              # Try to parse as standard Chrome trace JSON
              # For large files, use incremental JSON decoder
              decoder = json.JSONDecoder()
              buf = f.read()
              print(f"Decompressed size: {len(buf)/1e6:.0f}MB")

              data = json.loads(buf)
              del buf  # free memory

              events = data.get('traceEvents', data if isinstance(data, list) else [])
              total_events = len(events)
              print(f"Total events: {total_events}")

              for e in events:
                  cat = e.get('cat', 'none')
                  cats[cat] += 1
                  if e.get('ph') != 'X':
                      continue
                  if cat == 'gpu_user_annotation' or 'user_annotation' in cat:
                      name = e.get('name', '')
                      ann_names[name[:60]] += 1
                      if name.startswith('decode[') or name.startswith('decode '):
                          decode_events.append({'name': name, 'ts': e.get('ts', 0), 'dur': e.get('dur', 0)})
                      elif name.startswith('prefill'):
                          prefill_events.append({'name': name, 'ts': e.get('ts', 0), 'dur': e.get('dur', 0)})

              del events, data  # free memory

          print(f"\nEvent categories (top 10):")
          for cat, cnt in cats.most_common(10):
              print(f"  {cnt:>8}x  {cat}")

          print(f"\n=== User Annotations ===")
          for name, cnt in ann_names.most_common(20):
              print(f"  {cnt:>6}x  {name}")

          print(f"\n=== Decode Events ===")
          print(f"Total decode annotations: {len(decode_events)}")
          print(f"Total prefill annotations: {len(prefill_events)}")

          if decode_events:
              bs_counter = Counter()
              for e in decode_events:
                  m = re.search(r'bs=(\d+)', e['name'])
                  if m:
                      bs_counter[int(m.group(1))] += 1
                  else:
                      bs_counter[-1] += 1
              print(f"\nDecode batch sizes: {dict(bs_counter)}")

              durs_ms = [e['dur'] / 1000 for e in decode_events]
              print(f"\nAll decode durations ({len(durs_ms)} events):")
              print(f"  avg={sum(durs_ms)/len(durs_ms):.2f}ms  min={min(durs_ms):.2f}ms  max={max(durs_ms):.2f}ms")

              for bs, cnt in sorted(bs_counter.items()):
                  if bs >= 0:
                      bs_durs = [e['dur']/1000 for e in decode_events if f'bs={bs}' in e['name']]
                  else:
                      bs_durs = [e['dur']/1000 for e in decode_events if 'bs=' not in e['name']]
                  if bs_durs:
                      print(f"  bs={bs}: {len(bs_durs)} events, avg={sum(bs_durs)/len(bs_durs):.2f}ms, min={min(bs_durs):.2f}ms, max={max(bs_durs):.2f}ms")

              starts = sorted(e['ts'] for e in decode_events)
              span_s = (starts[-1] - starts[0]) / 1e6
              print(f"\nDecode time span: {span_s:.1f}s")
              if span_s > 0:
                  print(f"Decode rate: {len(decode_events)/span_s:.1f} steps/s")

              sorted_decode = sorted(decode_events, key=lambda e: e['ts'])
              print(f"\nFirst 3 decode events:")
              for e in sorted_decode[:3]:
                  print(f"  t={e['ts']/1e6:.1f}s dur={e['dur']/1000:.2f}ms name={e['name']}")
              print(f"Last 3 decode events:")
              for e in sorted_decode[-3:]:
                  print(f"  t={e['ts']/1e6:.1f}s dur={e['dur']/1000:.2f}ms name={e['name']}")
          PYEOF
