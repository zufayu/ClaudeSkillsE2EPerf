name: B200 SGLang FP4 Profiling
on:
  workflow_dispatch:
    inputs:
      tp:
        description: "Tensor parallel size"
        type: string
        default: "4"
      ep:
        description: "Expert parallel size"
        type: string
        default: "1"
      scenario:
        description: "Scenario"
        type: choice
        options: [chat, reasoning, summarize]
        default: chat
      concurrency:
        description: "Concurrency"
        type: string
        default: "64"
jobs:
  sglang-fp4-profiling:
    runs-on: [self-hosted, b200]
    timeout-minutes: 180
    env:
      CONTAINER: zufa_sglang
      REPO: /home/zufayu/ClaudeSkillsE2EPerf
      MODEL_FP4: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      RESULT_DIR: results/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep${{ inputs.ep }}_tp${{ inputs.tp }}_sglang059_profiling
    steps:
      - name: Sync repo
        run: cd $REPO && git fetch origin && git reset --hard origin/main

      - name: Ensure zufa_sglang container is running
        run: |
          if docker ps --format '{{.Names}}' | grep -qx 'zufa_sglang'; then
            echo "zufa_sglang already running"
          elif docker start zufa_sglang 2>&1 | grep -q zufa_sglang; then
            echo "started existing zufa_sglang container"
          else
            echo "ERROR: zufa_sglang container missing on b200-node1."
            echo "Re-create manually (mount paths are host-specific, not safe to auto-recreate):"
            echo "  docker run -d --name zufa_sglang --gpus all --ipc=host --net=host \\"
            echo "    --cap-add=SYS_PTRACE --security-opt seccomp=unconfined \\"
            echo "    -v /home/zufayu:/home/zufayu -v /SFS-aGqda6ct:/SFS-aGqda6ct \\"
            echo "    lmsysorg/sglang:v0.5.9-cu130 sleep infinity"
            exit 1
          fi
          docker ps --filter name=zufa_sglang --format 'name={{.Names}} status={{.Status}}'

      - name: Verify container
        run: |
          docker exec $CONTAINER nvidia-smi --query-gpu=name,memory.total --format=csv,noheader | head -2
          docker exec $CONTAINER python3 -c 'import sglang; print(f"SGLang {sglang.__version__}")'

      - name: Get container image name
        run: echo "IMAGE=$(docker inspect $CONTAINER --format '{{.Config.Image}}' 2>/dev/null || echo unknown)" >> $GITHUB_ENV

      - name: Fix git safe.directory
        run: |
          docker exec $CONTAINER bash -c "git config --global --unset-all safe.directory 2>/dev/null; git config --global --add safe.directory /home/zufayu/ClaudeSkillsE2EPerf"

      - name: Clean old results
        run: docker exec $CONTAINER bash -c "rm -rf $REPO/$RESULT_DIR/result_profiled_*.json $REPO/$RESULT_DIR/decode_walltime_*.csv $REPO/$RESULT_DIR/summary.md $REPO/$RESULT_DIR/*.log 2>/dev/null; true"

      # ===== Phase 1: Full Torch Trace (Primary Analysis) =====
      - name: "Phase 1: Full torch trace capture (${{ inputs.scenario }} c=${{ inputs.concurrency }}, TP${{ inputs.tp }} EP${{ inputs.ep }})"
        run: |
          docker exec $CONTAINER bash -c "cd $REPO && bash scripts/collect_sglang_trace.sh --model $MODEL_FP4 --tp ${{ inputs.tp }} --ep ${{ inputs.ep }} --scenario ${{ inputs.scenario }} --concurrency ${{ inputs.concurrency }} --env sglang059 --container-image ${{ env.IMAGE }} --result-dir ./$RESULT_DIR"

      - name: Show torch trace results
        if: always()
        run: |
          bash -c "ls -lh $REPO/$RESULT_DIR/*.json.gz 2>/dev/null | head -10 || echo 'No trace files'"
          bash -c "cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo 'No summary'"
          for f in $(bash -c "ls $REPO/$RESULT_DIR/result_profiled_*.json 2>/dev/null"); do
            echo "=== $(basename $f) ==="
            bash -c "python3 -c \"import json; d=json.load(open('$f')); print(f'Output Tput: {d.get(\\\"output_throughput\\\",0):.1f}, TPOT p50: {d.get(\\\"tpot_p50\\\", d.get(\\\"median_tpot_ms\\\",0)):.1f}ms, TTFT p50: {d.get(\\\"ttft_p50\\\", d.get(\\\"median_ttft_ms\\\",0)):.1f}ms')\"" 2>/dev/null || echo "parse failed"
          done

      # ===== Phase 2: Short Nsys Trace (Reference for Nsight Visualization) =====
      - name: "Phase 2: Short nsys capture (~5s steady state, TP${{ inputs.tp }} EP${{ inputs.ep }})"
        run: |
          NSYS_DIR=$RESULT_DIR/nsys
          docker exec $CONTAINER bash -c "cd $REPO && bash scripts/collect_sglang_nsys_trace.sh --model $MODEL_FP4 --tp ${{ inputs.tp }} --ep ${{ inputs.ep }} --scenario ${{ inputs.scenario }} --concurrency ${{ inputs.concurrency }} --bench-prompts 64 --skip-export --env sglang059 --result-dir ./$NSYS_DIR"

      - name: Show nsys reference trace
        if: always()
        run: |
          bash -c "ls -lh $REPO/$RESULT_DIR/nsys/*.nsys-rep 2>/dev/null || echo 'No nsys-rep file'"
          bash -c "ls -lh $REPO/$RESULT_DIR/nsys/ 2>/dev/null || echo 'No nsys dir'"

      # ===== Commit Results (torch analysis only, no large trace files) =====
      - name: Git commit and push results
        if: always()
        run: |
          bash -c "cd $REPO && git config user.email 'ci@github.com' && git config user.name 'B200 CI'"
          bash -c "cd $REPO && git reset HEAD 2>/dev/null; git add -u $RESULT_DIR/ 2>/dev/null; for ext in log yml jsonl json md csv; do git add -f $RESULT_DIR/*.\$ext 2>/dev/null; done; git diff --cached --name-only"
          bash -c "cd $REPO && if ! git diff --cached --quiet; then git commit -m 'data: B200 SGLang FP4 profiling (torch trace + nsys ref, chat c=64)

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>' && git pull --rebase origin main && git push; else echo 'Nothing to commit'; fi"

      - name: Show final state
        if: always()
        run: bash -c "cd $REPO && git log --oneline -3"
