name: B200 SGLang FP4 Profiling
on:
  workflow_dispatch:
jobs:
  sglang-fp4-profiling:
    runs-on: [self-hosted, b200]
    timeout-minutes: 180
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_sglang
      REPO: /home/ubuntu/zufa/ClaudeSkillsE2EPerf
      MODEL_FP4: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      RESULT_DIR: results/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep4_tp4_sglang059_profiling
    steps:
      - name: Sync repo
        run: |
          ssh $NODE "cd $REPO && git rebase --abort 2>/dev/null; rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null; git reset --hard 2>/dev/null; git checkout -B main origin/main --force 2>/dev/null; git pull --rebase origin main 2>/dev/null; true"

      - name: Verify container
        run: |
          ssh $NODE "docker exec $CONTAINER nvidia-smi --query-gpu=name,memory.total --format=csv,noheader | head -2"
          ssh $NODE "docker exec $CONTAINER python3 -c 'import sglang; print(f\"SGLang {sglang.__version__}\")'"

      - name: Get container image name
        run: echo "IMAGE=$(ssh $NODE "docker inspect $CONTAINER --format '{{.Config.Image}}'" 2>/dev/null || echo unknown)" >> $GITHUB_ENV

      - name: Clean old results
        run: ssh $NODE "docker exec $CONTAINER bash -c 'rm -rf $REPO/$RESULT_DIR/* 2>/dev/null; true' && rm -rf $REPO/$RESULT_DIR/* 2>/dev/null; true"

      # ===== Phase 1: Full Torch Trace (Primary Analysis) =====
      - name: "Phase 1: Full torch trace capture (chat c=64, TP4 EP4)"
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'cd $REPO && bash scripts/collect_sglang_trace.sh --model $MODEL_FP4 --tp 4 --ep 4 --scenario chat --concurrency 64 --env sglang059 --container-image ${{ env.IMAGE }} --result-dir ./$RESULT_DIR'"

      - name: Show torch trace results
        if: always()
        run: |
          ssh $NODE "ls -lh $REPO/$RESULT_DIR/*.json.gz 2>/dev/null | head -10 || echo 'No trace files'"
          ssh $NODE "cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo 'No summary'"
          for f in $(ssh $NODE "ls $REPO/$RESULT_DIR/result_profiled_*.json 2>/dev/null"); do
            echo "=== $(basename $f) ==="
            ssh $NODE "python3 -c \"import json; d=json.load(open('$f')); print(f'Output Tput: {d.get(\\\"output_throughput\\\",0):.1f}, TPOT p50: {d.get(\\\"tpot_p50\\\", d.get(\\\"median_tpot_ms\\\",0)):.1f}ms, TTFT p50: {d.get(\\\"ttft_p50\\\", d.get(\\\"median_ttft_ms\\\",0)):.1f}ms')\"" 2>/dev/null || echo "parse failed"
          done

      # ===== Phase 2: Short Nsys Trace (Reference for Nsight Visualization) =====
      - name: "Phase 2: Short nsys capture (~5s steady state, reference only)"
        run: |
          NSYS_DIR=$RESULT_DIR/nsys
          ssh $NODE "docker exec $CONTAINER bash -c 'cd $REPO && bash scripts/collect_sglang_nsys_trace.sh --model $MODEL_FP4 --tp 4 --ep 4 --scenario chat --concurrency 64 --bench-prompts 64 --skip-export --env sglang059 --result-dir ./$NSYS_DIR'"

      - name: Show nsys reference trace
        if: always()
        run: |
          ssh $NODE "ls -lh $REPO/$RESULT_DIR/nsys/*.nsys-rep 2>/dev/null || echo 'No nsys-rep file'"
          ssh $NODE "ls -lh $REPO/$RESULT_DIR/nsys/ 2>/dev/null || echo 'No nsys dir'"

      # ===== Commit Results (torch analysis only, no large trace files) =====
      - name: Git commit and push results
        if: always()
        run: |
          ssh $NODE "cd $REPO && git config user.email 'ci@github.com' && git config user.name 'B200 CI'"
          ssh $NODE "cd $REPO && git reset HEAD 2>/dev/null; git add -u $RESULT_DIR/ 2>/dev/null; for ext in log yml jsonl json md csv; do git add -f $RESULT_DIR/*.\$ext 2>/dev/null; done; git diff --cached --name-only"
          ssh $NODE "cd $REPO && if ! git diff --cached --quiet; then git commit -m 'data: B200 SGLang FP4 profiling (torch trace + nsys ref, chat c=64)

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>' && git pull --rebase origin main && git push; else echo 'Nothing to commit'; fi"

      - name: Show final state
        if: always()
        run: ssh $NODE "cd $REPO && git log --oneline -3"
