name: SGLang vs ATOM Bench
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/sglang_vs_atom_bench.yml'

jobs:
  b200-sglang-tp4-ep4:
    runs-on: [self-hosted, b200]
    timeout-minutes: 60
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_sglang
      REPO: /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf
      MODEL_FP4: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      RESULT_DIR: results/sglang_vs_atom/b200_sglang_fp4_tp4_ep4
    steps:
      - name: Sync repo
        run: |
          ssh $NODE "cd $REPO && git rebase --abort 2>/dev/null; rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null; git reset --hard 2>/dev/null; git checkout -B main origin/main --force 2>/dev/null; git pull --rebase origin main 2>/dev/null; true"

      - name: Verify container and GPU
        run: |
          ssh $NODE "docker exec $CONTAINER nvidia-smi --query-gpu=name,memory.total --format=csv,noheader | head -2"
          ssh $NODE "docker exec $CONTAINER python3 -c 'import sglang; print(f\"SGLang {sglang.__version__}\")'"

      - name: Get container image name
        run: echo "IMAGE=$(ssh $NODE "docker inspect $CONTAINER --format '{{.Config.Image}}'" 2>/dev/null || echo unknown)" >> $GITHUB_ENV

      - name: Clean old results
        run: ssh $NODE "docker exec $CONTAINER bash -c 'rm -rf $REPO/$RESULT_DIR/* 2>/dev/null; true' && rm -rf $REPO/$RESULT_DIR/* 2>/dev/null; true"

      - name: Run SGLang FP4 TP4 EP4 bench (chat c=64)
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'cd $REPO && bash scripts/sa_bench_sglang.sh --model $MODEL_FP4 --tp 4 --ep 4 --scenario chat --concurrency 64 --container-image ${{ env.IMAGE }} --result-dir ./$RESULT_DIR'"

      - name: Show results
        if: always()
        run: |
          ssh $NODE "cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo 'No summary'"
          for f in $(ssh $NODE "ls $REPO/$RESULT_DIR/result_*.json 2>/dev/null"); do
            echo "=== $(basename $f) ==="
            ssh $NODE "python3 -c \"import json; d=json.load(open('$f')); print(f'Output Tput: {d.get(\\\"output_throughput\\\",0):.1f}, TPOT p50: {d.get(\\\"tpot_p50\\\", d.get(\\\"median_tpot_ms\\\",0)):.1f}ms, TTFT p50: {d.get(\\\"ttft_p50\\\", d.get(\\\"median_ttft_ms\\\",0)):.1f}ms')\"" 2>/dev/null || echo "parse failed"
          done

  # MI355X: 3 configs sequential (EP8-TP8 core + EP1-TP4/EP1-TP8 reference)
  mi355x-atom-ep8-tp8:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 60
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
      MODEL: /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4
      RESULT_DIR: results/sglang_vs_atom/mi355x_atom_mxfp4_ep8_tp8
    steps:
      - name: Sync repo
        run: cd $REPO && git stash 2>/dev/null || true && git pull --rebase && git stash pop 2>/dev/null || true

      - name: Get container image name
        run: echo "IMAGE=$(podman inspect $CONTAINER --format '{{.Config.Image}}' 2>/dev/null || echo unknown)" >> $GITHUB_ENV

      - name: Run ATOM MXFP4 EP8 TP8 bench (chat c=64)
        run: podman exec $CONTAINER bash -c "cd $REPO && bash scripts/sa_bench_mi355x.sh --model-mxfp4 $MODEL --configs mxfp4-throughput --scenario chat --concurrency 64 --tp 8 --ep --container-image '${{ env.IMAGE }}' --result-dir ./$RESULT_DIR"

      - name: Show results
        if: always()
        run: |
          cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo "No summary"
          for f in $REPO/$RESULT_DIR/result_*.json; do
            echo "=== $(basename $f) ==="
            python3 -c "import json; d=json.load(open('$f')); print(f'Output Tput: {d.get(\"output_throughput\",0):.1f}, TPOT p50: {d.get(\"tpot_p50\", d.get(\"median_tpot_ms\",0)):.1f}ms, TTFT p50: {d.get(\"ttft_p50\", d.get(\"median_ttft_ms\",0)):.1f}ms')" 2>/dev/null || echo "parse failed"
          done

  mi355x-atom-ep1-tp4:
    runs-on: [self-hosted, mi355x]
    needs: mi355x-atom-ep8-tp8
    timeout-minutes: 60
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
      MODEL: /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4
      RESULT_DIR: results/sglang_vs_atom/mi355x_atom_mxfp4_ep1_tp4
    steps:
      - name: Get container image name
        run: echo "IMAGE=$(podman inspect $CONTAINER --format '{{.Config.Image}}' 2>/dev/null || echo unknown)" >> $GITHUB_ENV

      - name: Run ATOM MXFP4 EP1 TP4 bench (chat c=64)
        run: podman exec $CONTAINER bash -c "cd $REPO && bash scripts/sa_bench_mi355x.sh --model-mxfp4 $MODEL --configs mxfp4-throughput --scenario chat --concurrency 64 --tp 4 --container-image '${{ env.IMAGE }}' --result-dir ./$RESULT_DIR"

      - name: Show results
        if: always()
        run: |
          cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo "No summary"
          for f in $REPO/$RESULT_DIR/result_*.json; do
            echo "=== $(basename $f) ==="
            python3 -c "import json; d=json.load(open('$f')); print(f'Output Tput: {d.get(\"output_throughput\",0):.1f}, TPOT p50: {d.get(\"tpot_p50\", d.get(\"median_tpot_ms\",0)):.1f}ms, TTFT p50: {d.get(\"ttft_p50\", d.get(\"median_ttft_ms\",0)):.1f}ms')" 2>/dev/null || echo "parse failed"
          done

  mi355x-atom-ep1-tp8:
    runs-on: [self-hosted, mi355x]
    needs: mi355x-atom-ep1-tp4
    timeout-minutes: 60
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
      MODEL: /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4
      RESULT_DIR: results/sglang_vs_atom/mi355x_atom_mxfp4_ep1_tp8
    steps:
      - name: Get container image name
        run: echo "IMAGE=$(podman inspect $CONTAINER --format '{{.Config.Image}}' 2>/dev/null || echo unknown)" >> $GITHUB_ENV

      - name: Run ATOM MXFP4 EP1 TP8 bench (chat c=64)
        run: podman exec $CONTAINER bash -c "cd $REPO && bash scripts/sa_bench_mi355x.sh --model-mxfp4 $MODEL --configs mxfp4-throughput --scenario chat --concurrency 64 --tp 8 --container-image '${{ env.IMAGE }}' --result-dir ./$RESULT_DIR"

      - name: Show results
        if: always()
        run: |
          cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo "No summary"
          for f in $REPO/$RESULT_DIR/result_*.json; do
            echo "=== $(basename $f) ==="
            python3 -c "import json; d=json.load(open('$f')); print(f'Output Tput: {d.get(\"output_throughput\",0):.1f}, TPOT p50: {d.get(\"tpot_p50\", d.get(\"median_tpot_ms\",0)):.1f}ms, TTFT p50: {d.get(\"ttft_p50\", d.get(\"median_ttft_ms\",0)):.1f}ms')" 2>/dev/null || echo "parse failed"
          done

  # Summary comparison
  summary:
    runs-on: [self-hosted, mi355x]
    needs: [b200-sglang-tp4-ep4, mi355x-atom-ep8-tp8, mi355x-atom-ep1-tp4, mi355x-atom-ep1-tp8]
    if: always()
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
    steps:
      - name: Show all results
        run: |
          echo "=== SGLang vs ATOM Comparison ==="
          echo ""
          for d in $REPO/results/sglang_vs_atom/*/; do
            echo "--- $(basename $d) ---"
            for f in "$d"/result_*.json; do
              [ -f "$f" ] || continue
              python3 -c "
import json, os
d = json.load(open('$f'))
name = os.path.basename(os.path.dirname('$f'))
out = d.get('output_throughput', 0)
tpot = d.get('tpot_p50', d.get('median_tpot_ms', 0))
ttft = d.get('ttft_p50', d.get('median_ttft_ms', 0))
print(f'  {name}: Output={out:.1f}, TPOT_p50={tpot:.1f}ms, TTFT_p50={ttft:.1f}ms')
" 2>/dev/null || echo "  parse failed: $(basename $f)"
            done
          done
