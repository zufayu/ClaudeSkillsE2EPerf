name: "B300 NCU Trace (attach mode)"
on:
  workflow_dispatch:
    inputs:
      launch_count:
        description: "Kernel launches to capture"
        type: string
        default: "100"
      ncu_set:
        description: "NCU section set"
        type: choice
        options:
          - pmsampling
          - basic
          - full
        default: pmsampling
      concurrency:
        description: "Concurrency"
        type: string
        default: "64"

jobs:
  ncu-trace:
    runs-on: [self-hosted, b300]
    timeout-minutes: 120
    env:
      CONTAINER: zufa_sglang
      MODEL: /models/DeepSeek-R1-0528-NVFP4-v2
      REPO: /home/zufa/ClaudeSkillsE2EPerf
      RESULT_DIR: results/b300_dsr_fp4/b300_ncu_test
    steps:
      - name: Sync repo (host)
        run: cd $REPO && git fetch origin && git reset --hard origin/main

      - name: Cleanup GPU
        continue-on-error: true
        run: |
          for p in $(nvidia-smi --query-compute-apps=pid --format=csv,noheader | sort -u | tr -d " "); do kill -9 $p 2>/dev/null; done
          docker exec $CONTAINER bash -c 'fuser -k -9 8888/tcp 2>/dev/null; true'
          sleep 5

      - name: "NCU attach (c=${{ inputs.concurrency }})"
        timeout-minutes: 90
        run: |
          docker exec $CONTAINER bash -c "cd $REPO && \
            NCU_ATTACH_TIMEOUT=1800 \
            bash scripts/collect_ncu_trace.sh \
              --model $MODEL \
              --backend sglang \
              --mode serve \
              --tp 8 --ep 1 \
              --quantization modelopt_fp4 \
              --scenario chat \
              --concurrency ${{ inputs.concurrency }} \
              --ncu-set ${{ inputs.ncu_set }} \
              --ncu-mode attach \
              --launch-count ${{ inputs.launch_count }} \
              --result-dir ./$RESULT_DIR"

      - name: Check results
        if: always()
        run: |
          echo "=== .ncu-rep files ==="
          docker exec $CONTAINER ls -lh $REPO/$RESULT_DIR/ncu/*.ncu-rep 2>/dev/null || echo "No .ncu-rep"
          echo "=== NCU log ==="
          docker exec $CONTAINER tail -20 $REPO/$RESULT_DIR/ncu/*.log 2>/dev/null || echo "No log"

      - name: Cleanup
        if: always()
        continue-on-error: true
        run: |
          for p in $(nvidia-smi --query-compute-apps=pid --format=csv,noheader | sort -u | tr -d " "); do kill -9 $p 2>/dev/null; done

      - name: Commit results
        if: always()
        run: |
          cd $REPO && git config user.email 'ci@github.com' && git config user.name 'B300 CI'
          git add -f $RESULT_DIR/ncu/*.ncu-rep $RESULT_DIR/ncu/*.log $RESULT_DIR/*.log 2>/dev/null; true
          if ! git diff --cached --quiet; then
            git commit -m "data: B300 NCU trace (chat c=${{ inputs.concurrency }}, ${{ inputs.ncu_set }})"
            git pull --rebase origin main && git push
          else
            echo "Nothing to commit"
          fi
