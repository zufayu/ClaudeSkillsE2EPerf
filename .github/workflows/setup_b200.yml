name: Setup B200 Node
on:
  workflow_dispatch: {}
jobs:
  setup:
    runs-on: [self-hosted, b200]
    env:
      REPO_DIR: /home/ubuntu/zufa/ClaudeSkillsE2EPerf
      CONTAINER: zufa_trt
      IMAGE: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc10
      SFS: /SFS-aGqda6ct
    steps:
      - name: Remove old container and start fresh
        run: |
          docker rm -f $CONTAINER 2>/dev/null || true
          docker run -d --name $CONTAINER --gpus all --ipc host \
            --ulimit memlock=-1 --ulimit stack=67108864 \
            -v /home:/home -v /mnt:/mnt -v /data:/data \
            -v $SFS:$SFS \
            --shm-size=64g -p 8000:8000 --cap-add=SYS_PTRACE \
            $IMAGE sleep infinity
          echo "Container $CONTAINER started with $IMAGE"

      - name: Verify GPU and model paths
        run: |
          echo "=== GPU ==="
          docker exec $CONTAINER nvidia-smi --query-gpu=name,memory.total --format=csv,noheader
          echo "=== FP4 Model ==="
          docker exec $CONTAINER ls $SFS/models/DeepSeek-R1-0528-NVFP4-v2/ | head -10
          echo "=== Repo ==="
          docker exec $CONTAINER ls $REPO_DIR/scripts/ | head -5

      - name: Sync repo inside container
        run: |
          docker exec $CONTAINER bash -c "cd $REPO_DIR && git fetch origin && git reset --hard origin/main"

      - name: Show existing results
        run: |
          echo "=== Result directories ==="
          docker exec $CONTAINER bash -c "ls -d $REPO_DIR/results*/b200* 2>/dev/null || echo 'No results yet'"
