name: "MI355X zufa_atom_ex smoke test (ATOM commit + GPU import)"
on:
  workflow_dispatch:
jobs:
  smoke:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 15
    env:
      WORKING: zufa_atom
      NEW: zufa_atom_ex
    steps:
      - name: Compare ATOM git commits
        shell: bash {0}
        run: |
          for C in $WORKING $NEW; do
            echo "===== $C ====="
            podman exec $C bash -c 'cd /app/ATOM && echo "branch: $(git rev-parse --abbrev-ref HEAD)" && echo "commit: $(git rev-parse HEAD)" && echo "describe: $(git describe --always --dirty 2>&1)" && git log -1 --pretty=format:"%h %ad %s%n" --date=short'
            echo
          done

      - name: Sync ATOM in zufa_atom_ex to match zufa_atom
        shell: bash {0}
        run: |
          TARGET=$(podman exec $WORKING bash -c 'cd /app/ATOM && git rev-parse HEAD')
          echo "Target commit: $TARGET"
          CURRENT=$(podman exec $NEW bash -c 'cd /app/ATOM && git rev-parse HEAD')
          echo "Current in $NEW: $CURRENT"
          if [ "$TARGET" = "$CURRENT" ]; then
            echo "Already in sync"
          else
            echo "SYNCING $NEW to $TARGET"
            podman exec $NEW bash -c "cd /app/ATOM && git fetch --all && git checkout $TARGET" 2>&1 | tail -10
            echo "After sync: $(podman exec $NEW bash -c 'cd /app/ATOM && git rev-parse HEAD')"
          fi

      - name: Smoke test - GPU + ATOM import in zufa_atom_ex
        shell: bash {0}
        run: |
          echo "=== rocm-smi (full) ==="
          podman exec $NEW rocm-smi 2>&1 | head -20
          echo
          echo "=== HIP visible devices ==="
          podman exec $NEW bash -c 'env | grep -E "HIP|ROCR|HSA" || echo "(no HIP env)"'
          echo
          echo "=== Test: torch sees GPU ==="
          podman exec $NEW python3 -c "
          import torch
          print('cuda available:', torch.cuda.is_available())
          print('device count:', torch.cuda.device_count())
          if torch.cuda.is_available():
              for i in range(min(4, torch.cuda.device_count())):
                  print(f'  GPU {i}: {torch.cuda.get_device_name(i)}')
              x = torch.zeros(1024, device='cuda:0')
              print('alloc on cuda:0 OK, sum:', x.sum().item())
          " 2>&1
          echo
          echo "=== Test: ATOM import ==="
          podman exec $NEW python3 -c "
          import atom
          print('atom version:', getattr(atom, '__version__', 'unknown'))
          import atom.entrypoints.openai_server as srv
          print('openai_server import OK')
          " 2>&1

      - name: Show moe.py:1878 region (target patch site)
        shell: bash {0}
        run: |
          echo "=== /app/ATOM/atom/model_ops/moe.py around line 1878 ==="
          podman exec $NEW bash -c 'sed -n "1860,1900p" /app/ATOM/atom/model_ops/moe.py'
          echo
          echo "=== grep for mutates_args=['hidden_states'] ==="
          podman exec $NEW grep -n 'mutates_args.*hidden_states' /app/ATOM/atom/model_ops/moe.py
          echo "=== grep for needs_fixed_stride_order ==="
          podman exec $NEW grep -n 'needs_fixed_stride_order' /app/ATOM/atom/model_ops/moe.py
