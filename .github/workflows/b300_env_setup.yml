name: "B300 Env Setup"
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: [self-hosted, b300]
    timeout-minutes: 30
    steps:
      - name: Check GPU and disk
        run: |
          echo "=== GPU ==="
          nvidia-smi --query-gpu=index,name,memory.total,driver_version --format=csv,noheader
          echo "GPU count: $(nvidia-smi -L | wc -l)"
          echo ""
          echo "=== NCU on host ==="
          find /opt/nvidia -name "ncu" -type f 2>/dev/null | head -3
          which ncu 2>/dev/null && ncu --version | head -1 || echo "NCU not in PATH"
          echo ""
          echo "=== Model search ==="
          ls -ld /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2 2>/dev/null && echo "Model path 1: OK" || echo "Model path 1: NOT FOUND"
          find / -maxdepth 4 -name "DeepSeek-R1*" -type d 2>/dev/null | head -5

      - name: Remove old container if exists
        continue-on-error: true
        run: |
          docker stop zufa_sglang 2>/dev/null || true
          docker rm zufa_sglang 2>/dev/null || true

      - name: Pull SGLang image
        run: docker pull lmsysorg/sglang:v0.5.9-cu130

      - name: Create zufa_sglang container
        run: |
          docker run -d --name zufa_sglang \
            --gpus all --ipc=host --net=host \
            --cap-add=SYS_PTRACE --security-opt seccomp=unconfined \
            -v /home/zufa:/home/zufa \
            -v /SFS-aGqda6ct:/SFS-aGqda6ct \
            -v /home:/home \
            -w /home/zufa \
            lmsysorg/sglang:v0.5.9-cu130 \
            sleep infinity

      - name: Verify container
        run: |
          docker exec zufa_sglang bash -c '
            echo "Python: $(python3 --version)"
            python3 -c "import sglang; print(f\"SGLang: {sglang.__version__}\")" 2>&1
            python3 -c "import torch; print(f\"PyTorch: {torch.__version__}, GPUs: {torch.cuda.device_count()}\")" 2>&1
            echo "NCU:"; which ncu 2>/dev/null && ncu --version 2>/dev/null | head -1 || echo "  not in container"
            echo "gdb:"; which gdb 2>/dev/null && echo "  available" || echo "  NOT available (need apt install gdb)"
            echo "Model:"; ls -ld /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2 2>/dev/null && echo "  OK" || echo "  NOT FOUND"
            echo "Repo:"; ls -ld /home/zufa/ClaudeSkillsE2EPerf 2>/dev/null && echo "  OK" || echo "  NOT FOUND"
          '

      - name: Install gdb if missing
        continue-on-error: true
        run: |
          docker exec zufa_sglang bash -c 'which gdb 2>/dev/null || (apt-get update -qq && apt-get install -y -qq gdb > /dev/null 2>&1 && echo "gdb installed")'
