name: "MI355X Create zufa_atom_dev (fresh atom-dev:latest image + grep moe.py)"
on:
  workflow_dispatch:
jobs:
  create:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 30
    env:
      WORKING: zufa_atom
      DEV: zufa_atom_dev
      IMAGE: docker.io/rocm/atom-dev:latest
    steps:
      - name: Pull latest atom-dev image
        shell: bash {0}
        run: |
          echo "=== before pull (current image digest) ==="
          podman images --digests $IMAGE 2>&1 | head -5
          echo "=== pulling $IMAGE ==="
          podman pull $IMAGE 2>&1 | tail -10
          echo "=== after pull ==="
          podman images --digests $IMAGE 2>&1 | head -5

      - name: Remove old zufa_atom_dev and recreate from fresh latest image
        shell: bash {0}
        run: |
          podman rm -f $DEV 2>&1 || true
          # Same proven flags as zufa_atom (keep-groups for /shared NFS access)
          podman run -d --name $DEV \
            --security-opt seccomp=unconfined \
            --ipc=host --network=host \
            --group-add keep-groups \
            -v /shared:/shared \
            $IMAGE sleep infinity
          sleep 3
          echo "=== id (should show groups=0(root),65534(nogroup)) ==="
          podman exec $DEV id

      - name: Show ATOM commit in fresh image
        shell: bash {0}
        run: |
          echo "=== zufa_atom_dev ATOM (fresh from latest image) ==="
          podman exec $DEV bash -c 'cd /app/ATOM && git rev-parse HEAD && git log -1 --pretty=fuller'
          echo
          echo "=== zufa_atom ATOM (current pinned/in-use) ==="
          podman exec $WORKING bash -c 'cd /app/ATOM && git rev-parse HEAD && git log -1 --pretty=fuller'
          echo
          echo "=== aiter commit in fresh image ==="
          podman exec $DEV bash -c 'cd /app/aiter-test && git rev-parse HEAD && git log -1 --pretty=oneline'

      - name: "GREP moe.py — does mutates_args=['hidden_states'] still exist in latest atom-dev image?"
        shell: bash {0}
        run: |
          echo "=== mutates_args=['hidden_states'] in latest atom-dev image ==="
          MA_COUNT=$(podman exec $DEV grep -c 'mutates_args.*hidden_states' /app/ATOM/atom/model_ops/moe.py 2>/dev/null || echo 0)
          podman exec $DEV grep -n 'mutates_args.*hidden_states' /app/ATOM/atom/model_ops/moe.py 2>&1 || true
          echo
          echo "=== needs_fixed_stride_order tag ==="
          TAG_COUNT=$(podman exec $DEV grep -c 'needs_fixed_stride_order' /app/ATOM/atom/model_ops/moe.py 2>/dev/null || echo 0)
          podman exec $DEV grep -n 'needs_fixed_stride_order' /app/ATOM/atom/model_ops/moe.py 2>&1 || true
          echo
          echo "=== context around mutates_args (or whole moe_forward custom_op block) ==="
          podman exec $DEV bash -c '
            LINE=$(grep -n "atom::moe_forward\|moe_forward.*custom_op\|@torch.library.custom_op" /app/ATOM/atom/model_ops/moe.py | head -1 | cut -d: -f1)
            [ -z "$LINE" ] && LINE=$(grep -n "mutates_args" /app/ATOM/atom/model_ops/moe.py | head -1 | cut -d: -f1)
            [ -z "$LINE" ] && LINE=1880
            START=$((LINE - 3)); END=$((LINE + 15))
            echo "showing lines ${START}-${END}:"
            sed -n "${START},${END}p" /app/ATOM/atom/model_ops/moe.py
          '
          echo
          echo "============================================================"
          if [ "$MA_COUNT" -gt 0 ]; then
            echo "VERDICT: mutates_args=[\"hidden_states\"] STILL PRESENT (count=$MA_COUNT)"
            echo "         => triton_poi_fused issue NOT fixed in latest atom-dev image"
          else
            echo "VERDICT: mutates_args=[\"hidden_states\"] REMOVED"
            echo "         => triton_poi_fused issue may be FIXED in latest atom-dev image"
          fi
          echo "Tag count: $TAG_COUNT"
          echo "============================================================"

      - name: Show diff in moe.py between two versions
        shell: bash {0}
        continue-on-error: true
        run: |
          echo "=== diff /app/ATOM/atom/model_ops/moe.py (zufa_atom -> zufa_atom_dev) ==="
          podman exec $WORKING cat /app/ATOM/atom/model_ops/moe.py > /tmp/moe_old.py
          podman exec $DEV cat /app/ATOM/atom/model_ops/moe.py > /tmp/moe_new.py
          diff /tmp/moe_old.py /tmp/moe_new.py | head -60
          echo
          echo "=== file size compare ==="
          echo "zufa_atom: $(wc -l < /tmp/moe_old.py) lines"
          echo "zufa_atom_dev: $(wc -l < /tmp/moe_new.py) lines"

      - name: Sanity - basic env in zufa_atom_dev
        shell: bash {0}
        continue-on-error: true
        run: |
          echo "=== model accessible ==="
          podman exec $DEV ls /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4-MTP-MoEFP4/config.json 2>&1 | head -3
          echo "=== rocm-smi ==="
          podman exec $DEV rocm-smi 2>&1 | head -5
