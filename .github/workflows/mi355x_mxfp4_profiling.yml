name: MI355X MXFP4 Profiling
on:
  workflow_dispatch:
    inputs:
      config:
        description: 'EP/TP config to run'
        type: choice
        options:
          - ep1-tp4
          - ep4-tp4
          - ep8-tp8
          - both
        default: ep1-tp4
      commit_results:
        description: 'Commit + push profiling outputs (csv/xlsx/log) to main'
        type: boolean
        default: false
jobs:
  mxfp4-ep1-tp4-profiling:
    if: inputs.config == 'ep1-tp4'
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 120
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
      MODEL: /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4-MTP-MoEFP4
      RESULT_DIR: results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_ep1_tp4_rocm722_profiling
    steps:
      - name: Kill residual GPU processes
        continue-on-error: true
        run: |
          podman exec $CONTAINER bash -c 'pkill -9 -f "python|vllm|atom.*serve|model_executor" 2>/dev/null; true'
          sleep 5
      - name: Sync repo
        run: cd $REPO && git fetch origin && git reset --hard origin/main
      - name: Clean old results
        run: podman exec $CONTAINER bash -c "rm -rf $REPO/$RESULT_DIR/result_profiled_*.json $REPO/$RESULT_DIR/decode_walltime_*.csv $REPO/$RESULT_DIR/summary.md $REPO/$RESULT_DIR/*.log 2>/dev/null; true"
      - name: Record dispatch context
        run: |
          mkdir -p $REPO/$RESULT_DIR
          cat > $REPO/$RESULT_DIR/dispatch_inputs.json <<EOF
          {
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "ref": "${{ github.ref_name }}",
            "sha": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "dispatched_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platform": "mi355x",
            "container": "$CONTAINER",
            "model": "$MODEL",
            "result_dir": "$RESULT_DIR",
            "inputs": {"config": "${{ inputs.config }}", "commit_results": "${{ inputs.commit_results }}"}
          }
          EOF
          echo "=== dispatch_inputs.json written ==="
          cat $REPO/$RESULT_DIR/dispatch_inputs.json

      - name: Run MXFP4 EP1 TP4 profiling (chat c=64)
        run: podman exec $CONTAINER bash -c "cd $REPO && bash scripts/collect_atom_trace.sh --model $MODEL --scenario chat --concurrency 64 --tp 4 --profile-prompts 640 --roctracer-max-events 20000000 --env rocm722 --result-dir ./$RESULT_DIR"
      - name: Show profiling results
        if: always()
        run: |
          ls -la $REPO/$RESULT_DIR/ 2>/dev/null || echo 'No result dir'
          cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo 'No summary'
      - name: Run decode breakdown
        if: success()
        run: |
          podman exec $CONTAINER bash -c "cd $REPO/$RESULT_DIR && TRACE=\$(ls trace_torch_*_c*_full.json.gz 2>/dev/null | head -1) && if [ -n \"\$TRACE\" ]; then echo \"Trace: \$TRACE\"; python3 $REPO/scripts/decode_kernel_breakdown.py \$TRACE --target-bs 64 && ls -lh *breakdown*.xlsx 2>/dev/null; else echo 'No trace file'; fi"
      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mi355x-mxfp4-${{ inputs.config }}-${{ github.run_id }}
          path: |
            $REPO/$RESULT_DIR/decode_breakdown*.csv
            $REPO/$RESULT_DIR/decode_breakdown*.xlsx
            $REPO/$RESULT_DIR/prefill_breakdown*.xlsx
            $REPO/$RESULT_DIR/result_profiled_*.json
            $REPO/$RESULT_DIR/summary.md
            $REPO/$RESULT_DIR/dispatch_inputs.json
          retention-days: 30
          if-no-files-found: warn

      - name: Git commit results
        if: always() && (inputs.commit_results == true || inputs.commit_results == 'true')
        run: |
          cd $REPO && git config user.email "ci@github.com" && git config user.name "MI355X CI"
          git pull --rebase origin main || true
          for ext in log csv md xlsx json; do git add -f $RESULT_DIR/*.$ext 2>/dev/null; done
          if ! git diff --cached --quiet; then
            git commit -m "data: MI355X MXFP4 EP=1 TP=4 profiling + breakdown (chat c=64)

          Co-Authored-By: Claude Opus 4 <noreply@anthropic.com>"
            git push
          else
            echo "Nothing to commit"
          fi

  mxfp4-ep4-tp4-profiling:
    if: inputs.config == 'ep4-tp4' || inputs.config == 'both'
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 120
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
      MODEL: /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4-MTP-MoEFP4
      RESULT_DIR: results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_ep4_tp4_rocm722_profiling
    steps:
      - name: Kill residual GPU processes
        continue-on-error: true
        run: |
          podman exec $CONTAINER bash -c 'pkill -9 -f "python|vllm|atom.*serve|model_executor" 2>/dev/null; true'
          sleep 5

      - name: Sync repo (hard reset to drop any stuck local commits)
        run: cd $REPO && git fetch origin && git reset --hard origin/main

      - name: Clean old results
        run: podman exec $CONTAINER bash -c "rm -rf $REPO/$RESULT_DIR/result_profiled_*.json $REPO/$RESULT_DIR/decode_walltime_*.csv $REPO/$RESULT_DIR/summary.md $REPO/$RESULT_DIR/*.log 2>/dev/null; true"
      - name: Record dispatch context
        run: |
          mkdir -p $REPO/$RESULT_DIR
          cat > $REPO/$RESULT_DIR/dispatch_inputs.json <<EOF
          {
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "ref": "${{ github.ref_name }}",
            "sha": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "dispatched_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platform": "mi355x",
            "container": "$CONTAINER",
            "model": "$MODEL",
            "result_dir": "$RESULT_DIR",
            "inputs": {"config": "${{ inputs.config }}", "commit_results": "${{ inputs.commit_results }}"}
          }
          EOF
          echo "=== dispatch_inputs.json written ==="
          cat $REPO/$RESULT_DIR/dispatch_inputs.json


      - name: Run MXFP4 EP4 TP4 profiling (chat c=64)
        run: podman exec $CONTAINER bash -c "cd $REPO && bash scripts/collect_atom_trace.sh --model $MODEL --scenario chat --concurrency 64 --tp 4 --ep --profile-prompts 640 --roctracer-max-events 20000000 --env rocm722 --result-dir ./$RESULT_DIR"

      - name: Show profiling results
        if: always()
        run: |
          ls -la $REPO/$RESULT_DIR/ 2>/dev/null || echo 'No result dir'
          cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo 'No summary'

      - name: Run decode breakdown (parse_trace)
        if: success()
        run: |
          podman exec $CONTAINER bash -c "cd $REPO/$RESULT_DIR && TRACE=\$(ls trace_torch_*_c*_full.json.gz 2>/dev/null | head -1) && if [ -n \"\$TRACE\" ]; then echo \"Trace: \$TRACE\"; python3 $REPO/scripts/decode_kernel_breakdown.py \$TRACE --target-bs 64 && ls -lh *breakdown*.xlsx 2>/dev/null; else echo 'No trace file'; fi"

      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mi355x-mxfp4-${{ inputs.config }}-${{ github.run_id }}
          path: |
            $REPO/$RESULT_DIR/decode_breakdown*.csv
            $REPO/$RESULT_DIR/decode_breakdown*.xlsx
            $REPO/$RESULT_DIR/prefill_breakdown*.xlsx
            $REPO/$RESULT_DIR/result_profiled_*.json
            $REPO/$RESULT_DIR/summary.md
            $REPO/$RESULT_DIR/dispatch_inputs.json
          retention-days: 30
          if-no-files-found: warn

      - name: Git commit and push results (exclude large .json.gz traces)
        if: always() && (inputs.commit_results == true || inputs.commit_results == 'true')
        run: |
          cd $REPO
          git config user.email "ci@github.com"
          git config user.name "MI355X CI"
          git pull --rebase origin main || true
          for ext in log csv md xlsx json; do git add -f $RESULT_DIR/*.$ext 2>/dev/null; done
          git diff --cached --name-only
          if ! git diff --cached --quiet; then
            git commit -m "data: MI355X MXFP4 EP=4 TP=4 profiling + breakdown (chat c=64)

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
            git push
          else
            echo "Nothing to commit"
          fi

  mxfp4-ep8-tp8-profiling:
    if: inputs.config == 'ep8-tp8' || inputs.config == 'both'
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 120
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
      MODEL: /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4-MTP-MoEFP4
      RESULT_DIR: results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_ep8_tp8_rocm711_profiling
    steps:
      - name: Kill residual GPU processes
        continue-on-error: true
        run: |
          podman exec $CONTAINER bash -c 'pkill -9 -f "python|vllm|atom.*serve|model_executor" 2>/dev/null; true'
          sleep 5

      - name: Sync repo (hard reset to drop any stuck local commits)
        run: cd $REPO && git fetch origin && git reset --hard origin/main

      - name: Clean old results (keep trace .json.gz separate)
        run: |
      - name: Record dispatch context
        run: |
          mkdir -p $REPO/$RESULT_DIR
          cat > $REPO/$RESULT_DIR/dispatch_inputs.json <<EOF
          {
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "ref": "${{ github.ref_name }}",
            "sha": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "dispatched_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platform": "mi355x",
            "container": "$CONTAINER",
            "model": "$MODEL",
            "result_dir": "$RESULT_DIR",
            "inputs": {"config": "${{ inputs.config }}", "commit_results": "${{ inputs.commit_results }}"}
          }
          EOF
          echo "=== dispatch_inputs.json written ==="
          cat $REPO/$RESULT_DIR/dispatch_inputs.json

          podman exec $CONTAINER bash -c "rm -rf $REPO/$RESULT_DIR/result_profiled_*.json $REPO/$RESULT_DIR/decode_walltime_*.csv $REPO/$RESULT_DIR/summary.md $REPO/$RESULT_DIR/*.log 2>/dev/null; true"

      - name: Run MXFP4 EP8 TP8 profiling (chat c=64, with_stack=False)
        run: |
          podman exec $CONTAINER bash -c "cd $REPO && bash scripts/collect_atom_trace.sh --model $MODEL --scenario chat --concurrency 64 --tp 8 --ep --profile-prompts 640 --roctracer-max-events 20000000 --env rocm711 --result-dir ./$RESULT_DIR"

      - name: Show profiling results
        if: always()
        run: |
          ls -la $REPO/$RESULT_DIR/ 2>/dev/null || echo 'No result dir'
          cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo 'No summary'

      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mi355x-mxfp4-${{ inputs.config }}-${{ github.run_id }}
          path: |
            $REPO/$RESULT_DIR/decode_breakdown*.csv
            $REPO/$RESULT_DIR/decode_breakdown*.xlsx
            $REPO/$RESULT_DIR/prefill_breakdown*.xlsx
            $REPO/$RESULT_DIR/result_profiled_*.json
            $REPO/$RESULT_DIR/summary.md
            $REPO/$RESULT_DIR/dispatch_inputs.json
          retention-days: 30
          if-no-files-found: warn

      - name: Git commit and push results (exclude large .json.gz traces)
        if: always() && (inputs.commit_results == true || inputs.commit_results == 'true')
        run: |
          cd $REPO
          git config user.email "ci@github.com"
          git config user.name "MI355X CI"
          git pull --rebase origin main || true
          for ext in log csv md xlsx; do git add -f $RESULT_DIR/*.$ext 2>/dev/null; done
          git add -f $RESULT_DIR/result_profiled_*.json 2>/dev/null || true
          git diff --cached --name-only
          if ! git diff --cached --quiet; then
            git commit -m "data: MI355X MXFP4 EP=8 TP=8 profiling (chat c=64)

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
            git push
          else
            echo "Nothing to commit"
          fi

      - name: Show final state
        if: always()
        run: cd $REPO && git log --oneline -3
