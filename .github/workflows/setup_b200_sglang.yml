name: Setup B200 SGLang
on:
  workflow_dispatch:
    inputs:
      node:
        description: 'GPU node to setup'
        type: choice
        options:
          - hungry-hippo-fin-03-2
          - hungry-hippo-fin-03-7
          - hungry-hippo-fin-03-1
          - hungry-hippo-fin-03-3
        default: hungry-hippo-fin-03-2
jobs:
  setup:
    runs-on: [self-hosted, b200]
    env:
      NODE: ${{ inputs.node }}
      CONTAINER: zufa_sglang
      IMAGE: lmsysorg/sglang:v0.5.9-cu130
      SFS: /SFS-aGqda6ct
      MODEL_FP4: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
    steps:
      - name: Remove old container, start zufa_sglang
        run: |
          ssh $NODE "docker rm -f $CONTAINER 2>/dev/null || true"
          ssh $NODE "docker run -d --name $CONTAINER --gpus all --ipc host --ulimit memlock=-1 --ulimit stack=67108864 -v /home:/home -v /mnt:/mnt -v /data:/data -v $SFS:$SFS --shm-size=64g -p 8888:8888 --cap-add=SYS_PTRACE $IMAGE sleep infinity"
          echo "Container $CONTAINER started on $NODE"

      - name: Verify GPU + model paths
        run: |
          echo "=== GPU ==="
          ssh $NODE "docker exec $CONTAINER nvidia-smi --query-gpu=name,memory.total --format=csv,noheader"
          echo "=== FP4 Model ==="
          ssh $NODE "docker exec $CONTAINER ls $MODEL_FP4/ | head -5"
          echo "=== SGLang version ==="
          ssh $NODE "docker exec $CONTAINER python3 -c 'import sglang; print(sglang.__version__)'"

      - name: Verify SGLang can import model config
        run: |
          ssh $NODE "docker exec $CONTAINER python3 -c 'from transformers import AutoConfig; c = AutoConfig.from_pretrained(\"$MODEL_FP4\", trust_remote_code=True); print(f\"Model: {c.model_type}, layers: {c.num_hidden_layers}\")'"
