name: Test B200 Runner
on:
  workflow_dispatch:
jobs:
  check-repos:
    runs-on: [self-hosted, b200]
    timeout-minutes: 5
    env:
      NODE: hungry-hippo-fin-03-2
    steps:
      - name: Check repo locations across nodes
        run: |
          for N in hungry-hippo-fin-03-2 hungry-hippo-fin-03-1 hungry-hippo-fin-03-3 hungry-hippo-fin-03-7; do
            echo "=== $N ==="
            ssh $N "echo '--- /home/ubuntu/zufa ---' && ls -la /home/ubuntu/zufa/ClaudeSkillsE2EPerf/.git/HEAD 2>/dev/null && cat /home/ubuntu/zufa/ClaudeSkillsE2EPerf/.git/HEAD 2>/dev/null && git -C /home/ubuntu/zufa/ClaudeSkillsE2EPerf log --oneline -3 2>/dev/null || echo 'NOT FOUND'" 2>/dev/null || echo "SSH failed"
            ssh $N "echo '--- SFS ---' && ls -la /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf/.git/HEAD 2>/dev/null && cat /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf/.git/HEAD 2>/dev/null && git -C /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf log --oneline -3 2>/dev/null || echo 'NOT FOUND'" 2>/dev/null || echo "SSH failed"
            ssh $N "echo '--- Are they same inode? ---' && stat -c '%i %d' /home/ubuntu/zufa/ClaudeSkillsE2EPerf/.git/HEAD 2>/dev/null && stat -c '%i %d' /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf/.git/HEAD 2>/dev/null || echo 'cannot compare'" 2>/dev/null || echo "SSH failed"
            echo ""
          done

      - name: Check jumphost repo
        run: |
          echo "=== jumphost ==="
          echo "--- /home/ubuntu/zufa ---"
          ls -la /home/ubuntu/zufa/ClaudeSkillsE2EPerf/.git/HEAD 2>/dev/null && cat /home/ubuntu/zufa/ClaudeSkillsE2EPerf/.git/HEAD 2>/dev/null && git -C /home/ubuntu/zufa/ClaudeSkillsE2EPerf log --oneline -3 2>/dev/null || echo "NOT FOUND"
          echo "--- SFS ---"
          ls -la /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf/.git/HEAD 2>/dev/null && cat /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf/.git/HEAD 2>/dev/null && git -C /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf log --oneline -3 2>/dev/null || echo "NOT FOUND"
          echo "--- Are they same inode? ---"
          stat -c '%i %d' /home/ubuntu/zufa/ClaudeSkillsE2EPerf/.git/HEAD 2>/dev/null
          stat -c '%i %d' /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf/.git/HEAD 2>/dev/null || echo "cannot compare"

      - name: Check container mounts
        run: |
          echo "=== Container zufa_trt on node-2 ==="
          ssh $NODE "docker exec zufa_trt bash -c 'echo \"--- /home/ubuntu/zufa ---\" && ls /home/ubuntu/zufa/ClaudeSkillsE2EPerf/.git/HEAD 2>/dev/null && git -C /home/ubuntu/zufa/ClaudeSkillsE2EPerf log --oneline -1 2>/dev/null || echo NOT_FOUND'" || echo "failed"
          ssh $NODE "docker exec zufa_trt bash -c 'echo \"--- /SFS ---\" && ls /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf/.git/HEAD 2>/dev/null && git -C /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf log --oneline -1 2>/dev/null || echo NOT_FOUND'" || echo "failed"
          ssh $NODE "docker exec zufa_trt bash -c 'echo \"--- df mounts ---\" && df -h /home /SFS-aGqda6ct 2>/dev/null | head -5'" || echo "failed"
