name: Test B200 Runner
on:
  workflow_dispatch:
jobs:
  benchmark:
    runs-on: [self-hosted, b200]
    timeout-minutes: 30
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_trt
      SFS: /SFS-aGqda6ct
      REPO: /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf
      MODEL: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      RESULT_DIR: results_b200_fp4_repro_ep8_c64
    steps:
      - name: Verify container and GPU
        run: |
          echo "=== Container ==="
          ssh $NODE "docker ps --filter name=$CONTAINER --format '{{.Names}} {{.Status}}'"
          echo "=== GPUs ==="
          ssh $NODE "docker exec $CONTAINER nvidia-smi --query-gpu=index,name,memory.total --format=csv,noheader"
          echo "=== Model ==="
          ssh $NODE "docker exec $CONTAINER ls $MODEL/config.json"

      - name: Run FP4 benchmark (chat c=64 EP=8)
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'cd $REPO && bash scripts/sa_bench_b200.sh --model-fp4 $MODEL --configs fp4-throughput --scenario chat --concurrency 64 --ep-sizes 8 --dp false --result-dir ./$RESULT_DIR'"

      - name: Show results
        run: |
          echo "=== Result JSON ==="
          ssh $NODE "docker exec $CONTAINER cat $REPO/$RESULT_DIR/result_fp4_throughput_chat_ep8_c64.json" || echo "Result file not found"
          echo ""
          echo "=== Summary ==="
          ssh $NODE "docker exec $CONTAINER cat $REPO/$RESULT_DIR/summary.md" || echo "Summary not found"
          echo ""
          echo "=== Config YAML ==="
          ssh $NODE "docker exec $CONTAINER cat $REPO/$RESULT_DIR/config_fp4_throughput_chat_ep8_c64.yml" || echo "Config not found"
