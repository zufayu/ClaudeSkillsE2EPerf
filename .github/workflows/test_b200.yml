name: Test B200 Runner
on:
  workflow_dispatch:
jobs:
  prefill-analysis:
    runs-on: [self-hosted, b200]
    timeout-minutes: 30
    env:
      SFS_REPO: /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf
    steps:
      - name: Git pull SFS repo
        run: |
          sudo chown -R ubuntu:ubuntu $SFS_REPO || true
          git -C $SFS_REPO reset HEAD -- . 2>/dev/null || true
          git -C $SFS_REPO checkout -- . 2>/dev/null || true
          git -C $SFS_REPO clean -fd 2>/dev/null || true
          git -C $SFS_REPO pull
          echo "=== Latest commit ==="
          git -C $SFS_REPO log --oneline -3

      - name: Analyze existing server logs for prefill interleaving
        run: python3 $SFS_REPO/scripts/analyze_iter_logs.py $SFS_REPO

      - name: List FP4 server logs
        run: |
          echo "=== FP4 result directories ==="
          for DIR in $SFS_REPO/results_b200*fp4* $SFS_REPO/results_b200_mtp0_fp4*; do
            [ -d "$DIR" ] || continue
            echo "--- $(basename $DIR) ---"
            ls -la "$DIR"/server*.log "$DIR"/*.log 2>/dev/null || echo "  No logs"
          done

      - name: Show FP4 EP8 c64 benchmark results
        run: |
          for f in $SFS_REPO/results_b200_mtp0_fp4_ep8_c64_dp0/*.json; do
            [ -f "$f" ] || continue
            echo "--- $(basename $f) ---"
            python3 -c "import json; d=json.load(open('$f')); print(f'  duration={d.get(\"duration\",\"?\")}s completed={d.get(\"completed\",\"?\")} mean_tpot={d.get(\"mean_tpot_ms\",\"?\")}ms mean_ttft={d.get(\"mean_ttft_ms\",\"?\")}ms')"
          done
