name: Test B200 Runner
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: [self-hosted, b200]
    steps:
      - name: Scan FP4 results
        run: |
          NODE=hungry-hippo-fin-03-2
          SFS=/SFS-aGqda6ct
          BASE=$SFS/ubuntu/zufa/ClaudeSkillsE2EPerf
          echo "=== Result dirs ==="
          ssh $NODE "ls -d $BASE/results_b200_fp4_* $BASE/results_b200_mtp*fp4* 2>/dev/null"
          echo "=== File counts ==="
          ssh $NODE "for d in $BASE/results_b200_fp4_* $BASE/results_b200_mtp*fp4*; do [ -d \"\$d\" ] && echo \"\$(basename \$d): \$(ls \$d/result_*.json 2>/dev/null | wc -l) json files\"; done"
          echo "=== Content sample ==="
          ssh $NODE "find $BASE/results_b200_fp4_mtp0_4gpu $BASE/results_b200_fp4_mtp0_ep4 $BASE/results_b200_mtp0_fp4_ep8_c64_dp0 -name 'result_*.json' 2>/dev/null | sort | while read f; do echo '---'; echo \$(basename \$(dirname \$f))/\$(basename \$f); python3 -c 'import json,sys;r=json.load(open(sys.argv[1]));print(\"isl=%s osl=%s c=%s ep=%s mtp=%s TPOT=%s otps=%s\"%(r.get(\"isl\",\"?\"),r.get(\"osl\",\"?\"),r.get(\"concurrency\",\"?\"),r.get(\"ep_size\",\"?\"),r.get(\"num_draft_tokens\",r.get(\"mtp_size\",\"?\")),r.get(\"tpot_p50\",\"?\"),r.get(\"output_tps\",\"?\")))' \$f 2>/dev/null || cat \$f | python3 -c 'import json,sys;r=json.load(sys.stdin);ks=[k for k in r.keys()];print(\"keys:\",ks[:10])'; done"
