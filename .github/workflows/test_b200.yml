name: Test B200 Runner

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, b200]
    steps:
      - name: Scan GPU nodes
        run: |
          for node in hungry-hippo-fin-03-1 hungry-hippo-fin-03-2 hungry-hippo-fin-03-3 hungry-hippo-fin-03-7; do
            echo "=== $node ==="
            ssh -o ConnectTimeout=5 $node 'nvidia-smi --query-gpu=name,memory.total --format=csv,noheader 2>/dev/null && docker ps --format "{{.Names}} {{.Image}}" 2>/dev/null | head -5' 2>&1 || echo "UNREACHABLE"
          done
