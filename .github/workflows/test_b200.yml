name: Test B200 Runner
on:
  workflow_dispatch:
jobs:
  cleanup-and-sync:
    runs-on: [self-hosted, b200]
    timeout-minutes: 10
    env:
      SFS_REPO: /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf
      OLD_HOME: /home/ubuntu/zufa/ClaudeSkillsE2EPerf
      SYMLINK_SRC: /SFS-aGqda6ct/ubuntu/zufa
      SYMLINK_DST: /home/ubuntu/zufa
    steps:
      - name: Cleanup old repo + symlink on all nodes
        run: |
          for N in hungry-hippo-fin-03-2 hungry-hippo-fin-03-1 hungry-hippo-fin-03-3 hungry-hippo-fin-03-7; do
            echo "=== $N ==="
            ssh $N "if [ -d $OLD_HOME/.git ] && [ ! -L $SYMLINK_DST ]; then echo 'Removing old repo...'; rm -rf $SYMLINK_DST; echo 'Creating symlink $SYMLINK_DST -> $SYMLINK_SRC'; ln -s $SYMLINK_SRC $SYMLINK_DST; echo 'Done'; else echo 'Already symlinked or no old repo'; ls -la $SYMLINK_DST 2>/dev/null || echo 'path does not exist'; fi"
            echo ""
          done
          echo "=== jumphost ==="
          if [ -d $OLD_HOME/.git ] && [ ! -L $SYMLINK_DST ]; then
            echo "Removing old repo..."
            rm -rf $SYMLINK_DST
            echo "Creating symlink $SYMLINK_DST -> $SYMLINK_SRC"
            ln -s $SYMLINK_SRC $SYMLINK_DST
            echo "Done"
          else
            echo "Already symlinked or no old repo"
            ls -la $SYMLINK_DST 2>/dev/null || echo "path does not exist"
          fi

      - name: Git pull SFS repo
        run: |
          echo "=== Before pull ==="
          git -C $SFS_REPO log --oneline -3
          echo "=== Local changes ==="
          git -C $SFS_REPO status --short
          echo "=== Reset + clean + pull ==="
          git -C $SFS_REPO reset HEAD -- . 2>/dev/null || true
          git -C $SFS_REPO checkout -- . 2>/dev/null || true
          git -C $SFS_REPO clean -fd -- results_b200_mtp0_fp4_ep8_c64_dp0/ 2>/dev/null || true
          git -C $SFS_REPO pull
          echo "=== After pull ==="
          git -C $SFS_REPO log --oneline -3

      - name: Verify symlinks
        run: |
          for N in hungry-hippo-fin-03-2 hungry-hippo-fin-03-1 hungry-hippo-fin-03-3 hungry-hippo-fin-03-7; do
            echo "=== $N ==="
            ssh $N "ls -la /home/ubuntu/zufa && git -C /home/ubuntu/zufa/ClaudeSkillsE2EPerf log --oneline -1"
            echo ""
          done
          echo "=== jumphost ==="
          ls -la /home/ubuntu/zufa
          git -C /home/ubuntu/zufa/ClaudeSkillsE2EPerf log --oneline -1
