name: B200 Rebuild Environment
on:
  workflow_dispatch:
jobs:
  rebuild:
    runs-on: [self-hosted, b200]
    timeout-minutes: 30
    env:
      NODE: hungry-hippo-fin-03-2
      SFS: /SFS-aGqda6ct
      MODEL_FP4: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      MODEL_BF16: /SFS-aGqda6ct/models/models--DeepSeek-R1-0528
      REPO: /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf
    steps:
      - name: Cleanup old containers
        run: |
          echo "=== Remove old containers if any ==="
          ssh $NODE "docker rm -f zufa_trt zufa_sglang zufa_trt_rc10 2>/dev/null || true"

      - name: Check driver and CUDA version
        run: |
          echo "=== nvidia-smi ==="
          ssh $NODE "nvidia-smi | head -5"
          echo "=== CUDA version from nvidia-smi ==="
          ssh $NODE "nvidia-smi | grep 'CUDA Version'"

      - name: Create TRT-LLM container (rc10 for CUDA 13.0)
        run: |
          echo "=== Creating zufa_trt from rc10 (CUDA 13.0 compatible) ==="
          ssh $NODE "docker run -d --name zufa_trt \
            --gpus all --privileged --network host --ipc host \
            -v $SFS:$SFS \
            -v /home:/home \
            -e NVIDIA_VISIBLE_DEVICES=all \
            nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc10 sleep infinity"
          echo "=== Verify GPU access ==="
          ssh $NODE "docker exec zufa_trt nvidia-smi -L"
          echo "=== Verify TRT-LLM ==="
          ssh $NODE "docker exec zufa_trt python3 -c 'import tensorrt_llm; print(\"TRT-LLM:\", tensorrt_llm.__version__)'"
          echo "=== Verify model access ==="
          ssh $NODE "docker exec zufa_trt ls $MODEL_FP4/config.json"
          ssh $NODE "docker exec zufa_trt ls $MODEL_BF16/config.json"

      - name: Create SGLang container
        run: |
          echo "=== Creating zufa_sglang from v0.5.9-cu130 ==="
          ssh $NODE "docker run -d --name zufa_sglang \
            --gpus all --privileged --network host --ipc host \
            -v $SFS:$SFS \
            -v /home:/home \
            -e NVIDIA_VISIBLE_DEVICES=all \
            lmsysorg/sglang:v0.5.9-cu130 sleep infinity"
          echo "=== Verify GPU access ==="
          ssh $NODE "docker exec zufa_sglang nvidia-smi -L"
          echo "=== Verify SGLang ==="
          ssh $NODE "docker exec zufa_sglang python3 -c 'import sglang; print(\"SGLang:\", sglang.__version__)'"
          echo "=== Verify model access ==="
          ssh $NODE "docker exec zufa_sglang ls $MODEL_FP4/config.json"

      - name: Install ncu in TRT-LLM container
        run: |
          echo "=== Check if ncu available ==="
          ssh $NODE "docker exec zufa_trt bash -c 'which ncu 2>/dev/null && ncu --version | head -1 || echo ncu not found'"
          echo "=== Check nsys ==="
          ssh $NODE "docker exec zufa_trt bash -c 'which nsys 2>/dev/null && nsys --version | head -1 || echo nsys not found'"

      - name: Sync repo
        run: |
          echo "=== Sync host repo ==="
          ssh $NODE "cd $REPO && git fetch origin && git reset --hard origin/main && git log --oneline -3"
          echo "=== Verify repo in containers ==="
          ssh $NODE "docker exec zufa_trt ls $REPO/scripts/collect_ncu_trace.sh"
          ssh $NODE "docker exec zufa_sglang ls $REPO/scripts/collect_ncu_trace.sh"

      - name: Quick smoke test - TRT-LLM model load
        run: |
          echo "=== Quick TRT-LLM import test ==="
          ssh $NODE "docker exec zufa_trt python3 -c '
          from tensorrt_llm import LLM
          print(\"TRT-LLM LLM class imported successfully\")
          '"

      - name: Show final state
        if: always()
        run: |
          echo "=== All containers ==="
          ssh $NODE "docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'"
          echo ""
          echo "=== Model paths ==="
          echo "FP4: $MODEL_FP4"
          echo "BF16: $MODEL_BF16"
          echo ""
          echo "=== GPU count ==="
          ssh $NODE "nvidia-smi -L | wc -l"
