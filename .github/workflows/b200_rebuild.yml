name: B200 Rebuild Environment
on:
  workflow_dispatch:
jobs:
  rebuild:
    runs-on: [self-hosted, b200]
    timeout-minutes: 30
    env:
      NODE: hungry-hippo-fin-03-2
      SFS: /SFS-aGqda6ct
      MODEL_FP4: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      MODEL_BF16: /SFS-aGqda6ct/models/models--DeepSeek-R1-0528
      REPO: /home/ubuntu/zufa/ClaudeSkillsE2EPerf
    steps:
      - name: Cleanup old containers
        run: |
          ssh $NODE "docker rm -f zufa_trt zufa_sglang 2>/dev/null || true"

      - name: Check driver
        run: |
          ssh $NODE "nvidia-smi | head -5"
          ssh $NODE "nvidia-smi -L | wc -l"

      - name: Create and debug TRT-LLM container (rc10)
        run: |
          ssh $NODE "docker run -d --name zufa_trt --gpus all --privileged --network host --ipc host -v $SFS:$SFS -v /home:/home -e NVIDIA_VISIBLE_DEVICES=all nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc10 sleep infinity"

          echo "=== Find libnvonnxparser ==="
          ssh $NODE "docker exec zufa_trt find / -name 'libnvonnxparser*' 2>/dev/null | head -10"
          echo "=== Find libnvinfer ==="
          ssh $NODE "docker exec zufa_trt find / -name 'libnvinfer*' 2>/dev/null | head -10"
          echo "=== LD_LIBRARY_PATH ==="
          ssh $NODE "docker exec zufa_trt bash -c 'echo \$LD_LIBRARY_PATH'"
          echo "=== ldconfig -p for nvinfer ==="
          ssh $NODE "docker exec zufa_trt ldconfig -p 2>/dev/null | grep -i nvinfer | head -5"
          echo "=== ldconfig -p for onnx ==="
          ssh $NODE "docker exec zufa_trt ldconfig -p 2>/dev/null | grep -i onnx | head -5"
          echo "=== Try import with debug ==="
          ssh $NODE "docker exec zufa_trt bash -c 'LD_DEBUG=libs python3 -c \"import tensorrt\" 2>&1 | grep -i \"onnx\\|nvinfer\" | head -20'"

      - name: Try fix and import TRT-LLM
        run: |
          echo "=== Try ldconfig fix ==="
          ssh $NODE "docker exec zufa_trt bash -c 'ldconfig && python3 -c \"import tensorrt_llm; print(tensorrt_llm.__version__)\"'" || true
          echo "=== Try with explicit LD path ==="
          ssh $NODE "docker exec zufa_trt bash -c 'export LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/usr/local/lib:\$LD_LIBRARY_PATH && python3 -c \"import tensorrt_llm; print(tensorrt_llm.__version__)\"'" || true
          echo "=== Check CUDA toolkit in container ==="
          ssh $NODE "docker exec zufa_trt bash -c 'nvcc --version 2>/dev/null | head -3; ls /usr/local/cuda/lib64/libnv* 2>/dev/null | head -10'"

      - name: Create SGLang container
        run: |
          ssh $NODE "docker run -d --name zufa_sglang --gpus all --privileged --network host --ipc host -v $SFS:$SFS -v /home:/home -e NVIDIA_VISIBLE_DEVICES=all lmsysorg/sglang:v0.5.9-cu130 sleep infinity"
          echo "=== Verify SGLang ==="
          ssh $NODE "docker exec zufa_sglang python3 -c 'import sglang; print(\"SGLang:\", sglang.__version__)'" || true
          echo "=== Check torch CUDA ==="
          ssh $NODE "docker exec zufa_sglang python3 -c 'import torch; print(\"torch:\", torch.__version__, \"CUDA:\", torch.version.cuda, \"avail:\", torch.cuda.is_available())'" || true

      - name: Show final state
        if: always()
        run: |
          ssh $NODE "docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'"
          echo "Models: $MODEL_FP4"
          ssh $NODE "nvidia-smi -L | wc -l"
          echo "GPUs available"
