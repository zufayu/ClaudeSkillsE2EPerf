name: B200 Rebuild Environment
on:
  workflow_dispatch:
jobs:
  rebuild:
    runs-on: [self-hosted, b200]
    timeout-minutes: 30
    env:
      NODE: hungry-hippo-fin-03-2
    steps:
      - name: Find model files
        run: |
          echo "=== Check SFS for models ==="
          ssh $NODE "ls /SFS-aGqda6ct/ubuntu/ 2>/dev/null | head -20"
          echo "=== Find DeepSeek models ==="
          ssh $NODE "find /SFS-aGqda6ct -maxdepth 4 -name 'config.json' -path '*DeepSeek*' 2>/dev/null | head -10"
          ssh $NODE "find /SFS-aGqda6ct -maxdepth 4 -name 'config.json' -path '*NVFP4*' 2>/dev/null | head -10"
          echo "=== Check /home ==="
          ssh $NODE "ls -la /home/ 2>/dev/null"
          echo "=== Check common model paths ==="
          ssh $NODE "ls /models/ 2>/dev/null; ls /data/models/ 2>/dev/null; ls /workspace/models/ 2>/dev/null" || true
          echo "=== Find any large model dirs ==="
          ssh $NODE "find / -maxdepth 3 -name 'DeepSeek*' -type d 2>/dev/null | head -10" || true

      - name: Check available Docker images
        run: |
          echo "=== Docker images ==="
          ssh $NODE "docker images --format '{{.Repository}}:{{.Tag}}  {{.Size}}'"

      - name: Create TRT-LLM container (rc6.post3)
        run: |
          echo "=== Creating zufa_trt container ==="
          ssh $NODE "docker run -d --name zufa_trt --gpus all --privileged --network host --ipc host -v /SFS-aGqda6ct:/SFS-aGqda6ct -v /home:/home -e NVIDIA_VISIBLE_DEVICES=all nvcr.io/nvidia/tensorrt-llm/release:1.2.0rc6.post3 sleep infinity" || echo "Failed to create zufa_trt"
          echo "=== Verify zufa_trt ==="
          ssh $NODE "docker exec zufa_trt nvidia-smi -L 2>&1 | head -5"
          ssh $NODE "docker exec zufa_trt python3 -c 'import tensorrt_llm; print(tensorrt_llm.__version__)' 2>&1"

      - name: Create SGLang container
        run: |
          echo "=== Creating zufa_sglang container ==="
          ssh $NODE "docker run -d --name zufa_sglang --gpus all --privileged --network host --ipc host -v /SFS-aGqda6ct:/SFS-aGqda6ct -v /home:/home -e NVIDIA_VISIBLE_DEVICES=all lmsysorg/sglang:v0.5.9-cu130 sleep infinity" || echo "Failed to create zufa_sglang"
          echo "=== Verify zufa_sglang ==="
          ssh $NODE "docker exec zufa_sglang nvidia-smi -L 2>&1 | head -5"
          ssh $NODE "docker exec zufa_sglang python3 -c 'import sglang; print(sglang.__version__)' 2>&1"

      - name: Find and symlink models
        run: |
          echo "=== Search for FP4 model on SFS ==="
          ssh $NODE "find /SFS-aGqda6ct -maxdepth 5 -name 'DeepSeek-R1-0528-NVFP4*' -type d 2>/dev/null | head -5"
          ssh $NODE "find /SFS-aGqda6ct -maxdepth 5 -name 'DeepSeek-R1-0528' -type d 2>/dev/null | head -5"
          echo "=== Search for any DeepSeek dir ==="
          ssh $NODE "find /SFS-aGqda6ct -maxdepth 5 -type d -name '*eepSeek*' 2>/dev/null | head -20"
          echo "=== Check if /home/models was on SFS ==="
          ssh $NODE "ls -la /SFS-aGqda6ct/ubuntu/zufa/ 2>/dev/null | head -20"

      - name: List all containers
        run: |
          ssh $NODE "docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'"

      - name: Sync repo in containers
        run: |
          echo "=== Sync host repo ==="
          ssh $NODE "cd /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf && git fetch origin && git reset --hard origin/main && git log --oneline -3"
          echo "=== Check repo accessible from containers ==="
          ssh $NODE "docker exec zufa_trt ls /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf/scripts/ 2>/dev/null | head -5" || true
          ssh $NODE "docker exec zufa_sglang ls /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf/scripts/ 2>/dev/null | head -5" || true
