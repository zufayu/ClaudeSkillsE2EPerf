name: "B200 NCU Profiling (EP8 c=4)"
on:
  workflow_dispatch:
jobs:
  ncu-profiling:
    runs-on: [self-hosted, b200]
    timeout-minutes: 120
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_sglang
      REPO: /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf
      MODEL_FP4: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      RESULT_DIR: results/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep8_tp8_sglang059_profiling_c4
    steps:
      - name: Sync repo
        run: ssh $NODE "cd $REPO && git fetch origin && git reset --hard origin/main"

      - name: Ensure container is running
        run: |
          ssh $NODE "docker start $CONTAINER 2>/dev/null || echo 'Container not found or already running'"
          ssh $NODE "docker exec $CONTAINER python3 -c 'import sglang; print(f\"SGLang {sglang.__version__}\")'"

      - name: Find or install ncu in container
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c '
            if which ncu 2>/dev/null; then ncu --version; exit 0; fi
            echo \"ncu not in PATH, searching...\"
            NCU_PATH=\$(find /usr/local/cuda /opt/nvidia 2>/dev/null -name ncu -type f | head -1)
            if [ -n \"\$NCU_PATH\" ]; then
              echo \"Found: \$NCU_PATH\"
              ln -sf \$NCU_PATH /usr/local/bin/ncu
              ncu --version
              exit 0
            fi
            echo \"Not found, installing nsight-compute-2025.3.1...\"
            apt-get update -qq && apt-get install -y -qq nsight-compute-2025.3.1 || apt-get install -y -qq nsight-compute
            which ncu && ncu --version
          '"

      - name: Run ncu profiling (pmsampling only, fast test)
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'cd $REPO && bash scripts/collect_ncu_trace.sh --backend sglang --model $MODEL_FP4 --tp 8 --ep 8 --quantization modelopt_fp4 --osl 32 --warmup 3 --ncu-set pmsampling --result-dir ./$RESULT_DIR'" 2>&1 | tail -60

      - name: Show results
        if: always()
        run: |
          ssh $NODE "ls -lh $REPO/$RESULT_DIR/ncu/ 2>/dev/null || echo 'No ncu dir'"
          ssh $NODE "tail -20 $REPO/$RESULT_DIR/ncu/ncu_decode.log 2>/dev/null || echo 'No log'"

      - name: Git commit and push
        if: always()
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'chown -R \$(stat -c %u:%g $REPO/.git) $REPO/results/ 2>/dev/null; true'"
          ssh $NODE "cd $REPO && git config user.email 'ci@github.com' && git config user.name 'B200 CI'"
          ssh $NODE "cd $REPO && git add -f $RESULT_DIR/ncu/*.log $RESULT_DIR/ncu/*.csv 2>/dev/null || true; git diff --cached --name-only"
          ssh $NODE "cd $REPO && if ! git diff --cached --quiet; then git commit -m 'data: B200 EP8 TP8 ncu profiling test (pmsampling)

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>' && git pull --rebase origin main && git push; else echo 'Nothing to commit'; fi"
