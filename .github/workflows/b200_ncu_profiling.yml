name: "B200 NCU Profiling (SGLang FP4 EP8)"
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Benchmark scenario"
        required: true
        default: "chat"
        type: choice
        options: [chat, reasoning, summarize]
      concurrency:
        description: "Request concurrency"
        required: true
        default: "64"
      ncu_set:
        description: "NCU section set"
        required: true
        default: "full"
        type: choice
        options: [full, detailed, basic, pmsampling]
      launch_count:
        description: "Kernel launches to capture"
        required: true
        default: "140"
jobs:
  ncu-profiling:
    runs-on: [self-hosted, b200]
    timeout-minutes: 240
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_sglang
      REPO: /home/ubuntu/zufa/ClaudeSkillsE2EPerf
      MODEL_FP4: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
    steps:
      - name: Sync repo
        run: ssh $NODE "cd $REPO && git fetch origin && git reset --hard origin/main"

      - name: Ensure container is running
        run: |
          ssh $NODE "docker start $CONTAINER 2>/dev/null || echo 'Container not found or already running'"
          ssh $NODE "docker exec $CONTAINER python3 -c 'import sglang; print(f\"SGLang {sglang.__version__}\")'"

      - name: Find or install ncu in container
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c '
            if which ncu 2>/dev/null; then ncu --version; exit 0; fi
            echo \"ncu not in PATH, searching...\"
            NCU_PATH=\$(find /usr/local/cuda /opt/nvidia 2>/dev/null -name ncu -type f | head -1)
            if [ -n \"\$NCU_PATH\" ]; then
              echo \"Found: \$NCU_PATH\"
              ln -sf \$NCU_PATH /usr/local/bin/ncu
              ncu --version
              exit 0
            fi
            echo \"Not found, installing nsight-compute-2025.3.1...\"
            apt-get update -qq && apt-get install -y -qq nsight-compute-2025.3.1 || apt-get install -y -qq nsight-compute
            which ncu && ncu --version
          '"

      - name: Set result dir
        id: vars
        run: |
          RESULT_DIR="results/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep8_tp8_sglang059_profiling"
          echo "result_dir=$RESULT_DIR" >> "$GITHUB_OUTPUT"

      - name: Run ncu profiling (serve mode, ${{ inputs.scenario }} c=${{ inputs.concurrency }})
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'cd $REPO && bash scripts/collect_ncu_trace.sh --backend sglang --mode serve --model $MODEL_FP4 --tp 8 --ep 8 --quantization modelopt_fp4 --concurrency ${{ inputs.concurrency }} --scenario ${{ inputs.scenario }} --warmup-prompts $(( ${{ inputs.concurrency }} * 2 )) --ncu-set ${{ inputs.ncu_set }} --launch-count ${{ inputs.launch_count }} --report-name ncu_decode_${{ inputs.scenario }}_c${{ inputs.concurrency }} --result-dir ./${{ steps.vars.outputs.result_dir }}'" 2>&1 | tail -200

      - name: Show results
        if: always()
        run: |
          ssh $NODE "ls -lh $REPO/${{ steps.vars.outputs.result_dir }}/ncu/ 2>/dev/null || echo 'No ncu dir'"
          ssh $NODE "tail -50 $REPO/${{ steps.vars.outputs.result_dir }}/ncu/ncu_decode_${{ inputs.scenario }}_c${{ inputs.concurrency }}.log 2>/dev/null || echo 'No log'"
          ssh $NODE "tail -30 $REPO/${{ steps.vars.outputs.result_dir }}/ncu/decode_region.log 2>/dev/null || echo 'No decode region log'"

      - name: Git commit and push
        if: always()
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'chown -R \$(stat -c %u:%g $REPO/.git) $REPO/results/ 2>/dev/null; true'"
          ssh $NODE "cd $REPO && git config user.email 'ci@github.com' && git config user.name 'B200 CI'"
          ssh $NODE "cd $REPO && git add -f ${{ steps.vars.outputs.result_dir }}/ncu/*.log ${{ steps.vars.outputs.result_dir }}/ncu/*.csv 2>/dev/null || true; git diff --cached --name-only"
          ssh $NODE "cd $REPO && if ! git diff --cached --quiet; then git commit -m 'data: B200 SGLang FP4 EP8 ncu profiling (${{ inputs.scenario }} c=${{ inputs.concurrency }}, ${{ inputs.ncu_set }})

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>' && git pull --rebase origin main && git push; else echo 'Nothing to commit'; fi"
