name: B200 Nsys NVTX Trace Test
on:
  workflow_dispatch:

jobs:
  nvtx-trace-test:
    runs-on: [self-hosted, b200]
    timeout-minutes: 30
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_sglang
      REPO: /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf
      RESULT_DIR: results/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep4_tp4_sglang059_nsys
    steps:
      - name: Find nsys-rep
        run: |
          NSYS_REP=$(ssh $NODE "ls -t $REPO/$RESULT_DIR/*.nsys-rep 2>/dev/null | head -1")
          if [ -z "$NSYS_REP" ]; then echo "ERROR: No .nsys-rep"; exit 1; fi
          echo "NSYS_REP=$NSYS_REP" >> $GITHUB_ENV
          ssh $NODE "ls -lh $NSYS_REP"

      - name: List available nsys stats reports
        run: |
          ssh $NODE "docker exec $CONTAINER nsys stats --help-reports 2>&1" || true

      - name: Export nvtx_pushpop_trace CSV
        run: |
          NVTX_OUT="$REPO/$RESULT_DIR/nvtx_trace"
          echo "Exporting nvtx_pushpop_trace..."
          ssh $NODE "docker exec $CONTAINER nsys stats --report nvtx_pushpop_trace --format csv --force-overwrite true -o $NVTX_OUT $NSYS_REP 2>&1" || echo "WARN: nvtx_pushpop_trace export failed"
          echo "=== Files ==="
          ssh $NODE "ls -lh ${NVTX_OUT}* 2>/dev/null || echo 'No output'"
          echo "=== Header + first 20 lines ==="
          ssh $NODE "head -20 ${NVTX_OUT}*.csv 2>/dev/null || echo 'No CSV'"

      - name: Search for module markers in nvtx trace
        run: |
          NVTX_OUT="$REPO/$RESULT_DIR/nvtx_trace"
          echo "=== model.model markers ==="
          ssh $NODE "grep -c 'model.model' ${NVTX_OUT}*.csv 2>/dev/null || echo '0 matches'"
          ssh $NODE "grep 'model.model' ${NVTX_OUT}*.csv 2>/dev/null | grep -v 'layers' | head -20 || echo 'None without layers'"
          echo ""
          echo "=== decode markers ==="
          ssh $NODE "grep -ci 'decode' ${NVTX_OUT}*.csv 2>/dev/null || echo '0 matches'"
          ssh $NODE "grep -i 'decode' ${NVTX_OUT}*.csv 2>/dev/null | head -10 || echo 'None'"
          echo ""
          echo "=== Module markers ==="
          ssh $NODE "grep -i 'module' ${NVTX_OUT}*.csv 2>/dev/null | head -10 || echo 'None'"

      - name: Analyze decode steps from nvtx trace CSV
        run: |
          ssh $NODE "docker exec $CONTAINER python3 -c \"
          import csv, glob, re, os
          from collections import Counter

          csvfiles = glob.glob('$REPO/$RESULT_DIR/nvtx_trace*.csv')
          if not csvfiles:
              print('No nvtx_trace CSV found')
              exit(0)

          print(f'Reading {csvfiles[0]}')
          print(f'Size: {os.path.getsize(csvfiles[0])/1e6:.1f}MB')

          with open(csvfiles[0]) as f:
              reader = csv.DictReader(f)
              cols = reader.fieldnames
              print(f'Columns: {cols}')

              model_events = []
              all_texts = Counter()
              row_count = 0
              for row in reader:
                  row_count += 1
                  text = row.get('Name', row.get('Range', row.get('name', '')))
                  all_texts[text[:80]] += 1
                  if 'model.model' in str(text) and 'layers' not in str(text):
                      model_events.append(row)

          print(f'Total rows: {row_count}')
          print(f'\\nTop 20 NVTX texts:')
          for text, cnt in all_texts.most_common(20):
              print(f'  {cnt:>6}x  {text}')

          print(f'\\nmodel.model events (no layers): {len(model_events)}')
          if model_events:
              print(f'  Sample keys: {list(model_events[0].keys())}')
              for e in model_events[:3]:
                  print(f'    {e}')

              # Parse start/duration
              durs = []
              starts = []
              for e in model_events:
                  for dk in ['Duration(nsec)','Duration','duration','Dur(ns)']:
                      if dk in e:
                          try: durs.append(float(e[dk])); break
                          except: pass
                  for sk in ['Start(nsec)','Start','start','Start(ns)']:
                      if sk in e:
                          try: starts.append(float(e[sk])); break
                          except: pass

              if durs:
                  print(f'\\n  Duration stats ({len(durs)} events):')
                  print(f'    avg={sum(durs)/len(durs)/1e6:.2f}ms  min={min(durs)/1e6:.2f}ms  max={max(durs)/1e6:.2f}ms')

                  # Duration histogram
                  buckets = Counter()
                  for d in durs:
                      ms = d / 1e6
                      if ms < 1: buckets['<1ms'] += 1
                      elif ms < 5: buckets['1-5ms'] += 1
                      elif ms < 20: buckets['5-20ms'] += 1
                      elif ms < 50: buckets['20-50ms'] += 1
                      elif ms < 200: buckets['50-200ms'] += 1
                      else: buckets['>200ms'] += 1
                  print(f'  Duration distribution:')
                  for b in ['<1ms','1-5ms','5-20ms','20-50ms','50-200ms','>200ms']:
                      if b in buckets: print(f'    {b}: {buckets[b]}')

                  # Decode = most common duration range
                  sorted_durs = sorted(durs)
                  median = sorted_durs[len(sorted_durs)//2]
                  # Decode events are the frequent ones with similar duration
                  decode_durs = [d for d in durs if d < median * 3 and d > median * 0.3]
                  print(f'\\n  Decode-like events (within 3x of median {median/1e6:.1f}ms): {len(decode_durs)}')
                  if decode_durs:
                      avg_ms = sum(decode_durs)/len(decode_durs)/1e6
                      print(f'    avg decode model forward: {avg_ms:.2f}ms')
                      print(f'    total decode count: {len(decode_durs)}')

              if starts:
                  total_span = (max(starts) - min(starts)) / 1e9
                  print(f'\\n  Time span: {total_span:.1f}s ({min(starts)/1e9:.1f}s to {max(starts)/1e9:.1f}s)')
          \" 2>&1"

      - name: Check TPOT from benchmark results
        run: |
          ssh $NODE "docker exec $CONTAINER python3 -c \"
          import json, glob
          files = glob.glob('$REPO/$RESULT_DIR/result_*.json')
          for f in sorted(files):
              with open(f) as fh:
                  d = json.load(fh)
              tpot = d.get('tpot_p50', d.get('median_tpot_ms', 'N/A'))
              ttft = d.get('ttft_p50', d.get('median_ttft_ms', 'N/A'))
              out_tps = d.get('output_throughput', 'N/A')
              conc = d.get('max_concurrency', d.get('concurrency', 'N/A'))
              print(f'{f.split(\"/\")[-1]}:')
              print(f'  TPOT_p50={tpot}ms  TTFT_p50={ttft}ms  output_tps={out_tps}  conc={conc}')
          \" 2>&1" || echo "Could not parse"
