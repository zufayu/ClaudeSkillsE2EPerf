name: MI355X Ops
on:
  repository_dispatch:
    types: [mi355x-ops]
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: false
        default: "ep8-c4-complete"
jobs:
  ep8-c4-complete:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 30
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
      OLD_DIR: results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_ep8_tp8_rocm711_profiling_c4
      TARGET_DIR: results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_ep8_tp8_rocm711_profiling
    steps:
      - name: Ensure container running
        run: podman start $CONTAINER 2>/dev/null || true

      - name: Sync repo
        run: cd $REPO && git fetch origin && git reset --hard origin/main

      - name: Inventory
        run: |
          echo "=== Old dir (trace source) ==="
          ls -lh $REPO/$OLD_DIR/ 2>/dev/null || echo "OLD_DIR not found"
          echo ""
          echo "=== Target dir ==="
          ls -lh $REPO/$TARGET_DIR/ 2>/dev/null || echo "TARGET_DIR not found"

      - name: Generate decode_walltime CSV for c4
        run: |
          cd $REPO
          TRACE=$(ls $OLD_DIR/*.pt.trace.json.gz 2>/dev/null | grep -v capture_graph | grep -v trim | head -1)
          if [ -z "$TRACE" ]; then echo "No trace file in $OLD_DIR"; exit 1; fi
          echo "Trace: $TRACE"
          podman exec $CONTAINER bash -c "cd $REPO && python3 << 'PYEOF'
import gzip, json, csv, sys, os
trace_path = '$TRACE'
print(f'Loading {trace_path}...')
with gzip.open(trace_path, 'rt') as f:
    data = json.load(f)
events = data.get('traceEvents', [])
print(f'Total events: {len(events)}')
decodes = []
for e in events:
    if e.get('ph') == 'X' and 'user_annotation' in e.get('cat', '') and (e.get('name', '').startswith('decode[') or e.get('name', '').startswith('decode ')):
        name = e['name']
        bs = 'unknown'
        for part in name.replace('[', ' ').replace(']', ' ').replace(',', ' ').split():
            if part.startswith('bs=') or part.startswith('bs:'):
                bs = part.split('=')[-1].split(':')[-1]
        decodes.append({'ts': e['ts'], 'dur': e['dur'], 'bs': bs, 'name': name})
decodes.sort(key=lambda x: x['ts'])
print(f'Decode events: {len(decodes)}')
out_csv = '$TARGET_DIR/decode_walltime_trace_chat_c4_tp8_p40.csv'
os.makedirs(os.path.dirname(out_csv), exist_ok=True)
with open(out_csv, 'w', newline='') as f:
    w = csv.writer(f)
    w.writerow(['step', 'ts_us', 'dur_us', 'bs'])
    for i, d in enumerate(decodes):
        w.writerow([i, d['ts'], d['dur'], d['bs']])
print(f'Wrote {len(decodes)} rows to {out_csv}')
PYEOF"

      - name: Run ATOM parse_trace for c4
        run: |
          cd $REPO
          TRACE=$(ls $OLD_DIR/*_trim_decode.json.gz 2>/dev/null | head -1)
          if [ -z "$TRACE" ]; then
            TRACE=$(ls $OLD_DIR/*.pt.trace.json.gz 2>/dev/null | grep -v capture_graph | head -1)
          fi
          if [ -z "$TRACE" ]; then echo "No trace file for parse_trace"; exit 0; fi
          echo "Running run_parse_trace.py on: $TRACE"
          podman exec $CONTAINER bash -c "cd $REPO/$TARGET_DIR && ATOM_TOOLS=/app/ATOM/tools python3 $REPO/scripts/run_parse_trace.py $REPO/$TRACE --layer 40" 2>&1 | tail -40
          echo ""
          echo "=== Generated files ==="
          ls -lh $REPO/$TARGET_DIR/ 2>/dev/null

      - name: Commit and push
        if: always()
        run: |
          cd $REPO
          git config user.email "ci@github.com"
          git config user.name "MI355X CI"
          for ext in log csv md xlsx json; do git add -f $TARGET_DIR/*.$ext 2>/dev/null || true; done
          git diff --cached --name-only
          if ! git diff --cached --quiet; then
            git commit -m "data: MI355X EP8 TP8 c=4 profiling complete (decode_walltime + reparse)

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
            git pull --rebase origin main || true
            git push
          else
            echo "Nothing new to commit"
          fi

      - name: Final inventory
        if: always()
        run: ls -lh $REPO/$TARGET_DIR/ 2>/dev/null
