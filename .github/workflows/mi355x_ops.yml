name: MI355X Ops
on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: false
        default: "rename-and-save"
jobs:
  rename-and-save:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 10
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
    steps:
      - name: Sync repo
        run: cd $REPO && git pull --rebase

      - name: Delete old directory
        run: cd $REPO && rm -rf results_mi355x_mxfp4_mtp0_ep8_tp8

      - name: Rename trace to profiling
        run: cd $REPO && if [ -d results_mi355x_mxfp4_mtp0_ep8_tp8_trace ]; then mv results_mi355x_mxfp4_mtp0_ep8_tp8_trace results_mi355x_dsr_mxfp4_mtp0_ep8_tp8_profiling; echo "Renamed to results_mi355x_dsr_mxfp4_mtp0_ep8_tp8_profiling"; else echo "Source dir not found"; fi

      - name: Git add profiling files
        run: |
          cd $REPO
          git config user.email "ci@github.com"
          git config user.name "MI355X CI"
          for dir in results_mi355x_dsr_mxfp4_mtp0_ep8_tp8_profiling; do
            if [ -d "$dir" ]; then
              git add -f "$dir"/*.xlsx "$dir"/*.csv "$dir"/*.log "$dir"/result_profiled_trace_*.json 2>/dev/null || true
              echo "Added files from $dir"
            fi
          done
          echo "=== Staged files ==="
          git diff --cached --name-only
          if git diff --cached --quiet; then
            echo "No new files to commit"
          else
            git commit -m "data: add MI355X MXFP4 TP=8 EP=8 profiling data (xlsx, csv, log, result json)

Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
            git push
          fi

      - name: Show result
        if: always()
        run: cd $REPO && git log --oneline -3 && echo "" && ls -la results_mi355x_dsr_mxfp4_mtp0_ep8_tp8_profiling/ 2>/dev/null || echo "Dir not found"
