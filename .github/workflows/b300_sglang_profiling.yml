name: "B300 SGLang Profiling"
on:
  workflow_dispatch:
    inputs:
      container:
        type: string
        default: "zufa_sglang"
      configs:
        type: choice
        options: [fp4-throughput, fp4-latency]
        default: fp4-throughput
      ep:
        type: string
        default: "8"
      tp:
        type: string
        default: "8"
      scenario:
        type: choice
        options: [chat, reasoning, summarize]
        default: chat
      concurrency:
        type: string
        default: "64"

jobs:
  profiling:
    runs-on: [self-hosted, b300]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          export CONTAINER="${{ inputs.container }}"
          ci_parse_configs "${{ inputs.configs }}"
          MODEL="$MODEL_FP4"
          ci_get_image
          ENV_TAG=$(ci_detect_env_tag sglang)
          RESULT_DIR=$(ci_result_dir "$PLATFORM" "dsr" "$QUANT" "$MTP" "${{ inputs.ep }}" "${{ inputs.tp }}" "$ENV_TAG" "_profiling")
          for var in CONTAINER MODEL QUANT MTP MODE IMAGE ENV_TAG RESULT_DIR REPO EXEC_MODE CI_USER_NAME CI_USER_EMAIL; do
            echo "$var=${!var}" >> $GITHUB_ENV
          done
          echo "CONTAINER=$CONTAINER ENV_TAG=$ENV_TAG"
          echo "RESULT_DIR=$RESULT_DIR"

      - name: Sync repo
        run: source scripts/ci_lib.sh && ci_load_platform b300 && ci_sync

      - name: Verify container
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          ci_verify_gpu
          ci_exec "python3 -c 'import sglang; print(f\"SGLang {sglang.__version__}\")'"

      - name: Clean old results
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          ci_exec "rm -rf $REPO/$RESULT_DIR/* 2>/dev/null; true"

      - name: "Phase 1: Torch trace capture"
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          ARGS="--model $MODEL --tp ${{ inputs.tp }} --ep ${{ inputs.ep }} --scenario ${{ inputs.scenario }} --concurrency ${{ inputs.concurrency }} --quant $QUANT --env $ENV_TAG --platform $PLATFORM --container-image $IMAGE --result-dir ./$RESULT_DIR"
          ci_exec "cd $REPO && bash scripts/collect_sglang_trace.sh $ARGS"

      - name: "Phase 2: Fix overlapping kernels"
        continue-on-error: true
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          TRACE=$(ls $REPO/$RESULT_DIR/*TP-0-EP-0*.trace.json.gz 2>/dev/null | grep -v serialized | grep -v '.fix.' | head -1)
          if [ -n "$TRACE" ]; then
            ci_exec "cd $REPO && python3 scripts/fix_torch_trace_pro.py $TRACE"
          else
            echo "No trace file — skipping fix"
          fi

      - name: "Phase 3: Layer detail analysis"
        continue-on-error: true
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          TRACE=$(ls $REPO/$RESULT_DIR/*TP-0-EP-0*.fix.json.gz 2>/dev/null | head -1)
          if [ -n "$TRACE" ]; then
            ci_exec "cd $REPO && python3 scripts/trace_layer_detail.py $TRACE --output-dir ./$RESULT_DIR"
          else
            echo "No fixed trace — skipping analysis"
          fi

      - name: Show results
        if: always()
        run: cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo 'No summary'

      - name: Fix file ownership (always) — prevents next checkout's clean from failing
        if: always()
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          ci_fix_ownership "$RESULT_DIR" || true

      - name: Commit results
        if: always()
        run: |
          source scripts/ci_lib.sh && ci_load_platform b300
          ci_commit_results "$RESULT_DIR" \
            "data: B300 SGLang ${{ inputs.configs }} EP=${{ inputs.ep }} TP=${{ inputs.tp }} profiling (${{ inputs.scenario }} c=${{ inputs.concurrency }}, $ENV_TAG)"

      - name: Show final state
        if: always()
        run: cd $REPO && git log --oneline -3
