name: "B200 Create zufa_trt_v2 (rc6.post3)"
on:
  workflow_dispatch:
jobs:
  create:
    runs-on: [self-hosted, b200-node1]
    timeout-minutes: 60
    env:
      NEW: zufa_trt_v2
      IMAGE: nvcr.io/nvidia/tensorrt-llm/release:1.2.0rc6.post3
      SFS: /SFS-aGqda6ct
    steps:
      - name: Recon node and disk
        shell: bash {0}
        run: |
          echo "=== host ==="
          hostname; uptime; nvidia-smi -L | head -5
          echo "=== existing containers ==="
          docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
          echo "=== existing tensorrt-llm images ==="
          docker images | grep -i tensorrt-llm || echo '(none)'
          echo "=== disk space ==="
          df -h /var/lib/docker $SFS /home /home/zufayu 2>/dev/null
          echo "=== zufa_trt_v2 already exists? ==="
          docker ps -a --filter name=^${NEW}$ --format '{{.Names}} ({{.Status}})' || echo 'no'

      - name: Pull rc6.post3 image (if not cached)
        shell: bash {0}
        run: |
          if docker image inspect $IMAGE >/dev/null 2>&1; then
            echo "Image already pulled"
          else
            echo "Pulling $IMAGE — may take 5-15 min"
            docker pull $IMAGE 2>&1 | tail -20
          fi
          docker images $IMAGE

      - name: Create zufa_trt_v2
        shell: bash {0}
        run: |
          docker rm -f $NEW 2>/dev/null || true
          # Match setup_b200_trt2.yml proven flags + user requested mounts (/home/zufayu via /home, /SFS, /data)
          docker run -d --name $NEW \
            --gpus all --ipc host \
            --ulimit memlock=-1 --ulimit stack=67108864 \
            --shm-size=64g --cap-add=SYS_PTRACE \
            -v /home:/home \
            -v $SFS:$SFS \
            -v /data:/data \
            -e NVIDIA_VISIBLE_DEVICES=all \
            $IMAGE sleep infinity
          sleep 3
          docker ps --filter name=^${NEW}$ --format '{{.Names}} {{.Status}} {{.Image}}'

      - name: Smoke test
        shell: bash {0}
        run: |
          echo "=== nvidia-smi ==="
          docker exec $NEW nvidia-smi -L
          echo "=== TRT-LLM version ==="
          docker exec $NEW bash -c 'export LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH; python3 -c "import tensorrt_llm; print(tensorrt_llm.__version__)"' 2>&1 | tail -5
          echo "=== trtllm-bench ==="
          docker exec $NEW which trtllm-bench 2>/dev/null || echo "not found"
          echo "=== model accessible ==="
          docker exec $NEW ls -d $SFS/models/DeepSeek-R1-0528-NVFP4-v2 2>&1 | head -3
          echo "=== repo accessible ==="
          docker exec $NEW ls /home/zufayu/ClaudeSkillsE2EPerf 2>&1 | head -5
          echo "=== /data accessible ==="
          docker exec $NEW ls /data 2>&1 | head -5
