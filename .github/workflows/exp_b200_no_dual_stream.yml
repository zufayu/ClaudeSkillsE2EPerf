name: "Experiment: B200 no dual-stream"
on:
  workflow_dispatch:
jobs:
  no-dual-stream-bench:
    runs-on: [self-hosted, b200]
    timeout-minutes: 60
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_sglang
      REPO: /home/ubuntu/zufa/ClaudeSkillsE2EPerf
      MODEL_FP4: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      EXP_DIR: experiments/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep4_tp4_sglang059_no_dual_stream
    steps:
      - name: Sync repo
        run: ssh $NODE "cd $REPO && git rebase --abort 2>/dev/null; rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null; git reset --hard 2>/dev/null; git checkout -B main origin/main --force 2>/dev/null; git pull --rebase origin main 2>/dev/null; true"

      - name: Verify container
        run: |
          ssh $NODE "docker exec $CONTAINER nvidia-smi --query-gpu=name,memory.total --format=csv,noheader | head -2"
          ssh $NODE "docker exec $CONTAINER python3 -c 'import sglang; print(f\"SGLang {sglang.__version__}\")'"

      - name: Get container image name
        run: echo "IMAGE=$(ssh $NODE "docker inspect $CONTAINER --format '{{.Config.Image}}'" 2>/dev/null || echo unknown)" >> $GITHUB_ENV

      - name: Clean experiment dir
        run: ssh $NODE "docker exec $CONTAINER bash -c 'mkdir -p $REPO/$EXP_DIR && rm -rf $REPO/$EXP_DIR/* 2>/dev/null; true'"

      - name: Patch deepseek_v2.py
        run: ssh $NODE "docker exec $CONTAINER python3 $REPO/scripts/patch_disable_dual_stream.py"

      - name: Run bench WITHOUT dual-stream (chat c=64)
        run: ssh $NODE "docker exec $CONTAINER bash -c 'cd $REPO && bash scripts/sa_bench_sglang.sh --model $MODEL_FP4 --tp 4 --ep 4 --scenario chat --concurrency 64 --container-image ${{ env.IMAGE }} --result-dir ./$EXP_DIR'"

      - name: Restore deepseek_v2.py
        if: always()
        run: ssh $NODE "docker exec $CONTAINER python3 $REPO/scripts/patch_disable_dual_stream.py --restore"

      - name: Show results
        if: always()
        run: |
          echo "=== Experiment Results ==="
          ssh $NODE "ls -lh $REPO/$EXP_DIR/ 2>/dev/null || echo 'No results'"
          echo ""
          echo "=== Summary ==="
          ssh $NODE "cat $REPO/$EXP_DIR/summary.md 2>/dev/null || echo 'No summary'"
