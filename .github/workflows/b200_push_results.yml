name: B200 Push Results
on:
  workflow_dispatch: {}
jobs:
  push:
    runs-on: [self-hosted, b200]
    timeout-minutes: 10
    env:
      NODE: hungry-hippo-fin-03-2
      REPO: /home/ubuntu/zufa/ClaudeSkillsE2EPerf
    steps:
      - name: Show current state
        run: |
          ssh $NODE "cd $REPO && git log --oneline -5"
          ssh $NODE "cd $REPO && git status --short | head -30"

      - name: Fix git state and force sync
        run: |
          ssh $NODE "cd $REPO && git rebase --abort 2>/dev/null || true"
          ssh $NODE "cd $REPO && git merge --abort 2>/dev/null || true"
          ssh $NODE "cd $REPO && rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true"
          ssh $NODE "cd $REPO && git checkout main 2>/dev/null || git checkout -b main origin/main"
          ssh $NODE "cd $REPO && git fetch origin main && git reset --hard origin/main"

      - name: Re-add all result data and push
        run: |
          ssh $NODE "cd $REPO && git config user.email 'ci@github.com' && git config user.name 'B200 CI'"
          ssh $NODE "cd $REPO && for d in results/b200_dsr_fp4/*/; do for ext in json log md csv yml; do git add -f \$d*.\$ext 2>/dev/null; done; done"
          ssh $NODE "cd $REPO && git diff --cached --name-only | head -30"
          ssh $NODE "cd $REPO && if ! git diff --cached --quiet; then git commit -m 'data: B200 FP4 results' && git push origin main; else echo 'Nothing to commit'; fi"

      - name: Verify
        if: always()
        run: ssh $NODE "cd $REPO && git log --oneline -5 && git status --short | head -10"
