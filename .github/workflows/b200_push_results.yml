name: B200 Push Results
on:
  workflow_dispatch: {}
jobs:
  push:
    runs-on: [self-hosted, b200]
    timeout-minutes: 10
    env:
      NODE: hungry-hippo-fin-03-2
      REPO: /home/ubuntu/zufa/ClaudeSkillsE2EPerf
    steps:
      - name: Show current state
        run: |
          ssh $NODE "cd $REPO && git log --oneline -5"
          ssh $NODE "cd $REPO && git status --short | head -30"

      - name: Fix git state and force sync
        run: |
          ssh $NODE "cd $REPO && git rebase --abort 2>/dev/null; git merge --abort 2>/dev/null; rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null; git checkout main 2>/dev/null || git checkout -b main origin/main; git fetch origin main; git reset --hard origin/main; echo done"

      - name: Re-add all result data
        run: |
          ssh $NODE "cd $REPO && git config user.email ci@github.com && git config user.name 'B200 CI'"
          ssh $NODE "cd $REPO && find results/b200_dsr_fp4 -maxdepth 2 -type f \\( -name '*.json' -o -name '*.log' -o -name '*.md' -o -name '*.csv' -o -name '*.yml' -o -name '*.xlsx' \\) ! -name '*.json.gz' -exec git add -f {} +"
          ssh $NODE "cd $REPO && git diff --cached --stat"

      - name: Commit and push
        run: |
          ssh $NODE "cd $REPO && git diff --cached --quiet && echo 'Nothing to commit' && exit 0 || git commit -m 'data: B200 FP4 results' && git push origin main"

      - name: Verify
        if: always()
        run: ssh $NODE "cd $REPO && git log --oneline -5 && git status --short | head -10"
