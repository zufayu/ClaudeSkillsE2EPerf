name: B200 Repo Check
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: [self-hosted, b200]
    timeout-minutes: 5
    steps:
      - name: Repo state
        run: |
          echo "=== Finding repo ==="
          REPO=$(find /home -maxdepth 4 -name "ClaudeSkillsE2EPerf" -type d 2>/dev/null | head -1)
          if [ -z "$REPO" ]; then echo "Repo NOT FOUND anywhere under /home"; ls /home/ubuntu/zufa/ 2>/dev/null; exit 0; fi
          echo "Repo at: $REPO"
          cd $REPO
          git log --oneline -5
          git status --short
          echo ""
          echo "=== Results dirs ==="
          ls -d results/b200* 2>/dev/null || echo "No b200 results"
          echo ""
          echo "=== Results file counts ==="
          for d in results/b200*/; do
            [ -d "$d" ] || continue
            echo "$d: $(find "$d" -type f | wc -l) files"
            find "$d" -type f \( -name "*.json" -o -name "*.csv" -o -name "*.xlsx" -o -name "*.md" -o -name "*.nsys-rep" -o -name "*.ncu-rep" -o -name "*.json.gz" \) | sort
          done
          echo ""
          echo "=== Docker images available ==="
          docker images --format "{{.Repository}}:{{.Tag}}\t{{.Size}}" 2>/dev/null | head -20
          echo ""
          echo "=== Disk usage ==="
          du -sh results/b200*/ 2>/dev/null
