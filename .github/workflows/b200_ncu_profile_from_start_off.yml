name: "B200 NCU launch-and-attach Test"
on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Concurrency (decode batch size)"
        type: string
        default: "64"
      launch_count:
        description: "Kernel launches to capture"
        type: string
        default: "140"
      ncu_set:
        description: "NCU section set"
        type: choice
        options:
          - pmsampling
          - basic
          - detailed
        default: pmsampling

jobs:
  ncu-profiling:
    runs-on: [self-hosted, b200]
    timeout-minutes: 240
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_sglang
      REPO: /home/ubuntu/zufa/ClaudeSkillsE2EPerf
      MODEL: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      CONC: ${{ inputs.concurrency }}
      LAUNCH_COUNT: ${{ inputs.launch_count }}
      NCU_SET: ${{ inputs.ncu_set }}
      RESULT_DIR: results/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep8_tp8_sglang059_ncu
    steps:
      - name: Sync repo
        run: ssh $NODE "cd $REPO && git fetch origin && git reset --hard origin/main"

      - name: Verify environment
        run: |
          ssh $NODE "docker exec $CONTAINER nvidia-smi --query-gpu=name,memory.total --format=csv,noheader | head -2"
          ssh $NODE "docker exec $CONTAINER python3 -c 'import sglang; print(f\"SGLang {sglang.__version__}\")'"
          ssh $NODE "docker exec $CONTAINER ncu --version 2>/dev/null | head -1 || echo 'NCU not found in container'"

      - name: Clean old results and GPU processes
        continue-on-error: true
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'rm -rf $REPO/$RESULT_DIR/ncu_launch* 2>/dev/null; true'"
          ssh $NODE "docker exec $CONTAINER bash -c 'fuser -k -9 8888/tcp 2>/dev/null; true'"
          ssh $NODE "docker exec $CONTAINER bash -c 'for p in \$(nvidia-smi --query-compute-apps=pid --format=csv,noheader 2>/dev/null); do kill -9 \$p 2>/dev/null; done; true'"
          sleep 5

      - name: "Start SGLang server under NCU (launch-and-attach, profiling ON)"
        run: |
          ssh $NODE "docker exec -d $CONTAINER bash -c 'cd $REPO && mkdir -p $RESULT_DIR/ncu_launch && ncu --mode launch-and-attach --target-processes all --devices 0 --graph-profiling node --pm-sampling-interval 1000 -k \"regex:nvjet|fmha|cutlass|flash_attn|kernel_mha|deep_gemm\" --launch-count ${{ inputs.launch_count }} --section PmSampling --section PmSampling_WarpStates --section Nvlink --section Nvlink_Tables --section Nvlink_Topology -f -o $RESULT_DIR/ncu_launch/ncu_decode_c${{ inputs.concurrency }} python3 -m sglang.launch_server --model-path $MODEL --tp 8 --trust-remote-code --mem-fraction-static 0.85 --chunked-prefill-size 16384 --kv-cache-dtype fp8_e4m3 --cuda-graph-max-bs 256 --max-running-requests 256 --port 8888 --host 0.0.0.0 > $RESULT_DIR/ncu_launch/server.log 2>&1'"
          echo "Server launched under NCU (profiling active from start)"
          echo "NCU will profile the first 140 matching kernel launches on GPU 0"

      - name: Wait for server ready (may be slow under NCU)
        run: |
          echo "Waiting for SGLang server under NCU (expect 10-60 min due to kernel replay)..."
          WAIT=0
          TIMEOUT=7200
          while true; do
            if ssh $NODE "docker exec $CONTAINER curl -sf http://localhost:8888/health" > /dev/null 2>&1; then
              echo "Server ready after ${WAIT}s!"
              break
            fi
            ALIVE=$(ssh $NODE "docker exec $CONTAINER pgrep -f 'sglang.launch_server' 2>/dev/null | head -1" || true)
            if [ -z "$ALIVE" ]; then
              echo "Server process died. Server log:"
              ssh $NODE "docker exec $CONTAINER tail -50 $REPO/$RESULT_DIR/ncu_launch/server.log 2>/dev/null" || true
              echo ""
              echo "Checking if NCU already produced output (may have captured init kernels and exited):"
              ssh $NODE "docker exec $CONTAINER ls -lh $REPO/$RESULT_DIR/ncu_launch/*.ncu-rep 2>/dev/null || echo 'No .ncu-rep files'"
              exit 1
            fi
            sleep 30
            WAIT=$((WAIT + 30))
            if [ $WAIT -ge $TIMEOUT ]; then
              echo "Timeout after ${TIMEOUT}s. Server log:"
              ssh $NODE "docker exec $CONTAINER tail -50 $REPO/$RESULT_DIR/ncu_launch/server.log 2>/dev/null" || true
              exit 1
            fi
            [ $((WAIT % 120)) -eq 0 ] && echo "  Still waiting... ${WAIT}s ($(($WAIT/60))min)"
          done

      - name: "Benchmark (c=${{ inputs.concurrency }})"
        run: |
          NUM_PROMPTS=$((CONC * 10))
          echo "Sending $NUM_PROMPTS prompts at c=$CONC..."
          ssh $NODE "docker exec $CONTAINER python3 -m sglang.bench_serving --model $MODEL --port 8888 --backend vllm --dataset-name random --random-input-len 1024 --random-output-len 1024 --random-range-ratio 0.8 --num-prompts $NUM_PROMPTS --max-concurrency $CONC --warmup-requests 0 --output-file /tmp/ncu_profiled.jsonl" 2>&1 || echo "Benchmark complete"

      - name: Check results
        if: always()
        run: |
          echo "=== .ncu-rep files ==="
          ssh $NODE "docker exec $CONTAINER ls -lh $REPO/$RESULT_DIR/ncu_launch/*.ncu-rep 2>/dev/null || echo 'No .ncu-rep files'"
          echo ""
          echo "=== Server log (last 30 lines) ==="
          ssh $NODE "docker exec $CONTAINER tail -30 $REPO/$RESULT_DIR/ncu_launch/server.log 2>/dev/null || echo 'No server log'"
          echo ""
          echo "=== NCU process ==="
          ssh $NODE "docker exec $CONTAINER pgrep -af ncu 2>/dev/null || echo 'NCU finished'"

      - name: Cleanup
        if: always()
        continue-on-error: true
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'for p in \$(nvidia-smi --query-compute-apps=pid --format=csv,noheader 2>/dev/null); do kill -9 \$p 2>/dev/null; done; true'"
          sleep 3

      - name: Commit results
        if: always()
        run: |
          ssh $NODE "cd $REPO && git config user.email 'ci@github.com' && git config user.name 'B200 CI'"
          ssh $NODE "cd $REPO && git add -f $RESULT_DIR/ncu_launch/*.log $RESULT_DIR/ncu_launch/*.ncu-rep $RESULT_DIR/ncu_launch/*.csv 2>/dev/null; true"
          ssh $NODE "cd $REPO && if ! git diff --cached --quiet; then git commit -m 'data: B200 NCU launch-and-attach (chat c=${{ inputs.concurrency }})' && git pull --rebase origin main && git push; else echo 'Nothing to commit'; fi"
