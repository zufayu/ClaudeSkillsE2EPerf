name: "B200 NCU Narrow Filter"
on:
  workflow_dispatch:
    inputs:
      kernel_filter:
        description: "Kernel name filter (exact or regex)"
        type: string
        default: "fmhaSm100f"
      launch_skip:
        description: "Kernel launches to skip (past init + warmup)"
        type: string
        default: "1500"
      launch_count:
        description: "Kernel launches to capture"
        type: string
        default: "10"
      ncu_set:
        description: "NCU section set"
        type: choice
        options:
          - full
          - pmsampling
          - basic
          - detailed
        default: full
      concurrency:
        description: "Warmup/benchmark concurrency"
        type: string
        default: "64"

jobs:
  ncu-narrow:
    runs-on: [self-hosted, b200]
    timeout-minutes: 120
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_sglang
      REPO: /home/ubuntu/zufa/ClaudeSkillsE2EPerf
      MODEL: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      RESULT_DIR: results/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep8_tp8_sglang059_ncu
    steps:
      - name: Sync repo
        run: ssh $NODE "cd $REPO && git fetch origin && git reset --hard origin/main"

      - name: Clean GPU processes
        continue-on-error: true
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'for p in \$(nvidia-smi --query-compute-apps=pid --format=csv,noheader 2>/dev/null); do kill -9 \$p 2>/dev/null; done; true'"
          ssh $NODE "docker exec $CONTAINER bash -c 'fuser -k -9 8888/tcp 2>/dev/null; true'"
          sleep 5

      - name: "Launch server under NCU (filter: ${{ inputs.kernel_filter }})"
        run: |
          ssh $NODE "docker exec -d $CONTAINER bash -c 'cd $REPO && mkdir -p $RESULT_DIR/ncu_narrow && ncu --mode launch-and-attach --target-processes all --devices 0 --graph-profiling node -k \"${{ inputs.kernel_filter }}\" --launch-skip ${{ inputs.launch_skip }} --launch-count ${{ inputs.launch_count }} --set ${{ inputs.ncu_set }} -f -o $RESULT_DIR/ncu_narrow/ncu_${{ inputs.kernel_filter }}_c${{ inputs.concurrency }} python3 -m sglang.launch_server --model-path $MODEL --tp 8 --trust-remote-code --mem-fraction-static 0.85 --chunked-prefill-size 16384 --kv-cache-dtype fp8_e4m3 --cuda-graph-max-bs 256 --max-running-requests 256 --port 8888 --host 0.0.0.0 > $RESULT_DIR/ncu_narrow/server.log 2>&1'"
          echo "Server launched. Filter=${{ inputs.kernel_filter }}, skip=${{ inputs.launch_skip }}, count=${{ inputs.launch_count }}"
          echo "Init kernels won't match filter → zero NCU replay overhead → normal startup"

      - name: Wait for server ready
        run: |
          echo "Waiting for server (expect ~8-10 min, no NCU overhead during init)..."
          WAIT=0
          while true; do
            if ssh $NODE "docker exec $CONTAINER curl -sf http://localhost:8888/health" > /dev/null 2>&1; then
              echo "Server ready after ${WAIT}s!"
              break
            fi
            ALIVE=$(ssh $NODE "docker exec $CONTAINER pgrep -f 'sglang.launch_server' 2>/dev/null | head -1" || true)
            if [ -z "$ALIVE" ]; then
              echo "Server died!"
              ssh $NODE "docker exec $CONTAINER tail -30 $REPO/$RESULT_DIR/ncu_narrow/server.log 2>/dev/null" || true
              exit 1
            fi
            sleep 15
            WAIT=$((WAIT + 15))
            [ $WAIT -ge 1800 ] && echo "Timeout" && exit 1
            [ $((WAIT % 60)) -eq 0 ] && echo "  ${WAIT}s..."
          done

      - name: "Warmup (c=${{ inputs.concurrency }})"
        run: |
          WARMUP=$((${{ inputs.concurrency }} * 2))
          echo "Warmup: $WARMUP prompts at c=${{ inputs.concurrency }}"
          ssh $NODE "docker exec $CONTAINER python3 -m sglang.bench_serving --model $MODEL --port 8888 --backend vllm --dataset-name random --random-input-len 1024 --random-output-len 1024 --random-range-ratio 0.8 --num-prompts $WARMUP --max-concurrency ${{ inputs.concurrency }} --warmup-requests 0 --output-file /tmp/ncu_warmup.jsonl" 2>&1 || echo "Warmup done"

      - name: "Benchmark (NCU capturing after skip=${{ inputs.launch_skip }})"
        run: |
          NUM=$((${{ inputs.concurrency }} * 10))
          echo "Benchmark: $NUM prompts at c=${{ inputs.concurrency }}"
          echo "NCU should start capturing ${{ inputs.kernel_filter }} kernels during this phase"
          ssh $NODE "docker exec $CONTAINER python3 -m sglang.bench_serving --model $MODEL --port 8888 --backend vllm --dataset-name random --random-input-len 1024 --random-output-len 1024 --random-range-ratio 0.8 --num-prompts $NUM --max-concurrency ${{ inputs.concurrency }} --warmup-requests 0 --output-file /tmp/ncu_bench.jsonl" 2>&1 || echo "Benchmark done"

      - name: Wait for NCU to finish
        run: |
          echo "Waiting for NCU to complete kernel replay..."
          for i in $(seq 1 60); do
            NCU_ALIVE=$(ssh $NODE "docker exec $CONTAINER pgrep -f 'ncu' 2>/dev/null | head -1" || true)
            if [ -z "$NCU_ALIVE" ]; then
              echo "NCU finished after ${i}0s"
              break
            fi
            sleep 10
          done

      - name: Check results
        if: always()
        run: |
          echo "=== .ncu-rep files ==="
          ssh $NODE "docker exec $CONTAINER ls -lh $REPO/$RESULT_DIR/ncu_narrow/*.ncu-rep 2>/dev/null || echo 'No .ncu-rep'"
          echo ""
          echo "=== Server log (last 20 lines) ==="
          ssh $NODE "docker exec $CONTAINER tail -20 $REPO/$RESULT_DIR/ncu_narrow/server.log 2>/dev/null || echo 'No log'"

      - name: Cleanup
        if: always()
        continue-on-error: true
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'for p in \$(nvidia-smi --query-compute-apps=pid --format=csv,noheader 2>/dev/null); do kill -9 \$p 2>/dev/null; done; true'"

      - name: Commit results
        if: always()
        run: |
          ssh $NODE "cd $REPO && git config user.email 'ci@github.com' && git config user.name 'B200 CI'"
          ssh $NODE "cd $REPO && git add -f $RESULT_DIR/ncu_narrow/*.ncu-rep $RESULT_DIR/ncu_narrow/*.log 2>/dev/null; true"
          ssh $NODE "cd $REPO && if ! git diff --cached --quiet; then git commit -m 'data: B200 NCU narrow filter (${{ inputs.kernel_filter }}, skip=${{ inputs.launch_skip }}, count=${{ inputs.launch_count }})' && git pull --rebase origin main && git push; else echo 'Nothing to commit'; fi"
