name: B200 FP4 EP1 TP4 Bench (TRT)
on:
  workflow_dispatch:
    inputs:
      container:
        description: 'TRT-LLM container'
        type: choice
        options:
          - zufa_trt
          - zufa_trt2
          - zufa_trt3
        default: zufa_trt3

jobs:
  fp4-ep1-tp4-bench:
    runs-on: [self-hosted, b200]
    timeout-minutes: 120
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: ${{ inputs.container }}
      SFS: /SFS-aGqda6ct
      REPO: /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf
      MODEL_FP4: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      RESULT_DIR: results/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep1_tp4_post2
    steps:
      - name: Sync repo
        run: ssh $NODE "cd $REPO && git rebase --abort 2>/dev/null; rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null; git reset --hard 2>/dev/null; git checkout -B main origin/main --force 2>/dev/null; git pull --rebase origin main 2>/dev/null; true"

      - name: Detect TRT-LLM version
        run: |
          IMAGE=$(ssh $NODE "docker inspect $CONTAINER --format '{{.Config.Image}}'" 2>/dev/null || echo unknown)
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          VERSION=$(ssh $NODE "docker exec $CONTAINER bash -c 'pip show tensorrt-llm 2>/dev/null | grep ^Version | cut -d\" \" -f2'")
          echo "TRTLLM_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Container=$CONTAINER Version=$VERSION"

      - name: Verify container and GPU
        run: |
          ssh $NODE "docker exec $CONTAINER nvidia-smi --query-gpu=name,memory.total --format=csv,noheader | head -4"
          ssh $NODE "docker exec $CONTAINER ls $MODEL_FP4/ | head -5"

      - name: Run FP4 throughput benchmark (chat c=64 EP=1 TP=4)
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'cd $REPO && bash scripts/sa_bench_b200.sh --model-fp4 $MODEL_FP4 --configs fp4-throughput --scenario chat --concurrency 64 --tp 4 --ep-sizes 1 --gpus 0,1,2,3 --dp false --container-image ${{ env.IMAGE }} --result-dir ./$RESULT_DIR'"

      - name: Show results
        if: always()
        run: |
          ssh $NODE "cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo 'No summary'"
          for f in $(ssh $NODE "ls $REPO/$RESULT_DIR/result_*.json 2>/dev/null"); do
            echo "=== $(basename $f) ==="
            ssh $NODE "python3 -c \"import json; d=json.load(open('$f')); print(f'Total Tput: {d.get(\\\"total_token_throughput\\\", d.get(\\\"total_throughput\\\",0)):.1f}, Output Tput: {d.get(\\\"output_throughput\\\",0):.1f}, TPOT p50: {d.get(\\\"tpot_p50\\\", d.get(\\\"median_tpot_ms\\\",0)):.1f}ms, TTFT p50: {d.get(\\\"ttft_p50\\\", d.get(\\\"median_ttft_ms\\\",0)):.1f}ms')\"" 2>/dev/null || echo "parse failed"
          done
