name: "MI355X ATOM Bench"
on:
  workflow_dispatch:
    inputs:
      container:
        description: "ATOM container (zufa_atom=ROCm7.1.1, zufa_atom2=ROCm7.2.1)"
        type: choice
        options: [zufa_atom, zufa_atom2]
        default: zufa_atom2
      configs:
        type: choice
        options: [mxfp4-throughput, mxfp4-latency]
        default: mxfp4-throughput
      ep:
        description: "Expert parallel (1 = off, >1 = on)"
        type: string
        default: "8"
      tp:
        type: string
        default: "8"
      scenario:
        type: choice
        options: [chat, reasoning, summarize]
        default: chat
      concurrency:
        type: string
        default: "64"
      commit_results:
        description: "Commit results to main (false = upload artifact only, no main pollution)"
        type: boolean
        default: false

jobs:
  bench:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          source scripts/ci_lib.sh && ci_load_platform mi355x
          export CONTAINER="${{ inputs.container }}"
          ci_parse_configs "${{ inputs.configs }}"
          MODEL="$MODEL_MXFP4"
          ci_get_image
          ENV_TAG=$(ci_detect_env_tag atom)
          RESULT_DIR=$(ci_result_dir "$PLATFORM" "$QUANT" "$MTP" "${{ inputs.ep }}" "${{ inputs.tp }}" "$ENV_TAG")
          for var in CONTAINER MODEL QUANT MTP MODE IMAGE ENV_TAG RESULT_DIR REPO EXEC_MODE CI_USER_NAME CI_USER_EMAIL; do
            echo "$var=${!var}" >> $GITHUB_ENV
          done
          echo "CONTAINER=$CONTAINER ENV_TAG=$ENV_TAG"
          echo "${{ inputs.configs }} â†’ QUANT=$QUANT MTP=$MTP"
          echo "EP=${{ inputs.ep }} TP=${{ inputs.tp }} ${{ inputs.scenario }} c=${{ inputs.concurrency }}"
          echo "RESULT_DIR=$RESULT_DIR"

      - name: Kill residual GPU processes
        continue-on-error: true
        run: source scripts/ci_lib.sh && ci_load_platform mi355x && ci_kill_gpu_procs

      - name: Sync repo
        run: source scripts/ci_lib.sh && ci_load_platform mi355x && ci_sync

      - name: Run benchmark
        run: |
          source scripts/ci_lib.sh && ci_load_platform mi355x
          # sa_bench_mi355x.sh: --model-mxfp4, --configs, --ep is a flag (no value)
          ARGS="--model-${QUANT} $MODEL --configs ${{ inputs.configs }} --scenario ${{ inputs.scenario }} --concurrency ${{ inputs.concurrency }} --tp ${{ inputs.tp }} --container-image $IMAGE --result-dir ./$RESULT_DIR"
          [[ "${{ inputs.ep }}" -gt 1 ]] && ARGS="$ARGS --ep"
          ci_exec "cd $REPO && bash scripts/sa_bench_mi355x.sh $ARGS"

      - name: Show results
        if: always()
        run: cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo "No summary"

      - name: Fix file ownership (always) â€” prevents next checkout's clean from failing
        if: always()
        run: |
          source scripts/ci_lib.sh && ci_load_platform mi355x
          ci_fix_ownership "$RESULT_DIR" || true

      - name: Upload results artifact (always, for review before commit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mi355x-atom-${{ inputs.configs }}-tp${{ inputs.tp }}-ep${{ inputs.ep }}-${{ inputs.scenario }}-c${{ inputs.concurrency }}-${{ github.run_id }}
          path: |
            ${{ env.REPO }}/${{ env.RESULT_DIR }}
          if-no-files-found: warn
          retention-days: 30

      - name: Commit results
        if: always() && inputs.commit_results
        run: |
          source scripts/ci_lib.sh && ci_load_platform mi355x
          ci_commit_results "$RESULT_DIR" \
            "data: MI355X ATOM ${{ inputs.configs }} EP=${{ inputs.ep }} TP=${{ inputs.tp }} bench (${{ inputs.scenario }} c=${{ inputs.concurrency }}, $ENV_TAG)"

      - name: Show final state
        if: always()
        run: cd $REPO && git log --oneline -3
