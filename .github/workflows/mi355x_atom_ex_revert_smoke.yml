name: "MI355X zufa_atom_ex revert ATOM to f4478c5 + smoke test"
on:
  workflow_dispatch:
jobs:
  revert:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 15
    env:
      C: zufa_atom_ex
      TARGET: f4478c5e8faa9590c1e58747408b176b9d85dadd
    steps:
      - name: Revert ATOM to f4478c5 (compatible with installed aiter)
        shell: bash {0}
        run: |
          echo "=== Current commit ==="
          podman exec $C bash -c 'cd /app/ATOM && git rev-parse HEAD'
          echo "=== Reverting to $TARGET ==="
          podman exec $C bash -c "cd /app/ATOM && git fetch --all && git checkout $TARGET" 2>&1 | tail -5
          echo "=== After ==="
          podman exec $C bash -c 'cd /app/ATOM && git rev-parse HEAD && git log -1 --pretty=oneline'

      - name: Smoke test - GPU + ATOM import
        shell: bash {0}
        run: |
          echo "=== rocm-smi ==="
          podman exec $C rocm-smi 2>&1 | head -5
          echo
          echo "=== torch GPU ==="
          podman exec $C python3 -c "
          import torch
          print('cuda available:', torch.cuda.is_available())
          print('device count:', torch.cuda.device_count())
          if torch.cuda.is_available():
              x = torch.zeros(1024, device='cuda:0')
              print('alloc on cuda:0 OK, sum:', x.sum().item())
          " 2>&1
          echo
          echo "=== ATOM import ==="
          podman exec $C python3 -c "
          import atom
          import atom.entrypoints.openai_server as srv
          print('ATOM import OK')
          " 2>&1

      - name: moe.py:1878 patch site
        shell: bash {0}
        run: |
          echo "=== grep mutates_args=['hidden_states'] ==="
          podman exec $C grep -n 'mutates_args.*hidden_states' /app/ATOM/atom/model_ops/moe.py
          echo "=== grep needs_fixed_stride_order ==="
          podman exec $C grep -n 'needs_fixed_stride_order' /app/ATOM/atom/model_ops/moe.py
          echo "=== context lines 1860-1900 ==="
          podman exec $C sed -n '1860,1900p' /app/ATOM/atom/model_ops/moe.py
