name: B200 FP4 c4 Profiling
on:
  workflow_dispatch: {}
jobs:
  fp4-c4-profiling:
    runs-on: [self-hosted, b200]
    timeout-minutes: 120
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_trt
      CONTAINER_IMAGE: "nvcr.io/nvidia/tensorrt-llm/release:1.2.0rc6.post2"
      REPO: /home/ubuntu/zufa/ClaudeSkillsE2EPerf
      MODEL_FP4: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      SFS: /SFS-aGqda6ct
    steps:
      - name: Sync repo
        run: ssh $NODE "cd $REPO && git stash 2>/dev/null || true && git fetch origin main && git rebase origin/main && git stash pop 2>/dev/null || true"

      - name: Ensure post2 container exists
        run: |
          if ssh $NODE "docker inspect $CONTAINER" &>/dev/null; then
            echo "Container $CONTAINER already exists"
            ssh $NODE "docker start $CONTAINER 2>/dev/null || true"
          else
            echo "Creating $CONTAINER from $CONTAINER_IMAGE"
            ssh $NODE "docker run -d --name $CONTAINER --gpus all --ipc host --ulimit memlock=-1 --ulimit stack=67108864 -v $SFS:$SFS -v /home/ubuntu/zufa:/home/ubuntu/zufa $CONTAINER_IMAGE sleep infinity"
          fi
          ssh $NODE "docker exec $CONTAINER nvidia-smi --query-gpu=name --format=csv,noheader | head -1"

      - name: Detect TRT-LLM version
        run: |
          IMAGE=$(ssh $NODE "docker inspect $CONTAINER --format '{{.Config.Image}}'" 2>/dev/null || echo unknown)
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          VERSION=$(ssh $NODE "docker exec $CONTAINER bash -c 'pip show tensorrt-llm 2>/dev/null | grep ^Version | cut -d\" \" -f2'")
          if [ -z "$VERSION" ]; then VERSION=$(echo "$IMAGE" | grep -oP 'release:\K[0-9a-z.]+' || echo unknown); fi
          echo "TRTLLM_VERSION=$VERSION" >> $GITHUB_ENV
          case "$VERSION" in
            *post2*) ENV_TAG=post2 ;; *post3*) ENV_TAG=post3 ;; *rc10*) ENV_TAG=rc10 ;; *) ENV_TAG=$(echo "$VERSION" | sed 's/[^a-zA-Z0-9]/_/g') ;;
          esac
          echo "ENV_TAG=$ENV_TAG" >> $GITHUB_ENV
          RESULT_DIR="results/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep8_tp8_${ENV_TAG}_profiling"
          echo "RESULT_DIR=$RESULT_DIR" >> $GITHUB_ENV
          echo "Container=$CONTAINER Version=$VERSION EnvTag=$ENV_TAG ResultDir=$RESULT_DIR"

      - name: Verify GPU
        run: ssh $NODE "docker exec $CONTAINER nvidia-smi --query-gpu=name,memory.total --format=csv,noheader | head -8"

      - name: Collect nsys trace (chat c=4 EP=8 TP=8, bench mode)
        run: ssh $NODE "docker exec $CONTAINER bash -c 'cd $REPO && bash scripts/collect_nsys_trace.sh --model $MODEL_FP4 --mode bench --scenario chat --concurrency 4 --tp 8 --ep 8 --quant fp4 --config throughput --env ${{ env.ENV_TAG }} --trace-dir ./${{ env.RESULT_DIR }}'"

      - name: Show trace files
        if: always()
        run: |
          echo "=== Trace files ==="
          ssh $NODE "ls -lh $REPO/${{ env.RESULT_DIR }}/*.json.gz $REPO/${{ env.RESULT_DIR }}/*.nsys-rep 2>/dev/null || echo 'No traces'"
          echo "=== Result JSONs ==="
          ssh $NODE "ls -lh $REPO/${{ env.RESULT_DIR }}/result_*.json 2>/dev/null || echo 'No results'"

      - name: Run trace analysis
        if: always()
        run: |
          TRACE=$(ssh $NODE "ls -t $REPO/${{ env.RESULT_DIR }}/*.json.gz 2>/dev/null | grep -v capture | head -1")
          if [ -n "$TRACE" ]; then
            echo "Analyzing: $TRACE"
            ssh $NODE "docker exec $CONTAINER bash -c 'cd $REPO/${{ env.RESULT_DIR }} && python3 $REPO/scripts/trace_layer_detail.py $TRACE --layer 3'" 2>&1 | tail -50
          else
            echo "No trace to analyze"
          fi

        if: always() && (inputs.commit_results == true || inputs.commit_results == 'true')
      - name: Git commit and push
        run: |
          ssh $NODE "cd $REPO && git config user.email ci@github.com && git config user.name 'B200 CI'"
          ssh $NODE "cd $REPO && git rebase --abort 2>/dev/null; rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null; git checkout main 2>/dev/null; git fetch origin main && git reset --hard origin/main; true"
          ssh $NODE "cd $REPO && for ext in json log md csv xlsx yml jsonl; do git add -f ${{ env.RESULT_DIR }}/*.\$ext 2>/dev/null || true; done && git diff --cached --name-only"
          ssh $NODE "cd $REPO && if ! git diff --cached --quiet; then git commit -m 'data: B200 FP4 EP=8 TP=8 c=4 nsys profiling (chat, ${{ env.ENV_TAG }})' && git push origin main; else echo 'Nothing to commit'; fi"
