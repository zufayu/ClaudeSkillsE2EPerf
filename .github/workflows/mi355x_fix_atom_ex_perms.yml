name: "MI355X Fix zufa_atom_ex model path permissions"
on:
  workflow_dispatch:
    inputs:
      strategy:
        description: "Fix strategy to apply"
        required: true
        default: "diagnose_only"
        type: choice
        options:
          - diagnose_only
          - recreate_userns_keepid
          - recreate_match_uid
          - recreate_clone_zufa_atom_config
          - recreate_rootful_sudo
          - check_zufa_atom_ownership
          - deep_uid_map_diff
jobs:
  fix:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 30
    env:
      WORKING: zufa_atom
      BROKEN: zufa_atom_ex
      MODEL_PROBE: /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4-MTP-MoEFP4/config.json
    steps:
      - name: Diagnose - inspect both containers
        run: |
          echo "=== HOST: who am I? ==="
          id
          echo "=== HOST: model file stat ==="
          ls -ln /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4-MTP-MoEFP4/config.json 2>&1 || echo "host cannot see either"
          stat -c '%U:%G %a %n' /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4-MTP-MoEFP4/config.json 2>&1 || true
          echo
          echo "=== zufa_atom (WORKING) container info ==="
          podman inspect $WORKING --format '{{.Config.User}} | UserNS: {{.HostConfig.UsernsMode}} | SecurityOpt: {{.HostConfig.SecurityOpt}} | Privileged: {{.HostConfig.Privileged}}' 2>&1 || echo "inspect failed"
          echo "Mounts:"
          podman inspect $WORKING --format '{{range .Mounts}}  {{.Source}} -> {{.Destination}} (mode={{.Mode}}, options={{.Options}}){{println}}{{end}}' 2>&1 | head -20
          echo "Inside zufa_atom: who am I?"
          podman exec $WORKING id 2>&1 || true
          echo "Inside zufa_atom: can read model?"
          podman exec $WORKING ls -ln $MODEL_PROBE 2>&1 || true
          echo
          echo "=== zufa_atom_ex (BROKEN) container info ==="
          if podman inspect $BROKEN --format '{{.Id}}' >/dev/null 2>&1; then
            podman inspect $BROKEN --format '{{.Config.User}} | UserNS: {{.HostConfig.UsernsMode}} | SecurityOpt: {{.HostConfig.SecurityOpt}} | Privileged: {{.HostConfig.Privileged}}' 2>&1
            echo "Mounts:"
            podman inspect $BROKEN --format '{{range .Mounts}}  {{.Source}} -> {{.Destination}} (mode={{.Mode}}, options={{.Options}}){{println}}{{end}}' 2>&1 | head -20
            echo "Inside zufa_atom_ex: who am I?"
            podman exec $BROKEN id 2>&1 || true
            echo "Inside zufa_atom_ex: model access?"
            podman exec $BROKEN ls -ln $MODEL_PROBE 2>&1 || true
            podman exec $BROKEN cat $MODEL_PROBE 2>&1 | head -3 || true
          else
            echo "$BROKEN does not exist (will be created by fix strategy)"
          fi

      - name: Apply fix - recreate_userns_keepid
        if: inputs.strategy == 'recreate_userns_keepid'
        run: |
          IMAGE=$(podman inspect $WORKING --format '{{.ImageName}}' 2>/dev/null || echo "docker.io/rocm/atom-dev:latest")
          echo "Using image: $IMAGE"
          podman rm -f $BROKEN 2>&1 || true
          podman run -d --name $BROKEN --userns=keep-id --ipc=host --network=host \
            --device=/dev/kfd --device=/dev/dri --group-add video --group-add render \
            -v /shared:/shared \
            $IMAGE sleep infinity
          sleep 3
          echo "--- Test ---"
          podman exec $BROKEN id
          podman exec $BROKEN ls -ln $MODEL_PROBE && echo "SUCCESS: model accessible" || echo "STILL BROKEN"

      - name: Apply fix - recreate_match_uid
        if: inputs.strategy == 'recreate_match_uid'
        run: |
          HOST_UID=$(id -u)
          HOST_GID=$(id -g)
          IMAGE=$(podman inspect $WORKING --format '{{.ImageName}}' 2>/dev/null || echo "docker.io/rocm/atom-dev:latest")
          echo "Recreating $BROKEN as UID:GID=$HOST_UID:$HOST_GID"
          podman rm -f $BROKEN 2>&1 || true
          podman run -d --name $BROKEN --user $HOST_UID:$HOST_GID --ipc=host --network=host \
            --device=/dev/kfd --device=/dev/dri --group-add video --group-add render \
            -v /shared:/shared \
            $IMAGE sleep infinity
          sleep 3
          podman exec $BROKEN id
          podman exec $BROKEN ls -ln $MODEL_PROBE && echo "SUCCESS" || echo "STILL BROKEN"

      - name: Apply fix - clone zufa_atom config exactly
        if: inputs.strategy == 'recreate_clone_zufa_atom_config'
        run: |
          IMAGE=$(podman inspect $WORKING --format '{{.ImageName}}')
          USER_SPEC=$(podman inspect $WORKING --format '{{.Config.User}}')
          USERNS=$(podman inspect $WORKING --format '{{.HostConfig.UsernsMode}}')
          PRIV=$(podman inspect $WORKING --format '{{.HostConfig.Privileged}}')
          IPC=$(podman inspect $WORKING --format '{{.HostConfig.IpcMode}}')
          NET=$(podman inspect $WORKING --format '{{.HostConfig.NetworkMode}}')
          PID=$(podman inspect $WORKING --format '{{.HostConfig.PidMode}}')
          echo "Cloning: image=$IMAGE user=$USER_SPEC userns=$USERNS priv=$PRIV ipc=$IPC net=$NET pid=$PID"

          MOUNT_ARGS=$(podman inspect $WORKING --format '{{range .Mounts}}-v {{.Source}}:{{.Destination}} {{end}}')
          echo "Mounts: $MOUNT_ARGS"

          SECOPT_ARGS=$(podman inspect $WORKING --format '{{range .HostConfig.SecurityOpt}}--security-opt {{.}} {{end}}')
          echo "SecurityOpt: $SECOPT_ARGS"

          DEVICE_ARGS=$(podman inspect $WORKING --format '{{range .HostConfig.Devices}}--device {{.PathOnHost}}:{{.PathInContainer}} {{end}}')
          echo "Devices: $DEVICE_ARGS"

          GRPADD_ARGS=$(podman inspect $WORKING --format '{{range .HostConfig.GroupAdd}}--group-add {{.}} {{end}}')
          echo "GroupAdd: $GRPADD_ARGS"

          podman rm -f $BROKEN 2>&1 || true
          USER_FLAG=""; [ -n "$USER_SPEC" ] && USER_FLAG="--user $USER_SPEC"
          USERNS_FLAG=""; [ "$USERNS" != "" ] && [ "$USERNS" != "host" ] && USERNS_FLAG="--userns=$USERNS"
          PRIV_FLAG=""; [ "$PRIV" = "true" ] && PRIV_FLAG="--privileged"
          IPC_FLAG=""; [ -n "$IPC" ] && [ "$IPC" != "default" ] && IPC_FLAG="--ipc=$IPC"
          NET_FLAG=""; [ -n "$NET" ] && [ "$NET" != "default" ] && NET_FLAG="--network=$NET"
          PID_FLAG=""; [ -n "$PID" ] && [ "$PID" != "default" ] && PID_FLAG="--pid=$PID"

          # Pure clone: NO extras added beyond what working container has
          podman run -d --name $BROKEN $USER_FLAG $USERNS_FLAG $PRIV_FLAG $SECOPT_ARGS \
            $IPC_FLAG $NET_FLAG $PID_FLAG $DEVICE_ARGS $GRPADD_ARGS \
            $MOUNT_ARGS \
            $IMAGE sleep infinity
          sleep 3
          echo "--- Test ---"
          podman exec $BROKEN id
          podman exec $BROKEN ls -ln $MODEL_PROBE && echo "SUCCESS: model accessible" || echo "STILL BROKEN"

      - name: Check who owns zufa_atom (rootful vs rootless)
        if: inputs.strategy == 'check_zufa_atom_ownership'
        run: |
          echo "=== Runner user ==="
          id
          echo
          echo "=== Rootless podman (as $USER): list containers ==="
          podman ps -a 2>&1 | head -10
          echo
          echo "=== Rootful podman (sudo): list containers ==="
          sudo -n podman ps -a 2>&1 | head -10 || echo "sudo unavailable"
          echo
          echo "=== Where does zufa_atom live? ==="
          if podman ps -a --format '{{.Names}}' 2>/dev/null | grep -qx zufa_atom; then
            echo "zufa_atom found in ROOTLESS storage"
            podman inspect zufa_atom --format 'Storage: {{.GraphDriver.Name}} | Root: {{.GraphDriver.Data.WorkDir}}'
          fi
          if sudo -n podman ps -a --format '{{.Names}}' 2>/dev/null | grep -qx zufa_atom; then
            echo "zufa_atom found in ROOTFUL storage"
            sudo -n podman inspect zufa_atom --format 'Storage: {{.GraphDriver.Name}} | Root: {{.GraphDriver.Data.WorkDir}}'
          fi
          echo
          echo "=== Try reading model as host user (no container) ==="
          ls -ln $MODEL_PROBE 2>&1 || echo "host user cannot read"
          cat $MODEL_PROBE 2>&1 | head -3 || echo "host user cannot cat"
          echo
          echo "=== Try reading model as sudo (no container) ==="
          sudo -n cat $MODEL_PROBE 2>&1 | head -3 || echo "sudo cannot cat"

      - name: Deep UID/GID map comparison
        if: inputs.strategy == 'deep_uid_map_diff'
        run: |
          for C in $WORKING $BROKEN; do
            echo "===== $C ====="
            echo "--- HostConfig.IDMappings ---"
            podman inspect $C --format '{{json .HostConfig.IDMappings}}' 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "no IDMappings"
            echo "--- Top-level UidMap/GidMap ---"
            podman inspect $C --format 'UidMap: {{.HostConfig.UIDMap}}{{println}}GidMap: {{.HostConfig.GIDMap}}' 2>/dev/null
            echo "--- Annotations (may show original cmdline) ---"
            podman inspect $C --format '{{json .Config.Annotations}}' 2>/dev/null | python3 -m json.tool 2>/dev/null | head -30
            echo "--- /proc/<pid>/uid_map of container init process ---"
            PID=$(podman inspect $C --format '{{.State.Pid}}' 2>/dev/null)
            echo "Init PID on host: $PID"
            if [ -n "$PID" ] && [ "$PID" != "0" ]; then
              echo "uid_map:"
              cat /proc/$PID/uid_map 2>&1 || echo "cannot read"
              echo "gid_map:"
              cat /proc/$PID/gid_map 2>&1 || echo "cannot read"
              echo "groups (Status):"
              grep -E '^(Uid|Gid|Groups):' /proc/$PID/status 2>&1
            fi
            echo "--- Test: from inside container, what does /shared owner look like? ---"
            podman exec $C stat -c 'uid=%u gid=%g %n' $MODEL_PROBE 2>&1 || true
            podman exec $C stat -c 'host-uid=%U host-gid=%G' $MODEL_PROBE 2>&1 || true
            echo
          done

          echo "===== rootless config files ====="
          echo "--- /etc/subuid (host) ---"
          grep zufa /etc/subuid 2>&1 | head -5
          echo "--- /etc/subgid (host) ---"
          grep zufa /etc/subgid 2>&1 | head -5
          echo
          echo "===== Try minimal podman run with explicit no-userns ====="
          podman rm -f test_no_userns 2>&1 || true
          podman run --rm --userns=host --name test_no_userns docker.io/rocm/atom-dev:latest \
            bash -c 'echo IN; id; ls -ln '$MODEL_PROBE' 2>&1' \
            -v /shared:/shared 2>&1 | tail -10 || true
          # try with mount FIRST then arg
          podman run --rm --userns=host -v /shared:/shared --name test_no_userns docker.io/rocm/atom-dev:latest \
            bash -c 'id; ls -ln '$MODEL_PROBE 2>&1 | tail -10 || true

      - name: Apply fix - rootful podman via sudo
        if: inputs.strategy == 'recreate_rootful_sudo'
        run: |
          IMAGE=$(podman inspect $WORKING --format '{{.ImageName}}' 2>/dev/null) \
            || IMAGE=$(sudo -n podman inspect $WORKING --format '{{.ImageName}}' 2>/dev/null) \
            || IMAGE="docker.io/rocm/atom-dev:latest"
          echo "Using image: $IMAGE"
          echo "=== Remove rootless and rootful copies ==="
          podman rm -f $BROKEN 2>&1 || true
          sudo -n podman rm -f $BROKEN 2>&1 || true
          echo "=== Create with sudo (rootful) ==="
          sudo -n podman run -d --name $BROKEN \
            --security-opt seccomp=unconfined \
            --ipc=host --network=host \
            -v /shared:/shared \
            $IMAGE sleep infinity
          sleep 3
          echo "--- Test ---"
          sudo -n podman exec $BROKEN id
          sudo -n podman exec $BROKEN ls -ln $MODEL_PROBE && echo "SUCCESS: model accessible (rootful)" || echo "STILL BROKEN"

      - name: Final verification
        if: inputs.strategy != 'diagnose_only' && inputs.strategy != 'check_zufa_atom_ownership' && inputs.strategy != 'deep_uid_map_diff'
        run: |
          # Use sudo prefix for rootful strategy
          PFX=""; [ "${{ inputs.strategy }}" = "recreate_rootful_sudo" ] && PFX="sudo -n"
          echo "=== Final state ==="
          $PFX podman exec $BROKEN id
          echo
          echo "Model config readable?"
          $PFX podman exec $BROKEN python3 -c "import json; print(list(json.load(open('$MODEL_PROBE')).keys())[:5])" 2>&1 || echo "FAIL"
          echo
          echo "GPU visible?"
          $PFX podman exec $BROKEN rocm-smi --showid 2>&1 | head -10 || echo "GPU not visible"
          echo
          echo "ATOM source present?"
          $PFX podman exec $BROKEN ls -d /app/ATOM 2>&1 || echo "/app/ATOM missing â€” needs git clone"
