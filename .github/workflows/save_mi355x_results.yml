name: MI355X Save Results to Git
on:
  workflow_dispatch: {}
jobs:
  save-results:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 10
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
    steps:
      - name: List result files (bench + trace)
        run: |
          echo "=== Bench results (results_mi355x_mxfp4_mtp0_ep8_tp8) ==="
          podman exec $CONTAINER find $REPO/results_mi355x_mxfp4_mtp0_ep8_tp8 -type f 2>/dev/null | sort || echo "No bench dir"
          echo ""
          echo "=== Trace results (results_mi355x_mxfp4_mtp0_ep8_tp8_trace) ==="
          podman exec $CONTAINER find $REPO/results_mi355x_mxfp4_mtp0_ep8_tp8_trace -type f 2>/dev/null | sort || echo "No trace dir"
          echo ""
          echo "=== Old TP4 results (results_mi355x_mxfp4_mtp0_ep1_tp4) ==="
          podman exec $CONTAINER find $REPO/results_mi355x_mxfp4_mtp0_ep1_tp4 -type f 2>/dev/null | sort || echo "No old dir"

      - name: Git add non-json result files and commit
        run: |
          cd $REPO
          git config user.email "ci@github.com"
          git config user.name "MI355X CI"
          git pull --rebase

          echo "=== Adding log, csv, xlsx files (excluding json) ==="
          for dir in results_mi355x_mxfp4_mtp0_ep8_tp8 results_mi355x_mxfp4_mtp0_ep8_tp8_trace results_mi355x_mxfp4_mtp0_ep1_tp4; do
            if [ -d "$dir" ]; then
              find "$dir" -type f \( -name '*.log' -o -name '*.csv' -o -name '*.xlsx' -o -name '*.txt' \) -exec git add {} +
              echo "Added files from $dir"
            else
              echo "Directory $dir not found, skipping"
            fi
          done

          echo ""
          echo "=== Staged files ==="
          git diff --cached --name-only

          if git diff --cached --quiet; then
            echo "No new files to commit"
          else
            git commit -m "chore: save MI355X TP8+EP benchmark & trace results (logs, csv, xlsx)

Includes:
- E2E bench results (TP=8+EP, chat c=64)
- Kineto trace decode breakdown (bs=64)
- Decode walltime CSV
- Server/trace logs

Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
            git push
            echo "=== Committed and pushed ==="
          fi

      - name: Verify committed files
        if: always()
        run: |
          cd $REPO
          echo "=== Latest commits ==="
          git log --oneline -5
          echo ""
          echo "=== Result files in git ==="
          git ls-files 'results_mi355x_*' | head -50
