name: "MI355X Reprocess Trace (EP8 c=4)"
on:
  workflow_dispatch:
jobs:
  reprocess:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 30
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
      RESULT_DIR: results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_ep8_tp8_rocm711_profiling_c4
    steps:
      - name: Sync repo
        run: cd $REPO && git fetch origin && git reset --hard origin/main

      - name: List trace files
        run: ls -lh $REPO/$RESULT_DIR/*.json.gz 2>/dev/null || echo "No trace files"

      - name: Run run_parse_trace.py
        run: |
          TRACE=$(ls $REPO/$RESULT_DIR/*_trim_decode.json.gz 2>/dev/null | head -1)
          if [ -z "$TRACE" ]; then
            TRACE=$(ls $REPO/$RESULT_DIR/*.pt.trace.json.gz 2>/dev/null | grep -v capture_graph | head -1)
          fi
          echo "Trace: $TRACE"
          podman exec $CONTAINER bash -c "cd $REPO/$RESULT_DIR && ATOM_TOOLS=/app/ATOM/tools python3 $REPO/scripts/run_parse_trace.py $TRACE --layer 40" 2>&1 | tail -40

      - name: Show decode breakdown
        if: always()
        run: |
          ls -lh $REPO/$RESULT_DIR/decode_breakdown.xlsx 2>/dev/null || echo "No decode_breakdown.xlsx"
          ls -lh $REPO/$RESULT_DIR/prefill_breakdown.xlsx 2>/dev/null || echo "No prefill_breakdown.xlsx"

      - name: Git commit and push
        if: always()
        run: |
          cd $REPO
          git config user.email "ci@github.com"
          git config user.name "MI355X CI"
          for ext in log csv md xlsx json; do git add -f $RESULT_DIR/*.$ext 2>/dev/null || true; done
          git diff --cached --name-only
          if ! git diff --cached --quiet; then
            git commit -m "data: MI355X EP8 TP8 c=4 trace reprocessed (decode_breakdown)

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
            git pull --rebase origin main || true
            git push
          else
            echo "Nothing to commit"
          fi
