name: "MI355X FP4 Model Compare (ep8_tp8)"
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Benchmark scenario"
        type: choice
        options:
          - chat
          - reasoning
          - summarize
        default: chat
      concurrency:
        description: "Concurrency values (space-separated)"
        type: string
        default: "4 64"

jobs:
  model-compare:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 360
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
      SCENARIO: ${{ inputs.scenario }}
      CONC: ${{ inputs.concurrency }}
      BASE_RESULT_DIR: results/mi355x_model_compare
    steps:
      - name: Sync repo
        run: cd $REPO && git fetch origin && git reset --hard origin/main

      - name: Verify environment
        run: |
          echo "=== Container ==="
          podman exec $CONTAINER python3 -c "import atom; print('ATOM', atom.__version__)"
          podman exec $CONTAINER python3 -c "import aiter; print('aiter', aiter.__version__)"
          podman exec $CONTAINER cat /opt/rocm/.info/version 2>/dev/null || echo "ROCm version unknown"
          echo ""
          echo "=== GPUs ==="
          podman exec $CONTAINER rocm-smi --showproductname 2>/dev/null | head -5
          echo ""
          echo "=== Models ==="
          ls -d /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4* /shared/data/amd_int/models/DeepSeek-R1-0528-M*FP* 2>/dev/null | sort -u

      - name: "Benchmark: pure_mxfp4"
        run: |
          podman exec $CONTAINER bash -c "cd $REPO && bash scripts/sa_bench_mi355x.sh --model-mxfp4 /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4 --configs mxfp4-throughput --scenario $SCENARIO --concurrency \"$CONC\" --tp 8 --ep --result-dir ./$BASE_RESULT_DIR/pure_mxfp4"

      - name: "Benchmark: mxfp4_mtp_moefp4"
        run: |
          podman exec $CONTAINER bash -c "cd $REPO && bash scripts/sa_bench_mi355x.sh --model-mxfp4 /shared/data/amd_int/models/DeepSeek-R1-0528-MXFP4-MTP-MoEFP4 --configs mxfp4-throughput --scenario $SCENARIO --concurrency \"$CONC\" --tp 8 --ep --result-dir ./$BASE_RESULT_DIR/mxfp4_mtp_moefp4"

      - name: "Benchmark: mtp_mixed (MoE-MXFP4 + Attn-PTPC-FP8)"
        run: |
          podman exec $CONTAINER bash -c "cd $REPO && bash scripts/sa_bench_mi355x.sh --model-mxfp4 /shared/data/amd_int/models/DeepSeek-R1-0528-MTP-MoE-MXFP4-Attn-PTPC-FP8 --configs mxfp4-throughput --scenario $SCENARIO --concurrency \"$CONC\" --tp 8 --ep --result-dir ./$BASE_RESULT_DIR/mtp_mixed"

      - name: "Benchmark: moe_mixed (MoE-MXFP4 + Attn-MTP-PTPC-FP8)"
        run: |
          podman exec $CONTAINER bash -c "cd $REPO && bash scripts/sa_bench_mi355x.sh --model-mxfp4 /shared/data/amd_int/models/DeepSeek-R1-0528-MoE-MXFP4-Attn-MTP-PTPC-FP8 --configs mxfp4-throughput --scenario $SCENARIO --concurrency \"$CONC\" --tp 8 --ep --result-dir ./$BASE_RESULT_DIR/moe_mixed"

      - name: Generate comparison table
        if: always()
        run: |
          podman exec $CONTAINER python3 -c "
          import json, glob, os, csv, sys

          base = '$REPO/$BASE_RESULT_DIR'
          models = ['pure_mxfp4', 'mxfp4_mtp_moefp4', 'mtp_mixed', 'moe_mixed']

          rows = []
          for model_tag in models:
              pattern = os.path.join(base, model_tag, 'result_*.json')
              for f in sorted(glob.glob(pattern)):
                  try:
                      with open(f) as fh:
                          d = json.load(fh)
                      fname = os.path.basename(f).replace('result_', '').replace('.json', '')
                      parts = fname.split('_')
                      scenario = parts[2] if len(parts) > 2 else '-'
                      conc_part = [p for p in parts if p.startswith('c') and p[1:].isdigit()]
                      conc = int(conc_part[0][1:]) if conc_part else 0

                      out_tps = d.get('output_throughput', 0)
                      in_tps = d.get('input_throughput', 0)
                      total_tps = d.get('total_token_throughput', in_tps + out_tps)
                      tpot = d.get('tpot_p50', d.get('median_tpot_ms', 0))
                      ttft = d.get('ttft_p50', d.get('median_ttft_ms', 0))
                      interactivity = 1000.0 / tpot if tpot > 0 else 0

                      rows.append({
                          'model': model_tag,
                          'scenario': scenario,
                          'concurrency': conc,
                          'total_throughput': round(total_tps, 1),
                          'output_throughput': round(out_tps, 1),
                          'interactivity': round(interactivity, 2),
                          'tpot_p50_ms': round(tpot, 1),
                          'ttft_p50_ms': round(ttft, 1),
                      })
                  except Exception as e:
                      print(f'WARN: {f}: {e}', file=sys.stderr)

          rows.sort(key=lambda r: (r['scenario'], r['concurrency'], r['model']))

          # Print table
          print()
          print(f\"{'Model':<25} {'Scenario':<12} {'Conc':>5} {'TotalTput':>10} {'OutTput':>10} {'Interac':>8} {'TPOT_p50':>9} {'TTFT_p50':>9}\")
          print('-' * 95)
          for r in rows:
              print(f\"{r['model']:<25} {r['scenario']:<12} {r['concurrency']:>5} {r['total_throughput']:>10.1f} {r['output_throughput']:>10.1f} {r['interactivity']:>8.2f} {r['tpot_p50_ms']:>9.1f} {r['ttft_p50_ms']:>9.1f}\")

          # Write CSV
          csv_path = os.path.join(base, 'comparison.csv')
          if rows:
              with open(csv_path, 'w', newline='') as cf:
                  w = csv.DictWriter(cf, fieldnames=rows[0].keys())
                  w.writeheader()
                  w.writerows(rows)
              print(f'\nCSV saved to {csv_path} ({len(rows)} rows)')
          else:
              print('No results found!')
          "

      - name: Show per-model summaries
        if: always()
        run: |
          for tag in pure_mxfp4 mxfp4_mtp_moefp4 mtp_mixed moe_mixed; do
            echo "=== $tag ==="
            cat $REPO/$BASE_RESULT_DIR/$tag/summary.md 2>/dev/null || echo "No summary"
            echo ""
          done

      - name: Show final state
        if: always()
        run: |
          echo "=== Result files ==="
          find $REPO/$BASE_RESULT_DIR -name "*.json" -o -name "*.csv" -o -name "*.md" 2>/dev/null | sort
          echo ""
          echo "=== Comparison CSV ==="
          cat $REPO/$BASE_RESULT_DIR/comparison.csv 2>/dev/null || echo "No comparison CSV"
