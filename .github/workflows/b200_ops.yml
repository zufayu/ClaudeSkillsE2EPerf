name: B200 Ops
on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        type: choice
        options:
          - sync-and-push
          - status-only
        default: sync-and-push
jobs:
  fix-b200:
    runs-on: [self-hosted, b200]
    timeout-minutes: 15
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_trt
      SFS: /SFS-aGqda6ct
      REPO: /home/ubuntu/zufa/ClaudeSkillsE2EPerf
    steps:
      - name: Show current git state
        run: |
          echo "=== git status ==="
          ssh $NODE "cd $REPO && git status"
          echo "=== git log ==="
          ssh $NODE "cd $REPO && git log --oneline -5"

      - name: Hard reset to origin/main
        if: inputs.task == 'sync-and-push'
        run: |
          ssh $NODE "cd $REPO && git rebase --abort 2>/dev/null; true"
          ssh $NODE "cd $REPO && rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null; true"
          ssh $NODE "docker exec $CONTAINER bash -c 'chown -R \$(stat -c %u:%g $REPO/.git) $REPO/results/ 2>/dev/null; true'"
          ssh $NODE "cd $REPO && git reset --hard 2>/dev/null; true"
          ssh $NODE "cd $REPO && git fetch origin main && git checkout -B main FETCH_HEAD --force"
          echo "=== After reset ==="
          ssh $NODE "cd $REPO && git log --oneline -3 && git status --short"

      - name: Re-add and push any result data on disk
        if: inputs.task == 'sync-and-push'
        run: |
          ssh $NODE "cd $REPO && git config user.email 'ci@github.com' && git config user.name 'B200 CI'"
          ssh $NODE "cd $REPO && for d in results/b200_dsr_fp4/*/; do for ext in log yml jsonl json md csv xlsx; do git add -f \$d*.\$ext 2>/dev/null; done; done; git diff --cached --name-only"
          ssh $NODE "cd $REPO && if ! git diff --cached --quiet; then git commit -m 'data: B200 result data (re-committed after git reset)

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>' && git push; else echo 'Nothing new to commit'; fi"

      - name: Show final state
        if: always()
        run: |
          ssh $NODE "cd $REPO && git log --oneline -5"
          ssh $NODE "cd $REPO && git status"
