name: B200 Ops
on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        type: choice
        options:
          - sync-and-push
          - status-only
        default: sync-and-push
jobs:
  fix-b200:
    runs-on: [self-hosted, b200]
    timeout-minutes: 15
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_trt
      SFS: /SFS-aGqda6ct
      REPO: /SFS-aGqda6ct/ubuntu/zufa/ClaudeSkillsE2EPerf
    steps:
      - name: Show current git state
        run: |
          echo "=== git status ==="
          ssh $NODE "cd $REPO && git status"
          echo "=== git log ==="
          ssh $NODE "cd $REPO && git log --oneline -5"

      - name: Fix git state and sync
        if: inputs.task == 'sync-and-push'
        run: |
          ssh $NODE "cd $REPO && rm -rf .git/rebase-merge .git/rebase-apply .git/MERGE_HEAD .git/REBASE_HEAD 2>/dev/null; true"
          ssh $NODE "docker exec $CONTAINER bash -c 'chown -R \$(stat -c %u:%g $REPO/.git) $REPO/results/ 2>/dev/null; true'"
          ssh $NODE "cd $REPO && git fetch origin main && git checkout -B main FETCH_HEAD"
          ssh $NODE "cd $REPO && git pull --rebase origin main"
          echo "=== After sync ==="
          ssh $NODE "cd $REPO && git log --oneline -5"
          ssh $NODE "cd $REPO && git status"

      - name: Push any unpushed commits
        if: inputs.task == 'sync-and-push'
        run: |
          ssh $NODE "cd $REPO && git config user.email 'ci@github.com' && git config user.name 'B200 CI'"
          UNPUSHED=$(ssh $NODE "cd $REPO && git log origin/main..HEAD --oneline" 2>/dev/null)
          if [ -n "$UNPUSHED" ]; then
            echo "Unpushed commits:"
            echo "$UNPUSHED"
            ssh $NODE "cd $REPO && git push"
          else
            echo "No unpushed commits"
          fi

      - name: Show final state
        if: always()
        run: |
          ssh $NODE "cd $REPO && git log --oneline -5"
          ssh $NODE "cd $REPO && git status"
