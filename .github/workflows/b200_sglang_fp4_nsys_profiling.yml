name: B200 SGLang FP4 Nsys Profiling
on:
  workflow_dispatch:

jobs:
  sglang-fp4-nsys:
    runs-on: [self-hosted, b200]
    timeout-minutes: 120
    env:
      NODE: hungry-hippo-fin-03-2
      CONTAINER: zufa_sglang
      REPO: /home/ubuntu/zufa/ClaudeSkillsE2EPerf
      MODEL_FP4: /SFS-aGqda6ct/models/DeepSeek-R1-0528-NVFP4-v2
      RESULT_DIR: results/b200_dsr_fp4/b200_dsr_fp4_mtp0_ep4_tp4_sglang059_nsys
    steps:
      - name: Sync repo
        run: |
          ssh $NODE "cd $REPO && git rebase --abort 2>/dev/null; rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null; git reset --hard 2>/dev/null; git checkout -B main origin/main --force 2>/dev/null; git pull --rebase origin main 2>/dev/null; true"
          ssh $NODE "cd $REPO && git log --oneline -3"

      - name: Verify container and GPU
        run: |
          ssh $NODE "docker exec $CONTAINER nvidia-smi --query-gpu=name,memory.total --format=csv,noheader | head -4"
          ssh $NODE "docker exec $CONTAINER python3 -c 'import sglang; print(f\"SGLang {sglang.__version__}\")'"

      - name: Check nsys availability
        run: ssh $NODE "docker exec $CONTAINER nsys --version"

      - name: Clean old results
        run: ssh $NODE "docker exec $CONTAINER bash -c 'rm -rf $REPO/$RESULT_DIR/* 2>/dev/null; true' && rm -rf $REPO/$RESULT_DIR/* 2>/dev/null; true"

      - name: Run SGLang FP4 nsys profiling (chat c=64, TP4 EP4)
        run: |
          ssh $NODE "docker exec $CONTAINER bash -c 'cd $REPO && bash scripts/collect_sglang_nsys_trace.sh --model $MODEL_FP4 --tp 4 --ep 4 --scenario chat --concurrency 64 --env sglang059 --result-dir ./$RESULT_DIR'"

      - name: Show profiling results
        if: always()
        run: |
          ssh $NODE "ls -la $REPO/$RESULT_DIR/ 2>/dev/null || echo 'No result dir'"
          ssh $NODE "ls -lh $REPO/$RESULT_DIR/*.nsys-rep 2>/dev/null || echo 'No nsys-rep file'"
          ssh $NODE "cat $REPO/$RESULT_DIR/summary.md 2>/dev/null || echo 'No summary'"

      - name: Deep kernel analysis via SQLite
        if: always()
        run: |
          SQLITE=$(ssh $NODE "ls -t $REPO/$RESULT_DIR/*.sqlite 2>/dev/null | head -1")
          if [ -n "$SQLITE" ]; then
            ssh $NODE "docker exec $CONTAINER python3 $REPO/scripts/analyze_nsys_sqlite.py $SQLITE --gpu 0 --skip-first 10 --max-steps 20 --top-kernels 30 --per-layer --csv $REPO/$RESULT_DIR/nsys_kernel_breakdown.csv 2>&1" | tee /tmp/nsys_analysis.log
          else
            echo "No SQLite file found, skipping deep analysis"
          fi

      - name: Git commit and push results (no .nsys-rep)
        if: always()
        run: |
          ssh $NODE "cd $REPO && git config user.email 'ci@github.com' && git config user.name 'B200 CI'"
          ssh $NODE "cd $REPO && git reset HEAD 2>/dev/null; for ext in log yml jsonl json md csv; do git add -f $RESULT_DIR/*.\$ext 2>/dev/null; done; git diff --cached --name-only"
          ssh $NODE "cd $REPO && if ! git diff --cached --quiet; then git commit -m 'data: B200 SGLang FP4 nsys profiling (chat c=64, TP4 EP4)

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>' && git pull --rebase origin main && git push; else echo 'Nothing to commit'; fi"

      - name: Show final state
        if: always()
        run: ssh $NODE "cd $REPO && git log --oneline -3"
