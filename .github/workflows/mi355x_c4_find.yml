name: MI355X c4 Find Traces
on:
  workflow_dispatch: {}
jobs:
  find:
    runs-on: [self-hosted, mi355x]
    timeout-minutes: 10
    env:
      REPO: /shared/amdgpu/home/zufa_yu_qle/ClaudeSkillsE2EPerf
      CONTAINER: zufa_atom
    steps:
      - name: Ensure container running
        run: podman start $CONTAINER 2>/dev/null || true

      - name: Pull repo to latest
        run: cd $REPO && git stash 2>/dev/null || true && git fetch origin && git reset --hard origin/main

      - name: Git log
        run: cd $REPO && git log --oneline -5

      - name: Search for c4 trace files on disk
        run: |
          echo "=== EP8 profiling_c4 dir ==="
          ls -lah $REPO/results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_ep8_tp8_rocm711_profiling_c4/ 2>/dev/null || echo "Dir not found or empty"
          echo ""
          echo "=== EP8 profiling dir ==="
          ls -lah $REPO/results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_ep8_tp8_rocm711_profiling/ 2>/dev/null || echo "Dir not found"
          echo ""
          echo "=== All .json.gz on shared filesystem ==="
          find /shared/amdgpu/home/zufa_yu_qle -name "*.json.gz" -type f 2>/dev/null | head -20
          echo ""
          echo "=== All .json.gz > 10MB ==="
          find /shared/amdgpu/home/zufa_yu_qle -name "*.json.gz" -size +10M -type f 2>/dev/null | head -20
          echo ""
          echo "=== Container /tmp traces ==="
          podman exec $CONTAINER bash -c "find /tmp -name '*.json.gz' 2>/dev/null | head -20" || echo "None"
          echo ""
          echo "=== All profiling result dirs ==="
          ls -d $REPO/results/mi355x_dsr_mxfp4/*profiling*/ 2>/dev/null
          echo ""
          echo "=== Stashed files? ==="
          cd $REPO && git stash list 2>/dev/null || echo "No stash"

      - name: Search broader filesystem
        run: |
          echo "=== /tmp traces ==="
          find /tmp -name "*.json.gz" -type f 2>/dev/null | head -10
          echo ""
          echo "=== /shared traces (all users) ==="
          find /shared -maxdepth 6 -name "*ep8*c4*.json.gz" -type f 2>/dev/null | head -10
          find /shared -maxdepth 6 -name "*ep8*tp8*trace*.json.gz" -type f 2>/dev/null | head -10
          echo ""
          echo "=== Home dir large files ==="
          find /shared/amdgpu/home/zufa_yu_qle -name "*.json.gz" -mtime -30 -type f -exec ls -lh {} \; 2>/dev/null | head -20

      - name: Check decode_breakdown_c4 content
        run: |
          cd $REPO
          python3 -c "
          import openpyxl
          f='results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_ep8_tp8_rocm711_profiling/decode_breakdown_c4.xlsx'
          wb = openpyxl.load_workbook(f)
          ws = wb.active
          print(f'Rows: {ws.max_row}, Cols: {ws.max_column}')
          for i, row in enumerate(ws.iter_rows(values_only=True)):
              print(row)
          " 2>/dev/null || echo "Failed to read xlsx"
          echo ""
          echo "=== Compare with c64 decode_breakdown ==="
          python3 -c "
          import openpyxl
          f='results/mi355x_dsr_mxfp4/mi355x_dsr_mxfp4_mtp0_ep8_tp8_rocm711_profiling/decode_breakdown.xlsx'
          wb = openpyxl.load_workbook(f)
          ws = wb.active
          print(f'c64 Rows: {ws.max_row}, Cols: {ws.max_column}')
          for i, row in enumerate(ws.iter_rows(values_only=True)):
              print(row)
          " 2>/dev/null || echo "No c64 breakdown"
